<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelderner Stadtmeisterschaften 2026</title>
<style>
  :root{
    --bg: #0a1c14;
    --bg-elev: #102b1f;
    --bg-card: #143528;
    --line: #24503b;
    --text: #eef4ee;
    --text-dim: #9db3a5;
    --ball: #d4e157;
    --clay: #c05a2e;
    --danger: #e0563f;
    --radius: 10px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Roboto Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding-bottom:60px;}
  ::selection{background:var(--ball); color:#0a1c14;}
  a{color:var(--ball);}

  .hero{
    background: linear-gradient(160deg, #0d2419 0%, #061109 70%);
    border-bottom: 3px solid var(--ball);
    padding: 28px 20px 0 20px;
    position:relative; overflow:hidden;
  }
  .hero:before{
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .hero-eyebrow{font-family: var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color: var(--ball); opacity:.85; margin:0 0 6px 0;}
  .hero h1{margin:0; font-size: clamp(28px, 5vw, 46px); font-weight:800; letter-spacing:-0.02em; text-transform:uppercase; line-height:1.02;}
  .hero .sub{color:var(--text-dim); margin:8px 0 22px 0; font-size:14px; max-width:640px;}
  .ticker-wrap{background:#040c07; border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; position:relative;}
  .ticker-label{display:flex; align-items:center; gap:8px; background: var(--ball); color:#08170f; font-family:var(--mono); font-weight:700; font-size:11px; letter-spacing:.15em; text-transform:uppercase; padding:6px 12px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#08170f; animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .ticker-track{display:flex; gap:0; padding:10px 0; animation: scroll-x 32s linear infinite; width:max-content;}
  .ticker-wrap:hover .ticker-track{animation-play-state:paused;}
  @keyframes scroll-x{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .ticker-item{font-family:var(--mono); font-size:13px; white-space:nowrap; padding:0 26px; border-right:1px solid var(--line); color:#c9f27a; text-shadow:0 0 8px rgba(212,225,87,.35);}
  .ticker-item b{color:#fff; font-weight:700;}
  .ticker-item .t-cat{color:var(--text-dim); text-shadow:none;}
  @media (prefers-reduced-motion: reduce){ .ticker-track{animation:none; overflow-x:auto;} }

  .rolebar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:14px 20px; background:var(--bg-elev); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;}
  .rolebar select, .rolebar button, .rolebar input{background:var(--bg-card); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:13px; font-family:var(--sans); cursor:pointer;}
  .rolebar select:focus, .rolebar button:focus, button:focus, input:focus, textarea:focus{outline:2px solid var(--ball); outline-offset:1px;}
  .rolebar .me{font-family:var(--mono); font-size:12px; color:var(--ball); margin-left:auto;}
  .pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; padding:4px 9px; border-radius:99px; border:1px solid var(--line); color:var(--text-dim);}
  .pill.live{border-color:var(--ball); color:var(--ball);}
  .err{color:#f0916c; font-size:12px; font-family:var(--mono);}

  .wrap{max-width:1200px; margin:0 auto; padding:0 20px;}
  .tabs{display:flex; gap:6px; flex-wrap:wrap; padding:18px 20px 0 20px; max-width:1200px; margin:0 auto;}
  .tab{font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em; padding:9px 14px; border-radius:8px 8px 0 0; border:1px solid var(--line); border-bottom:none; background:var(--bg-elev); color:var(--text-dim); cursor:pointer;}
  .tab.active{background:var(--bg-card); color:var(--ball); border-color:var(--ball);}

  .panel{background:var(--bg-card); border:1px solid var(--line); border-radius:0 10px 10px 10px; padding:24px 20px; max-width:1200px; margin:0 auto 30px auto;}
  .panel h2{margin:0 0 4px 0; font-size:20px; letter-spacing:-0.01em;}
  .panel .meta{color:var(--text-dim); font-size:12.5px; margin-bottom:20px; font-family:var(--mono);}

  .bracket{display:flex; gap:34px; overflow-x:auto; padding-bottom:14px;}
  .round-col{display:flex; flex-direction:column; min-width:250px; flex:1;}
  .round-title{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--ball); margin-bottom:14px; padding-bottom:8px; border-bottom:1px dashed var(--line);}
  .round-col .matches{display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:16px;}
  .match{background:var(--bg-elev); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px; position:relative;}
  .match.mine{border-color:var(--ball); box-shadow:0 0 0 1px var(--ball) inset;}
  .match.done{opacity:.72;}
  .slot{display:flex; justify-content:space-between; gap:8px; padding:4px 0;}
  .slot .nm{display:flex; gap:6px; align-items:baseline;}
  .slot.winner .nm{color:var(--ball); font-weight:700;}
  .slot.bye .nm, .slot.empty .nm{color:var(--text-dim); font-style:italic;}
  .vs-divider{border-top:1px solid var(--line); margin:2px 0;}
  .m-meta{margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); font-family:var(--mono); font-size:11px; color:var(--text-dim); display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center;}
  .badge{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:99px; border:1px solid var(--line); color:var(--text-dim);}
  .badge.pairing{border-color:var(--clay); color:#f0916c;}
  .badge.scheduled{border-color:var(--ball); color:var(--ball);}
  .badge.done{border-color:#5a8a72; color:#8fd6ac;}
  .badge.wait{color:var(--text-dim);}

  .m-actions{margin-top:8px; display:flex; gap:14px; flex-wrap:wrap;}
  .m-actions button.link{background:none; border:none; color:var(--ball); font-family:var(--mono); font-size:11.5px; cursor:pointer; padding:2px 0; text-decoration:underline;}
  .m-form{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:grid; gap:8px;}
  .m-form label{display:block; font-size:11px; color:var(--text-dim); margin-bottom:3px; font-family:var(--mono);}
  .m-form input[type=text], .m-form input[type=date], .m-form input[type=time], .m-form select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:6px 8px; font-size:12.5px; font-family:var(--sans);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .m-form .radios{display:flex; flex-direction:column; gap:6px;}
  .m-form .radios label{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text); font-family:var(--sans);}
  .btn{background:var(--ball); color:#0a1c14; border:none; border-radius:7px; padding:8px 14px; font-weight:700; font-size:12.5px; cursor:pointer; font-family:var(--sans);}
  .btn.secondary{background:transparent; color:var(--ball); border:1px solid var(--ball);}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .empty{color:var(--text-dim); font-size:13px; padding:30px 0; text-align:center;}

  .log-list{display:flex; flex-direction:column; gap:8px; max-height:520px; overflow-y:auto;}
  .log{background:var(--bg-elev); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:12px;}
  .log .head{display:flex; justify-content:space-between; gap:10px;}
  .log .time{font-family:var(--mono); color:var(--text-dim); font-size:10.5px; white-space:nowrap;}
  .log .txt{color:var(--text);}

  .taglist{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0;}
  .tag{display:inline-flex; align-items:center; gap:6px; background:var(--bg-elev); border:1px solid var(--line); border-radius:99px; padding:4px 6px 4px 12px; font-size:12.5px;}
  .tag button{background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; padding:0 4px; line-height:1;}
  .addrow{display:flex; gap:8px; margin-top:8px;}
  .addrow input{flex:1; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:8px 10px; font-size:13px;}

  .grid2{display:grid; grid-template-columns:1.2fr 1fr; gap:24px;}
  @media (max-width: 880px){ .grid2{grid-template-columns:1fr;} .bracket{flex-direction:column;} .round-col{min-width:0;} }

  .footer-note{max-width:1200px; margin:0 auto; padding:0 20px 40px 20px; color:var(--text-dim); font-size:11.5px; font-family:var(--mono); line-height:1.6;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:100;}
  .modal{background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:22px; width:320px; max-width:90vw;}
  .modal h3{margin:0 0 10px 0; font-size:15px;}
  .modal input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:9px 10px; font-size:13px; margin-bottom:10px;}
  .modal .row{display:flex; gap:8px; justify-content:flex-end;}
</style>
</head>
<body>

<div class="hero">
  <div class="wrap" style="padding:0;">
    <p class="hero-eyebrow">TC Geldern · Kapellen · Walbeck · Veert · Hartefeld</p>
    <h1>Gelderner Stadtmeisterschaften 2026</h1>
    <p class="sub">16er-Turnierbäume für alle Konkurrenzen — der Vorstand stellt die Teilnehmer auf, jede:r Spieler:in pflegt danach selbst Termin und Ergebnis der eigenen Partie.</p>
    <div class="ticker-wrap">
      <div class="ticker-label"><span class="dot"></span> Anstehende Partien</div>
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </div>
  <div style="height:22px;"></div>
</div>

<div class="rolebar wrap">
  <span class="pill live" id="storagePill">● live</span>
  <label style="font-size:12px; color:var(--text-dim); font-family:monospace;">Rolle</label>
  <select id="roleSelect">
    <option value="player">Spieler</option>
    <option value="admin">Admin</option>
  </select>
  <span id="playerSelectWrap" style="display:flex; align-items:center; gap:8px;">
    <label style="font-size:12px; color:var(--text-dim); font-family:monospace;">Ich bin</label>
    <select id="playerSelect"><option value="">– auswählen –</option></select>
  </span>
  <button id="logoutBtn" style="display:none;">Admin abmelden</button>
  <span class="me" id="meLabel"></span>
</div>

<div class="tabs" id="tabs"></div>
<div class="panel" id="mainPanel"></div>

<div class="footer-note" id="footerNote"></div>
<div id="modalRoot"></div>

<script>
/* ============================= KONFIGURATION ============================= */
const CATS = [
  {key:'damen', name:'Damen', type:'einzel'},
  {key:'herren', name:'Herren', type:'einzel'},
  {key:'herren40', name:'Herren 40+', type:'einzel'},
  {key:'damendoppel', name:'Damen Doppel', type:'doppel'},
  {key:'herrendoppel', name:'Herren Doppel', type:'doppel'},
  {key:'herrendoppel40', name:'Herren Doppel 40+', type:'doppel'},
  {key:'mixed', name:'Mixed', type:'doppel'}
];
const DRAW_SIZE = 16;
const TOTAL_ROUNDS = 4; // Achtelfinale, Viertelfinale, Halbfinale, Finale
const STORAGE_KEY = 'sm2026-tournament-db-v2';
const DEFAULT_ADMIN_PASSWORD = 'tcgeldern2026';

/* ============================= HILFSFUNKTIONEN ============================= */
function roundLabel(idx){
  const fromEnd = TOTAL_ROUNDS - idx;
  if(fromEnd===1) return 'Finale';
  if(fromEnd===2) return 'Halbfinale';
  if(fromEnd===3) return 'Viertelfinale';
  return 'Achtelfinale';
}
function displayName(slot){
  if(slot.kind==='bye') return 'Freilos';
  if(slot.kind==='player') return slot.names.join(' / ');
  return '– offen –';
}
function findMatchById(rounds, id){
  for(const rnd of rounds) for(const m of rnd) if(m.id===id) return m;
  return null;
}

function buildEmptyBracket(catKey){
  const rounds = [];
  let count = DRAW_SIZE;
  for(let r=0;r<TOTAL_ROUNDS;r++){
    const matches = [];
    const numMatches = count/2;
    for(let i=0;i<numMatches;i++){
      matches.push({
        id: `${catKey}-r${r}-m${i}`,
        round:r,
        slots: [ {kind: r===0?'empty':'tbd', names:[]}, {kind: r===0?'empty':'tbd', names:[]} ],
        date:null, time:null, court:null,
        result:null, winnerSlot:null,
        nextMatchId:null, nextSlotIndex:i%2
      });
    }
    rounds.push(matches);
    count = numMatches;
  }
  for(let r=0;r<rounds.length-1;r++){
    rounds[r].forEach((m,i)=>{
      m.nextMatchId = rounds[r+1][Math.floor(i/2)].id;
      m.nextSlotIndex = i%2;
    });
  }
  return rounds;
}

function computeMatchStatus(m){
  const [s1,s2] = m.slots;
  if(m.result || m.winnerSlot!==null) return 'done';
  if(s1.kind==='tbd' || s2.kind==='tbd') return 'wait';
  if(s1.kind==='empty' || s2.kind==='empty') return 'unassigned';
  if(s1.kind==='bye' || s2.kind==='bye') return 'bye';
  if(m.date) return 'scheduled';
  return 'pairing';
}

/* ============================= DB ============================= */
let DB = null;

function buildFreshDB(){
  const categories = {};
  CATS.forEach(cat=>{
    categories[cat.key] = {name:cat.name, type:cat.type, participants:[], rounds:buildEmptyBracket(cat.key)};
  });
  return {
    categories,
    activityLog: [],
    adminPassword: DEFAULT_ADMIN_PASSWORD,
    createdAt: new Date().toISOString()
  };
}

async function loadDB(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ DB = JSON.parse(res.value); if(!DB.adminPassword) DB.adminPassword = DEFAULT_ADMIN_PASSWORD; return; }
  }catch(e){ /* not found yet */ }
  DB = buildFreshDB();
  await saveDB();
}
async function saveDB(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(DB), true); setPillState(true); }
  catch(e){ console.error('Speichern fehlgeschlagen', e); setPillState(false); }
}
function setPillState(ok){
  const p = document.getElementById('storagePill');
  if(!p) return;
  p.textContent = ok ? '● live' : '● Speicherfehler';
  p.className = 'pill ' + (ok ? 'live' : '');
}
function log(text){
  DB.activityLog.unshift({id:'l'+Date.now()+Math.random().toString(36).slice(2,6), time:new Date().toISOString(), text});
}

/* ============================= MUTATIONEN ============================= */
async function addParticipant(catKey, name){
  name = name.trim();
  if(!name) return;
  const cat = DB.categories[catKey];
  if(cat.participants.includes(name)) return;
  cat.participants.push(name);
  log(`Teilnehmer hinzugefügt (${cat.name}): ${name}`);
  await saveDB();
}
async function removeParticipant(catKey, name){
  const cat = DB.categories[catKey];
  cat.participants = cat.participants.filter(n=>n!==name);
  log(`Teilnehmer entfernt (${cat.name}): ${name}`);
  await saveDB();
}

function propagateWinner(cat, m){
  if(m.winnerSlot===null || !m.nextMatchId) return;
  const winner = m.slots[m.winnerSlot];
  const nextMatch = findMatchById(cat.rounds, m.nextMatchId);
  nextMatch.slots[m.nextSlotIndex] = {kind: winner.kind==='bye' ? 'bye':'player', names: winner.names.slice()};
}

async function assignSlot(catKey, matchId, slotIndex, kind, names){
  const cat = DB.categories[catKey];
  const m = findMatchById(cat.rounds, matchId);
  m.slots[slotIndex] = {kind, names: kind==='player' ? names : []};
  log(`Paarung gesetzt (${cat.name}, ${roundLabel(m.round)}): Feld ${slotIndex+1} → ${kind==='bye'?'Freilos':names.join(' / ')}`);
  // auto-resolve bye
  const other = m.slots[1-slotIndex];
  if(m.winnerSlot===null){
    if(m.slots[0].kind==='bye' && m.slots[1].kind==='player'){ m.winnerSlot=1; propagateWinner(cat,m); }
    else if(m.slots[1].kind==='bye' && m.slots[0].kind==='player'){ m.winnerSlot=0; propagateWinner(cat,m); }
  }
  await saveDB();
}

async function setMatchDate(catKey, matchId, date, time, court, actor){
  const cat = DB.categories[catKey];
  const m = findMatchById(cat.rounds, matchId);
  m.date = date || null; m.time = time || null; m.court = court || null;
  log(`Termin geändert (${cat.name}): ${displayName(m.slots[0])} – ${displayName(m.slots[1])} → ${date||'–'} ${time||''} ${court?('· '+court):''} (${actor})`);
  await saveDB();
}

async function setMatchResult(catKey, matchId, winnerSlot, resultText, actor){
  const cat = DB.categories[catKey];
  const m = findMatchById(cat.rounds, matchId);
  m.winnerSlot = winnerSlot;
  m.result = resultText || null;
  const winner = m.slots[winnerSlot];
  log(`Ergebnis eingetragen (${cat.name}): ${displayName(m.slots[0])} – ${displayName(m.slots[1])} → Sieger ${winner.names.join(' / ')}${resultText?(' ('+resultText+')'):''} (${actor})`);
  propagateWinner(cat, m);
  await saveDB();
}

async function resetTournament(){
  DB = buildFreshDB();
  await saveDB();
}
async function changeAdminPassword(newPass){
  DB.adminPassword = newPass;
  log('Admin-Passwort geändert.');
  await saveDB();
}

/* ============================= STATE ============================= */
let ui = { role:'player', adminAuthed:false, me:'', activeCat: CATS[0].key, openForm:null };

function allParticipantsGlobal(){
  const set = new Set();
  Object.values(DB.categories).forEach(cat=>cat.participants.forEach(p=>set.add(p)));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'de'));
}
function isMyMatch(m){
  if(!ui.me) return false;
  return m.slots.some(s=>s.kind==='player' && s.names.includes(ui.me));
}
function fmtDate(iso){
  if(!iso) return null;
  const d = new Date(iso+'T00:00:00');
  const days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function timeAgo(iso){
  const diff = Date.now()-new Date(iso).getTime();
  const mnt = Math.floor(diff/60000);
  if(mnt<1) return 'gerade eben';
  if(mnt<60) return `vor ${mnt} Min.`;
  const h = Math.floor(mnt/60);
  if(h<24) return `vor ${h} Std.`;
  return `vor ${Math.floor(h/24)} Tg.`;
}

/* ============================= RENDER: TICKER ============================= */
function renderTicker(){
  const items = [];
  Object.entries(DB.categories).forEach(([key,cat])=>{
    cat.rounds.forEach(rnd=>rnd.forEach(m=>{
      if(m.date && !m.result){
        items.push({cat:cat.name, label:`${displayName(m.slots[0])} – ${displayName(m.slots[1])}`, date:m.date, time:m.time, court:m.court});
      }
    }));
  });
  items.sort((a,b)=> (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  const track = document.getElementById('tickerTrack');
  if(items.length===0){ track.innerHTML = `<div class="ticker-item">Noch keine Termine vereinbart.</div>`; return; }
  const html = items.map(it=>`<span class="ticker-item"><span class="t-cat">${it.cat}</span> · <b>${it.label}</b> · ${fmtDate(it.date)}, ${it.time||''} Uhr${it.court?(' · '+it.court):''}</span>`).join('');
  track.innerHTML = html + html;
}

/* ============================= RENDER: TABS ============================= */
function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = CATS.map(cat=>{
    const active = cat.key===ui.activeCat ? 'active' : '';
    return `<div class="tab ${active}" data-cat="${cat.key}">${cat.name}</div>`;
  }).join('');
  tabs.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{ ui.activeCat = t.dataset.cat; ui.openForm=null; renderAll(); });
  });
}

/* ============================= RENDER: BRACKET ============================= */
function statusBadge(m){
  const st = computeMatchStatus(m);
  if(st==='done') return `<span class="badge done">Beendet</span>`;
  if(st==='scheduled') return `<span class="badge scheduled">Termin steht</span>`;
  if(st==='pairing') return `<span class="badge pairing">Termin offen</span>`;
  if(st==='bye') return `<span class="badge wait">Freilos</span>`;
  if(st==='unassigned') return `<span class="badge wait">nicht besetzt</span>`;
  return `<span class="badge wait">wartet auf Vorrunde</span>`;
}
function slotClass(slot, m, idx){
  const cls=['slot'];
  if(m.winnerSlot===idx) cls.push('winner');
  if(slot.kind==='bye') cls.push('bye');
  if(slot.kind==='empty'||slot.kind==='tbd') cls.push('empty');
  return cls.join(' ');
}
function slotHtml(slot, m, idx){
  return `<div class="${slotClass(slot,m,idx)}"><span class="nm">${displayName(slot)}</span></div>`;
}

function assignFormHtml(catKey, m){
  const cat = DB.categories[catKey];
  const opts = cat.participants.map(p=>`<option value="${p}">${p}</option>`).join('');
  const needTwo = cat.type==='doppel';
  return `
    <div class="m-form" data-match="${m.id}" data-mode="assign">
      <div class="row2">
        <div>
          <label>Feld 1 ${needTwo?'– Spieler 1':''}</label>
          <select class="as-p1a"><option value="">–</option>${opts}</select>
          ${needTwo?`<select class="as-p1b" style="margin-top:6px;"><option value="">Spieler 2 –</option>${opts}</select>`:''}
          <button class="btn secondary as-save" data-slot="0" style="margin-top:6px;">Feld 1 setzen</button>
          <button class="btn secondary as-bye" data-slot="0" style="margin-top:6px;">Freilos setzen</button>
        </div>
        <div>
          <label>Feld 2 ${needTwo?'– Spieler 1':''}</label>
          <select class="as-p2a"><option value="">–</option>${opts}</select>
          ${needTwo?`<select class="as-p2b" style="margin-top:6px;"><option value="">Spieler 2 –</option>${opts}</select>`:''}
          <button class="btn secondary as-save" data-slot="1" style="margin-top:6px;">Feld 2 setzen</button>
          <button class="btn secondary as-bye" data-slot="1" style="margin-top:6px;">Freilos setzen</button>
        </div>
      </div>
      ${cat.participants.length===0 ? `<p class="err">Für diese Konkurrenz sind noch keine Teilnehmer angelegt. Erst unten bei "Teilnehmerverwaltung" hinzufügen.</p>`:''}
    </div>`;
}

function matchFormHtml(catKey, m){
  const st = computeMatchStatus(m);
  if(st!=='pairing' && st!=='scheduled') return '';
  return `
    <div class="m-form" data-match="${m.id}" data-mode="play">
      <div>
        <label>Termin (Datum, Uhrzeit, Platz)</label>
        <div class="row2">
          <input type="date" class="f-date" value="${m.date||''}">
          <input type="time" class="f-time" value="${m.time||''}">
        </div>
        <input type="text" class="f-court" placeholder="Platz / Ort" value="${m.court||''}" style="margin-top:6px;">
        <button class="btn secondary f-save-date" style="margin-top:8px;">Termin speichern</button>
      </div>
      <div>
        <label>Ergebnis eintragen</label>
        <div class="radios">
          <label><input type="radio" name="winner-${m.id}" value="0"> Sieger: ${displayName(m.slots[0])}</label>
          <label><input type="radio" name="winner-${m.id}" value="1"> Sieger: ${displayName(m.slots[1])}</label>
        </div>
        <input type="text" class="f-result" placeholder="Sätze, z. B. 6:3, 4:6, 10:8" style="margin-top:6px;">
        <button class="btn f-save-result" style="margin-top:8px;">Ergebnis speichern</button>
      </div>
    </div>`;
}

function matchHtml(catKey, m){
  const mine = isMyMatch(m) ? 'mine' : '';
  const done = computeMatchStatus(m)==='done' ? 'done' : '';
  const showForm = ui.openForm===m.id+':play';
  const showAssign = ui.openForm===m.id+':assign';
  const canPlay = (ui.role==='admin' && ui.adminAuthed) || (ui.role==='player' && isMyMatch(m));
  const st = computeMatchStatus(m);
  const canAssign = ui.role==='admin' && ui.adminAuthed && m.round===0 && st==='unassigned';
  return `
    <div class="match ${mine} ${done}" data-match="${m.id}">
      ${slotHtml(m.slots[0], m, 0)}
      <div class="vs-divider"></div>
      ${slotHtml(m.slots[1], m, 1)}
      <div class="m-meta">
        ${statusBadge(m)}
        ${m.date ? `<span>${fmtDate(m.date)}, ${m.time||''} Uhr${m.court?(' · '+m.court):''}</span>` : ''}
        ${m.result ? `<span>Ergebnis: ${m.result}</span>` : ''}
        ${mine ? `<span class="badge" style="border-color:var(--ball); color:var(--ball);">deine Partie</span>` : ''}
      </div>
      <div class="m-actions">
        ${canAssign ? `<button class="link toggle-assign" data-match="${m.id}">${showAssign?'Zuweisung schließen':'Teilnehmer zuweisen'}</button>` : ''}
        ${canPlay && (st==='pairing'||st==='scheduled') ? `<button class="link toggle-form" data-match="${m.id}">${showForm?'Formular schließen':'Termin / Ergebnis eintragen'}</button>` : ''}
      </div>
      ${showAssign ? assignFormHtml(catKey, m) : ''}
      ${showForm ? matchFormHtml(catKey, m) : ''}
    </div>`;
}

function renderBracket(catKey){
  const cat = DB.categories[catKey];
  const cols = cat.rounds.map((rnd, idx)=>`
    <div class="round-col">
      <div class="round-title">${roundLabel(idx)}</div>
      <div class="matches">${rnd.map(m=>matchHtml(catKey,m)).join('')}</div>
    </div>`).join('');
  return `
    <h2>${cat.name}</h2>
    <p class="meta">${cat.type==='doppel'?'Doppel':'Einzel'} · 16er-Turnierbaum · ${cat.participants.length} Teilnehmer gemeldet</p>
    <div class="bracket">${cols}</div>`;
}

/* ============================= RENDER: ADMIN ============================= */
function renderLog(){
  if(DB.activityLog.length===0) return `<div class="empty">Noch keine Änderungen protokolliert.</div>`;
  return `<div class="log-list">${DB.activityLog.map(l=>`
    <div class="log"><div class="head"><span class="txt">${l.text}</span><span class="time">${timeAgo(l.time)}</span></div></div>
  `).join('')}</div>`;
}

function renderParticipants(catKey){
  const cat = DB.categories[catKey];
  return `
    <div class="taglist" id="participantTags">
      ${cat.participants.length===0 ? `<span style="color:var(--text-dim); font-size:12.5px;">Noch keine Teilnehmer.</span>` :
        cat.participants.map(p=>`<span class="tag">${p}<button class="rm-participant" data-name="${p}">×</button></span>`).join('')}
    </div>
    <div class="addrow">
      <input type="text" id="newParticipantInput" placeholder="Name eingeben (Vorname, Nachname)">
      <button class="btn" id="addParticipantBtn">Hinzufügen</button>
    </div>`;
}

function renderAdminExtra(catKey){
  const cat = DB.categories[catKey];
  return `
    <div style="height:34px;"></div>
    <div class="grid2">
      <div>
        <h2>Teilnehmerverwaltung — ${cat.name}</h2>
        <p class="meta">${cat.type==='doppel' ? 'Einzelne Personen anlegen; beim Zuweisen zu einer Turnierbaum-Position werden zwei Personen zu einem Team kombiniert.' : 'Alle Teilnehmer dieser Konkurrenz.'}</p>
        ${renderParticipants(catKey)}
      </div>
      <div>
        <h2>Änderungsprotokoll</h2>
        <p class="meta">Alle Änderungen an allen Konkurrenzen, neueste zuerst.</p>
        ${renderLog()}
      </div>
    </div>
    <div style="margin-top:24px; padding-top:18px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:center;">
      <button class="btn secondary" id="changePassBtn">Admin-Passwort ändern</button>
      <button class="btn danger" id="resetBtn">Turnierdaten zurücksetzen</button>
    </div>`;
}

/* ============================= MAIN RENDER ============================= */
function renderAll(){
  renderTicker();
  renderTabs();
  const panel = document.getElementById('mainPanel');
  const showAdminExtra = ui.role==='admin' && ui.adminAuthed;
  panel.innerHTML = renderBracket(ui.activeCat) + (showAdminExtra ? renderAdminExtra(ui.activeCat) : '');
  wirePanelEvents();

  document.getElementById('meLabel').textContent = (ui.role==='admin' && ui.adminAuthed) ? 'Angemeldet als Admin' : (ui.role==='player' && ui.me ? `Angemeldet als ${ui.me}` : '');
  document.getElementById('playerSelectWrap').style.display = ui.role==='player' ? 'flex' : 'none';
  document.getElementById('logoutBtn').style.display = (ui.role==='admin' && ui.adminAuthed) ? 'inline-block' : 'none';

  document.getElementById('footerNote').innerHTML =
    `Alle Turnierbäume sind fest auf 16 Positionen angelegt. Teilnehmer und Paarungen werden vom Admin gepflegt; Termine und Ergebnisse tragen die Spieler:innen selbst ein — ohne Passwort. Daten liegen im geteilten Speicher dieser Seite und sind für alle sichtbar, die diesen Link öffnen. Hinweis: Der Admin-Zugang ist ein einfacher Zugriffsschutz auf Vereinsebene, keine kryptografisch sichere Authentifizierung.`;
}

function wirePanelEvents(){
  document.querySelectorAll('.toggle-form').forEach(btn=>{
    btn.addEventListener('click', ()=>{ const id=btn.dataset.match; ui.openForm = ui.openForm===id+':play' ? null : id+':play'; renderAll(); });
  });
  document.querySelectorAll('.toggle-assign').forEach(btn=>{
    btn.addEventListener('click', ()=>{ const id=btn.dataset.match; ui.openForm = ui.openForm===id+':assign' ? null : id+':assign'; renderAll(); });
  });

  document.querySelectorAll('.as-save').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const slotIdx = parseInt(btn.dataset.slot,10);
      const suffix = slotIdx===0?'1':'2';
      const a = wrap.querySelector(`.as-p${suffix}a`).value;
      const bSel = wrap.querySelector(`.as-p${suffix}b`);
      const b = bSel ? bSel.value : null;
      if(!a){ alert('Bitte mindestens Spieler 1 auswählen.'); return; }
      const cat = DB.categories[ui.activeCat];
      const names = cat.type==='doppel' ? (b ? [a,b] : null) : [a];
      if(cat.type==='doppel' && !names){ alert('Bitte bei Doppel-Konkurrenzen zwei Spieler auswählen.'); return; }
      await assignSlot(ui.activeCat, matchId, slotIdx, 'player', names);
      ui.openForm = null;
      renderAll();
    });
  });
  document.querySelectorAll('.as-bye').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const slotIdx = parseInt(btn.dataset.slot,10);
      await assignSlot(ui.activeCat, matchId, slotIdx, 'bye', []);
      ui.openForm = null;
      renderAll();
    });
  });

  document.querySelectorAll('.f-save-date').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const date = wrap.querySelector('.f-date').value;
      const time = wrap.querySelector('.f-time').value;
      const court = wrap.querySelector('.f-court').value;
      const actor = (ui.role==='admin' && ui.adminAuthed) ? 'Admin' : (ui.me || 'Spieler');
      btn.disabled = true;
      await setMatchDate(ui.activeCat, matchId, date, time, court, actor);
      renderAll();
    });
  });
  document.querySelectorAll('.f-save-result').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const checked = wrap.querySelector(`input[name="winner-${matchId}"]:checked`);
      if(!checked){ alert('Bitte zuerst den Sieger auswählen.'); return; }
      const resultText = wrap.querySelector('.f-result').value;
      const actor = (ui.role==='admin' && ui.adminAuthed) ? 'Admin' : (ui.me || 'Spieler');
      btn.disabled = true;
      await setMatchResult(ui.activeCat, matchId, parseInt(checked.value,10), resultText, actor);
      ui.openForm = null;
      renderAll();
    });
  });

  const addBtn = document.getElementById('addParticipantBtn');
  if(addBtn){
    const doAdd = async ()=>{
      const inp = document.getElementById('newParticipantInput');
      if(inp.value.trim()){ await addParticipant(ui.activeCat, inp.value); renderAll(); }
    };
    addBtn.addEventListener('click', doAdd);
    document.getElementById('newParticipantInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
  }
  document.querySelectorAll('.rm-participant').forEach(btn=>{
    btn.addEventListener('click', async ()=>{ await removeParticipant(ui.activeCat, btn.dataset.name); renderAll(); });
  });

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn){
    resetBtn.addEventListener('click', async ()=>{
      if(confirm('Wirklich alle Turnierdaten, Teilnehmer und Ergebnisse zurücksetzen?')){ await resetTournament(); renderAll(); }
    });
  }
  const changePassBtn = document.getElementById('changePassBtn');
  if(changePassBtn){
    changePassBtn.addEventListener('click', ()=>{ showPasswordChangeModal(); });
  }
}

/* ============================= MODALS ============================= */
function showModal(html){
  document.getElementById('modalRoot').innerHTML = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function showAdminLoginModal(){
  showModal(`
    <h3>Admin-Bereich</h3>
    <input type="password" id="pwInput" placeholder="Passwort">
    <p class="err" id="pwErr" style="display:none;">Falsches Passwort.</p>
    <div class="row">
      <button class="btn secondary" id="pwCancel">Abbrechen</button>
      <button class="btn" id="pwOk">Anmelden</button>
    </div>`);
  const submit = ()=>{
    const val = document.getElementById('pwInput').value;
    if(val === DB.adminPassword){
      ui.adminAuthed = true;
      closeModal();
      renderAll();
    } else {
      document.getElementById('pwErr').style.display='block';
    }
  };
  document.getElementById('pwOk').addEventListener('click', submit);
  document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('pwCancel').addEventListener('click', ()=>{
    document.getElementById('roleSelect').value = 'player';
    ui.role='player';
    closeModal();
    renderAll();
  });
}

function showPasswordChangeModal(){
  showModal(`
    <h3>Admin-Passwort ändern</h3>
    <input type="password" id="newPw1" placeholder="Neues Passwort">
    <input type="password" id="newPw2" placeholder="Neues Passwort wiederholen">
    <p class="err" id="pwErr2" style="display:none;">Passwörter stimmen nicht überein.</p>
    <div class="row">
      <button class="btn secondary" id="pwCancel2">Abbrechen</button>
      <button class="btn" id="pwSave2">Speichern</button>
    </div>`);
  document.getElementById('pwCancel2').addEventListener('click', closeModal);
  document.getElementById('pwSave2').addEventListener('click', async ()=>{
    const p1 = document.getElementById('newPw1').value;
    const p2 = document.getElementById('newPw2').value;
    if(!p1 || p1!==p2){ document.getElementById('pwErr2').style.display='block'; return; }
    await changeAdminPassword(p1);
    closeModal();
    renderAll();
  });
}

/* ============================= TOP CONTROLS ============================= */
function fillPlayerSelect(){
  const sel = document.getElementById('playerSelect');
  const names = allParticipantsGlobal();
  sel.innerHTML = `<option value="">– auswählen –</option>` + names.map(n=>`<option value="${n}">${n}</option>`).join('');
  sel.value = ui.me || '';
}

document.getElementById('roleSelect').addEventListener('change', (e)=>{
  ui.role = e.target.value;
  ui.openForm = null;
  if(ui.role==='admin' && !ui.adminAuthed){
    showAdminLoginModal();
  } else {
    renderAll();
  }
});
document.getElementById('playerSelect').addEventListener('change', (e)=>{ ui.me = e.target.value; renderAll(); });
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  ui.adminAuthed = false; ui.role='player';
  document.getElementById('roleSelect').value='player';
  renderAll();
});

/* ============================= INIT + POLLING ============================= */
async function init(){
  await loadDB();
  fillPlayerSelect();
  renderAll();
  setInterval(async ()=>{
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      if(res && res.value){
        const fresh = JSON.parse(res.value);
        if(JSON.stringify(fresh) !== JSON.stringify(DB)){
          DB = fresh;
          fillPlayerSelect();
          renderAll();
        }
      }
    }catch(e){ /* ignore transient errors */ }
  }, 12000);
}
init();
</script>
