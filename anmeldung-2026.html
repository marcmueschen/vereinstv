<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelderner Stadtmeisterschaften 2026 — Anmeldung & Auslosung</title>
<style>
  :root{
    --bg: #0a1c14;
    --bg-elev: #102b1f;
    --bg-card: #143528;
    --line: #24503b;
    --text: #eef4ee;
    --text-dim: #9db3a5;
    --ball: #d4e157;
    --clay: #c05a2e;
    --danger: #e0563f;
    --radius: 10px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Roboto Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding-bottom:60px;}
  ::selection{background:var(--ball); color:#0a1c14;}
  a{color:var(--ball);}

  .hero{
    background: linear-gradient(160deg, #0d2419 0%, #061109 70%);
    border-bottom: 3px solid var(--ball);
    padding: 28px 20px 0 20px;
    position:relative; overflow:hidden;
  }
  .hero:before{
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .hero-eyebrow{font-family: var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color: var(--ball); opacity:.85; margin:0 0 6px 0;}
  .hero h1{margin:0; font-size: clamp(26px, 4.6vw, 42px); font-weight:800; letter-spacing:-0.02em; text-transform:uppercase; line-height:1.05;}
  .hero .sub{color:var(--text-dim); margin:8px 0 22px 0; font-size:14px; max-width:680px;}
  .ticker-wrap{background:#040c07; border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; position:relative;}
  .ticker-label{display:flex; align-items:center; gap:8px; background: var(--ball); color:#08170f; font-family:var(--mono); font-weight:700; font-size:11px; letter-spacing:.15em; text-transform:uppercase; padding:6px 12px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#08170f; animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .ticker-track{display:flex; gap:0; padding:10px 0; animation: scroll-x 32s linear infinite; width:max-content;}
  .ticker-wrap:hover .ticker-track{animation-play-state:paused;}
  @keyframes scroll-x{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .ticker-item{font-family:var(--mono); font-size:13px; white-space:nowrap; padding:0 26px; border-right:1px solid var(--line); color:#c9f27a; text-shadow:0 0 8px rgba(212,225,87,.35);}
  .ticker-item b{color:#fff; font-weight:700;}
  .ticker-item .t-cat{color:var(--text-dim); text-shadow:none;}
  @media (prefers-reduced-motion: reduce){ .ticker-track{animation:none; overflow-x:auto;} }

  .phase-banner{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    background:var(--bg-elev); border-bottom:1px solid var(--line); padding:10px 20px;
    font-family:var(--mono); font-size:12.5px;
  }
  .phase-banner .step{color:var(--text-dim); padding:3px 10px; border-radius:99px; border:1px solid var(--line);}
  .phase-banner .step.active{color:#08170f; background:var(--ball); border-color:var(--ball); font-weight:700;}
  .phase-banner .arrow{color:var(--text-dim);}
  .phase-banner .msg{margin-left:auto; color:var(--text-dim);}

  .rolebar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:14px 20px; background:var(--bg-elev); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;}
  .rolebar select, .rolebar button, .rolebar input{background:var(--bg-card); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:13px; font-family:var(--sans); cursor:pointer;}
  .rolebar select:focus, .rolebar button:focus, button:focus, input:focus, textarea:focus{outline:2px solid var(--ball); outline-offset:1px;}
  .rolebar .me{font-family:var(--mono); font-size:12px; color:var(--ball); margin-left:auto;}
  .pill{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; padding:4px 9px; border-radius:99px; border:1px solid var(--line); color:var(--text-dim);}
  .pill.live{border-color:var(--ball); color:var(--ball);}
  .err{color:#f0916c; font-size:12px; font-family:var(--mono);}
  .ok{color:#8fd6ac; font-size:12.5px; font-family:var(--mono);}

  .wrap{max-width:1200px; margin:0 auto; padding:0 20px;}
  .tabs{display:flex; gap:6px; flex-wrap:wrap; padding:18px 20px 0 20px; max-width:1200px; margin:0 auto;}
  .tab{font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em; padding:9px 14px; border-radius:8px 8px 0 0; border:1px solid var(--line); border-bottom:none; background:var(--bg-elev); color:var(--text-dim); cursor:pointer;}
  .tab.active{background:var(--bg-card); color:var(--ball); border-color:var(--ball);}

  .panel{background:var(--bg-card); border:1px solid var(--line); border-radius:0 10px 10px 10px; padding:24px 20px; max-width:1200px; margin:0 auto 30px auto;}
  .panel h2{margin:0 0 4px 0; font-size:20px; letter-spacing:-0.01em;}
  .panel .meta{color:var(--text-dim); font-size:12.5px; margin-bottom:20px; font-family:var(--mono);}

  .bracket{display:flex; gap:34px; overflow-x:auto; padding-bottom:14px;}
  .round-col{display:flex; flex-direction:column; min-width:250px; flex:1;}
  .round-title{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--ball); margin-bottom:14px; padding-bottom:8px; border-bottom:1px dashed var(--line);}
  .round-col .matches{display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:16px;}
  .match{background:var(--bg-elev); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px; position:relative;}
  .match.mine{border-color:var(--ball); box-shadow:0 0 0 1px var(--ball) inset;}
  .match.done{opacity:.72;}
  .slot{display:flex; justify-content:space-between; gap:8px; padding:4px 0;}
  .slot .nm{display:flex; gap:6px; align-items:baseline;}
  .slot.winner .nm{color:var(--ball); font-weight:700;}
  .slot.bye .nm, .slot.empty .nm{color:var(--text-dim); font-style:italic;}
  .vs-divider{border-top:1px solid var(--line); margin:2px 0;}
  .m-meta{margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); font-family:var(--mono); font-size:11px; color:var(--text-dim); display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center;}
  .badge{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:99px; border:1px solid var(--line); color:var(--text-dim);}
  .badge.pairing{border-color:var(--clay); color:#f0916c;}
  .badge.scheduled{border-color:var(--ball); color:var(--ball);}
  .badge.done{border-color:#5a8a72; color:#8fd6ac;}
  .badge.wait{color:var(--text-dim);}

  .contact-box{margin-top:8px; padding:8px 10px; background:var(--bg-card); border:1px dashed var(--ball); border-radius:6px; font-family:var(--mono); font-size:11.5px;}
  .contact-box .who{color:var(--ball); font-weight:700; margin-bottom:3px;}
  .contact-box a{color:var(--text);}

  .m-actions{margin-top:8px; display:flex; gap:14px; flex-wrap:wrap;}
  .m-actions button.link{background:none; border:none; color:var(--ball); font-family:var(--mono); font-size:11.5px; cursor:pointer; padding:2px 0; text-decoration:underline;}
  .m-form{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:grid; gap:8px;}
  .m-form label{display:block; font-size:11px; color:var(--text-dim); margin-bottom:3px; font-family:var(--mono);}
  .m-form input[type=text], .m-form input[type=date], .m-form input[type=time], .m-form select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:6px 8px; font-size:12.5px; font-family:var(--sans);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .m-form .radios{display:flex; flex-direction:column; gap:6px;}
  .m-form .radios label{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text); font-family:var(--sans);}
  .btn{background:var(--ball); color:#0a1c14; border:none; border-radius:7px; padding:8px 14px; font-weight:700; font-size:12.5px; cursor:pointer; font-family:var(--sans);}
  .btn.secondary{background:transparent; color:var(--ball); border:1px solid var(--ball);}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .empty{color:var(--text-dim); font-size:13px; padding:30px 0; text-align:center;}

  .log-list{display:flex; flex-direction:column; gap:8px; max-height:520px; overflow-y:auto;}
  .log{background:var(--bg-elev); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:12px;}
  .log .head{display:flex; justify-content:space-between; gap:10px;}
  .log .time{font-family:var(--mono); color:var(--text-dim); font-size:10.5px; white-space:nowrap;}
  .log .txt{color:var(--text);}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:720px;}
  .form-grid .full{grid-column:1 / -1;}
  .form-grid label{display:block; font-size:11.5px; color:var(--text-dim); margin-bottom:4px; font-family:var(--mono);}
  .form-grid input[type=text], .form-grid input[type=number], .form-grid input[type=tel], .form-grid input[type=email], .form-grid select{
    width:100%; background:var(--bg-elev); border:1px solid var(--line); border-radius:7px; color:var(--text); padding:9px 10px; font-size:13.5px; font-family:var(--sans);
  }
  .checklist{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .checklist label{display:flex; align-items:center; gap:8px; font-size:13px; font-family:var(--sans); color:var(--text); font-weight:400;}
  .checklist .hint{color:var(--text-dim); font-size:11px; font-family:var(--mono);}

  .regtable{width:100%; border-collapse:collapse; font-size:12px;}
  .regtable th, .regtable td{text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top;}
  .regtable th{color:var(--text-dim); font-family:var(--mono); font-weight:400; font-size:10.5px; text-transform:uppercase;}
  .regtable input, .regtable select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:5px 6px; font-size:11.5px;}
  .regtable .catchips{display:flex; flex-wrap:wrap; gap:4px;}
  .regtable .catchip{font-size:10px; font-family:var(--mono); border:1px solid var(--line); border-radius:99px; padding:2px 7px; cursor:pointer; color:var(--text-dim);}
  .regtable .catchip.on{border-color:var(--ball); color:var(--ball);}

  .meldeliste{display:flex; flex-wrap:wrap; gap:8px;}
  .meldeliste .card{background:var(--bg-elev); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:12.5px; min-width:180px;}
  .meldeliste .card .nm{font-weight:700;}
  .meldeliste .card .vr{color:var(--text-dim); font-family:var(--mono); font-size:11px;}

  .grid2{display:grid; grid-template-columns:1.2fr 1fr; gap:24px;}
  @media (max-width: 880px){ .grid2{grid-template-columns:1fr;} .bracket{flex-direction:column;} .round-col{min-width:0;} .form-grid{grid-template-columns:1fr;} }

  .footer-note{max-width:1200px; margin:0 auto; padding:0 20px 40px 20px; color:var(--text-dim); font-size:11.5px; font-family:var(--mono); line-height:1.6;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:100;}
  .modal{background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:22px; width:340px; max-width:90vw;}
  .modal h3{margin:0 0 10px 0; font-size:15px;}
  .modal input, .modal select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); padding:9px 10px; font-size:13px; margin-bottom:10px;}
  .modal .row{display:flex; gap:8px; justify-content:flex-end;}

  .drawbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
</style>
</head>
<body>

<div class="hero">
  <div class="wrap" style="padding:0;">
    <p class="hero-eyebrow">TC Geldern · Kapellen · Walbeck · Veert · Hartefeld</p>
    <h1>Gelderner Stadtmeisterschaften 2026</h1>
    <p class="sub" id="heroSub">Anmeldung, Auslosung und Turnierbäume für alle Konkurrenzen.</p>
    <div class="ticker-wrap">
      <div class="ticker-label"><span class="dot"></span> Anstehende Partien</div>
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </div>
  <div style="height:22px;"></div>
</div>

<div class="phase-banner" id="phaseBanner"></div>

<div class="rolebar wrap">
  <span class="pill live" id="storagePill">● live</span>
  <label style="font-size:12px; color:var(--text-dim); font-family:monospace;">Rolle</label>
  <select id="roleSelect">
    <option value="player">Spieler</option>
    <option value="admin">Admin</option>
  </select>
  <span id="playerLoginWrap" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <select id="playerSelect"><option value="">Ich bin –</option></select>
    <input type="email" id="playerEmailInput" placeholder="E-Mail zur Bestätigung" style="width:190px;">
    <button id="playerLoginBtn">Anmelden</button>
  </span>
  <button id="logoutBtn" style="display:none;">Abmelden</button>
  <span class="me" id="meLabel"></span>
</div>

<div class="tabs" id="tabs"></div>
<div class="panel" id="mainPanel"></div>

<div class="footer-note" id="footerNote"></div>
<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ============================= KONFIGURATION ============================= */
const TOURNAMENT_YEAR = 2026;
// Konkurrenzen werden nicht mehr fest vorgegeben, sondern vom Admin vor der
// Anmeldephase angelegt (Name, Mindestalter, Geschlecht, Art). Siehe DB.categories
// und DB.categoryOrder weiter unten sowie die Funktionen rund um "createCategory".
const VEREINE = ['TC Geldern','TC Kapellen','TC Walbeck','TC Veert','TC Hartefeld','Anderer Verein'];
const DRAW_SIZE = 16;
const TOTAL_ROUNDS = 4; // Achtelfinale, Viertelfinale, Halbfinale, Finale
const DEFAULT_ADMIN_PASSWORD = 'tcgeldern2026';

/* ============================= SUPABASE-KONFIGURATION =============================
   Eigenes, neues Projekt/Tabelle verwenden (unabhängig von der bisherigen laufenden Seite!).
   Anleitung: siehe ANLEITUNG-ANMELDUNG.md
*/
const SUPABASE_URL = 'DEINE_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'DEIN_SUPABASE_ANON_KEY';
const SUPABASE_TABLE = 'stadtmeisterschaften_anmeldung';
const SUPABASE_ROW_ID = 'main';

/* ============================= HILFSFUNKTIONEN ============================= */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function roundLabel(idx){
  const fromEnd = TOTAL_ROUNDS - idx;
  if(fromEnd===1) return 'Finale';
  if(fromEnd===2) return 'Halbfinale';
  if(fromEnd===3) return 'Viertelfinale';
  return 'Achtelfinale';
}
function findMatchById(rounds, id){
  for(const rnd of rounds) for(const m of rnd) if(m.id===id) return m;
  return null;
}
function getParticipant(id){ return DB.participants.find(p=>p.id===id) || null; }
function participantName(id){
  const p = getParticipant(id);
  return p ? `${p.vorname} ${p.nachname}` : '(gelöscht)';
}
function displayName(slot, catKey){
  if(slot.kind==='bye') return 'Freilos';
  if(slot.kind==='player'){
    const names = slot.ids.map(participantName);
    if(catKey && slot.ids.length===1){
      const p = getParticipant(slot.ids[0]);
      const partnerInfo = p && p.partners && p.partners[catKey];
      if(partnerInfo) names.push(`${partnerInfo.vorname} ${partnerInfo.nachname}`);
    }
    return names.join(' / ');
  }
  return '– offen –';
}
function isCategoryEligible(cat, geburtsjahr){
  if(!geburtsjahr) return false;
  if(cat.minAge==null) return true;
  return (TOURNAMENT_YEAR - geburtsjahr) >= cat.minAge;
}
function needsPartner(cat){ return cat.type==='doppel' || cat.type==='mixed'; }
function typeLabel(cat){ return cat.type==='doppel' ? 'Doppel' : cat.type==='mixed' ? 'Mixed' : 'Einzel'; }
function genderLabel(cat){ return cat.gender==='herren' ? 'Herren' : cat.gender==='damen' ? 'Damen' : ''; }
function activeCategories(){
  return (DB.categoryOrder||[]).filter(key=>DB.categories[key]).map(key=>({key, ...DB.categories[key]}));
}
function slugify(name){
  const base = name.trim().toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'konkurrenz';
  let key = base, i = 2;
  while(DB.categories[key]){ key = `${base}-${i}`; i++; }
  return key;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildEmptyBracket(catKey){
  const rounds = [];
  let count = DRAW_SIZE;
  for(let r=0;r<TOTAL_ROUNDS;r++){
    const matches = [];
    const numMatches = count/2;
    for(let i=0;i<numMatches;i++){
      matches.push({
        id: `${catKey}-r${r}-m${i}`,
        round:r,
        slots: [ {kind: r===0?'empty':'tbd', ids:[]}, {kind: r===0?'empty':'tbd', ids:[]} ],
        date:null, time:null, court:null,
        result:null, winnerSlot:null,
        nextMatchId:null, nextSlotIndex:i%2
      });
    }
    rounds.push(matches);
    count = numMatches;
  }
  for(let r=0;r<rounds.length-1;r++){
    rounds[r].forEach((m,i)=>{
      m.nextMatchId = rounds[r+1][Math.floor(i/2)].id;
      m.nextSlotIndex = i%2;
    });
  }
  return rounds;
}

function computeMatchStatus(m){
  const [s1,s2] = m.slots;
  if(m.result || m.winnerSlot!==null) return 'done';
  if(s1.kind==='tbd' || s2.kind==='tbd') return 'wait';
  if(s1.kind==='empty' || s2.kind==='empty') return 'unassigned';
  if(s1.kind==='bye' || s2.kind==='bye') return 'bye';
  if(m.date) return 'scheduled';
  return 'pairing';
}

function resetForward(cat, matchId){
  const m = findMatchById(cat.rounds, matchId);
  if(!m) return;
  m.date=null; m.time=null; m.court=null; m.result=null; m.winnerSlot=null;
  if(m.nextMatchId){
    const next = findMatchById(cat.rounds, m.nextMatchId);
    if(next){
      next.slots[m.nextSlotIndex] = {kind:'tbd', ids:[]};
      resetForward(cat, m.nextMatchId);
    }
  }
}

function propagateWinner(cat, m){
  if(m.winnerSlot===null || !m.nextMatchId) return;
  const winner = m.slots[m.winnerSlot];
  const nextMatch = findMatchById(cat.rounds, m.nextMatchId);
  nextMatch.slots[m.nextSlotIndex] = {kind: winner.kind==='bye' ? 'bye':'player', ids: winner.ids.slice()};
}

/* ============================= DB ============================= */
let DB = null;

function buildFreshDB(){
  return {
    phase: 'setup', // 'setup' | 'registration' | 'draw' | 'published'
    participants: [],
    categories: {},
    categoryOrder: [],
    activityLog: [],
    adminPassword: DEFAULT_ADMIN_PASSWORD,
    createdAt: new Date().toISOString()
  };
}

const storageState = { available:null, lastError:null };
let supa = null;

function isSupabaseConfigured(){
  return SUPABASE_URL && SUPABASE_ANON_KEY &&
    !SUPABASE_URL.includes('DEINE_SUPABASE_URL') && !SUPABASE_ANON_KEY.includes('DEIN_SUPABASE_ANON_KEY');
}
function initSupabase(){
  if(!isSupabaseConfigured()) return null;
  if(typeof window.supabase === 'undefined'){ console.error('Supabase-Bibliothek konnte nicht geladen werden.'); return null; }
  return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function migrateDB(db){
  if(!db.adminPassword) db.adminPassword = DEFAULT_ADMIN_PASSWORD;
  if(!db.categories) db.categories = {};
  if(!db.categoryOrder){
    // Ältere Datensätze hatten eine feste Kategorienliste ohne eigene Reihenfolge-Angabe.
    db.categoryOrder = Object.keys(db.categories);
  }
  Object.entries(db.categories).forEach(([key,c])=>{
    if(c.gender===undefined){
      const n = (c.name||'').toLowerCase();
      c.gender = n.includes('damen') ? 'damen' : n.includes('herren') ? 'herren' : null;
    }
  });
  if(!db.phase) db.phase = db.categoryOrder.length ? 'registration' : 'setup';
  return db;
}

async function loadDB(){
  supa = initSupabase();
  if(!supa){ DB = buildFreshDB(); setPillState(isSupabaseConfigured() ? 'error':'config'); return; }
  try{
    const { data, error } = await supa.from(SUPABASE_TABLE).select('data').eq('id', SUPABASE_ROW_ID).single();
    if(error) throw error;
    if(data && data.data && Object.keys(data.data).length){
      DB = migrateDB(data.data);
      setPillState('live');
      return;
    }
  }catch(e){
    storageState.lastError = (e && (e.message||e.toString())) || 'unbekannter Fehler';
    console.error('Laden aus Supabase fehlgeschlagen:', e);
  }
  DB = buildFreshDB();
  await saveDB();
}
async function saveDB(){
  if(!supa){ setPillState(isSupabaseConfigured() ? 'error':'config'); return; }
  try{
    const { error } = await supa.from(SUPABASE_TABLE).update({data:DB, updated_at:new Date().toISOString()}).eq('id', SUPABASE_ROW_ID);
    if(error) throw error;
    storageState.available = true; storageState.lastError = null;
    setPillState('live');
  }catch(e){
    storageState.available = false;
    storageState.lastError = (e && (e.message||e.toString())) || 'unbekannter Fehler';
    console.error('Speichern in Supabase fehlgeschlagen:', e);
    setPillState('error');
  }
}
function subscribeRealtime(){
  if(!supa) return;
  supa.channel('anmeldung_changes')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:SUPABASE_TABLE, filter:`id=eq.${SUPABASE_ROW_ID}`}, payload=>{
      if(payload.new && payload.new.data){
        DB = migrateDB(payload.new.data);
        fillPlayerSelect();
        renderAll();
      }
    }).subscribe();
}
function setPillState(mode){
  const p = document.getElementById('storagePill');
  if(!p) return;
  if(mode==='live'){ p.textContent='● live'; p.className='pill live'; p.title='Verbunden mit Supabase.'; }
  else if(mode==='config'){ p.textContent='● Supabase nicht konfiguriert'; p.className='pill'; p.title='Bitte SUPABASE_URL / SUPABASE_ANON_KEY eintragen.'; }
  else{ p.textContent='● Speicherfehler'; p.className='pill'; p.style.borderColor='var(--danger)'; p.style.color='#f0916c'; p.title='Fehler: '+(storageState.lastError||'unbekannt'); }
}

function normName(s){ return (s||'').trim().toLowerCase(); }

function tryLinkPartners(p){
  // Für jede Doppel-Konkurrenz von p: prüfen, ob bereits ein anderer Teilnehmer registriert ist,
  // der für dieselbe Konkurrenz denselben Namen als Partner angegeben hat (oder dessen eigener
  // Name zum eingetragenen Partnernamen passt) — dann beide Seiten gegenseitig verknüpfen.
  Object.keys(p.partners||{}).forEach(catKey=>{
    const partnerInfo = p.partners[catKey];
    if(!partnerInfo || partnerInfo.linkedId) return;
    const match = DB.participants.find(other=>
      other.id!==p.id &&
      other.categories.includes(catKey) &&
      normName(other.vorname)===normName(partnerInfo.vorname) &&
      normName(other.nachname)===normName(partnerInfo.nachname)
    );
    if(match){
      partnerInfo.linkedId = match.id;
      if(!match.partners) match.partners = {};
      if(!match.partners[catKey]){
        match.partners[catKey] = {vorname:p.vorname, nachname:p.nachname, telefon:p.telefon, email:p.email, linkedId:p.id};
      } else {
        match.partners[catKey].linkedId = p.id;
      }
    }
  });
}

async function createCategory({name, type, gender, minAge}){

    name: name.trim(), type, gender: type==='mixed' ? null : gender, minAge: minAge || null,
    rounds: buildEmptyBracket(key)

async function updateCategory(key, patch){
  const c = DB.categories[key];
  if(!c) return {ok:false};
  if(patch.type && patch.type!==c.type){
    const hasParticipants = DB.participants.some(p=>p.categories.includes(key));
    if(hasParticipants) return {ok:false, error:'Die Art kann nicht mehr geändert werden, sobald sich Teilnehmer für diese Konkurrenz angemeldet haben.'};
  }
  Object.assign(c, patch);
  if(c.type==='mixed') c.gender = null;
  log(`Konkurrenz geändert: ${c.name}`);
  await saveDB();
  return {ok:true};
}
async function deleteCategory(key){
  const c = DB.categories[key];
  if(!c) return;
  delete DB.categories[key];
  DB.categoryOrder = DB.categoryOrder.filter(k=>k!==key);
  DB.participants.forEach(p=>{
    p.categories = p.categories.filter(k=>k!==key);
    if(p.partners && p.partners[key]) delete p.partners[key];
  });
  log(`Konkurrenz gelöscht: ${c.name}`);
  await saveDB();
}

function assignedIdsInCategory(cat){
  const set = new Set();
  cat.rounds[0].forEach(m=>m.slots.forEach(s=>{ if(s.kind==='player') s.ids.forEach(id=>set.add(id)); }));
  return set;
}

// Ein "Team" (bei Einzel: eine Person, bei Doppel: Anmelder:in + der bei der Anmeldung
// angegebene Partner) ist bereits vollständig zum Anmeldezeitpunkt gebildet. Diese Funktion
// baut je Konkurrenz die Liste der Teams für Zuweisung/Auslosung, ohne verlinkte Partner
// doppelt als eigenes Team zu zählen.
function teamPoolForCategory(catKey){
  const cat = DB.categories[catKey];
  const seen = new Set();
  const entries = [];
  DB.participants.filter(p=>p.categories.includes(catKey)).forEach(p=>{
    if(seen.has(p.id)) return;
    seen.add(p.id);
    if(cat.type==='einzel'){
      entries.push({ids:[p.id], label:`${p.vorname} ${p.nachname} (${p.verein})`});
      return;
    }
    const partnerInfo = (p.partners && p.partners[catKey]) || null;
    const ids = [p.id];
    let label = `${p.vorname} ${p.nachname}`;
    if(partnerInfo){
      if(partnerInfo.linkedId){ seen.add(partnerInfo.linkedId); ids.push(partnerInfo.linkedId); }
      label += ` / ${partnerInfo.vorname} ${partnerInfo.nachname}`;
    } else {
      label += ` / (kein Partner angegeben)`;
    }
    entries.push({ids, label});
  });
  return entries;
}

async function assignSlot(catKey, matchId, slotIndex, kind, ids){
  const cat = DB.categories[catKey];
  const m = findMatchById(cat.rounds, matchId);
  const wasAssignment = m.slots[slotIndex].kind==='player' || m.slots[slotIndex].kind==='bye';
  const before = displayName(m.slots[slotIndex], catKey);
  resetForward(cat, matchId);
  m.slots[slotIndex] = {kind, ids: kind==='player' ? ids : []};
  const after = kind==='bye' ? 'Freilos' : displayName(m.slots[slotIndex], catKey);
  log(wasAssignment
    ? `Paarung geändert (${cat.name}, ${roundLabel(m.round)}): Feld ${slotIndex+1} „${before}“ → „${after}“ — Termin/Ergebnis zurückgesetzt.`
    : `Paarung gesetzt (${cat.name}, ${roundLabel(m.round)}): Feld ${slotIndex+1} → ${after}`);
  if(m.slots[0].kind==='bye' && m.slots[1].kind==='player'){ m.winnerSlot=1; propagateWinner(cat,m); }
  else if(m.slots[1].kind==='bye' && m.slots[0].kind==='player'){ m.winnerSlot=0; propagateWinner(cat,m); }
  await saveDB();
}

async function randomDrawRemaining(catKey){
  const cat = DB.categories[catKey];
  const already = assignedIdsInCategory(cat);
  const eligible = shuffle(teamPoolForCategory(catKey).filter(t=>!t.ids.some(id=>already.has(id))));
  const emptySlots = [];
  cat.rounds[0].forEach(m=>{ m.slots.forEach((s,idx)=>{ if(s.kind==='empty') emptySlots.push({m, idx}); }); });

  let placed = 0;
  for(const slot of emptySlots){
    if(eligible.length===0) break;
    const team = eligible.shift();
    slot.m.slots[slot.idx] = {kind:'player', ids:team.ids};
    if(slot.m.slots[0].kind==='bye' && slot.m.slots[1].kind==='player'){ slot.m.winnerSlot=1; propagateWinner(cat, slot.m); }
    else if(slot.m.slots[1].kind==='bye' && slot.m.slots[0].kind==='player'){ slot.m.winnerSlot=0; propagateWinner(cat, slot.m); }
    placed++;
  }
  log(`Zufällige Auslosung (${cat.name}): ${placed} Feld(er) besetzt.`);
  await saveDB();
  return {placed, remaining: eligible.length};
}

async function fillRemainingByes(catKey){
  const cat = DB.categories[catKey];
  let count = 0;
  cat.rounds[0].forEach(m=>{
    m.slots.forEach((s,idx)=>{
      if(s.kind==='empty'){ m.slots[idx] = {kind:'bye', ids:[]}; count++; }
    });
    if(m.slots[0].kind==='bye' && m.slots[1].kind==='player'){ m.winnerSlot=1; propagateWinner(cat,m); }
    else if(m.slots[1].kind==='bye' && m.slots[0].kind==='player'){ m.winnerSlot=0; propagateWinner(cat,m); }
  });
  log(`Restliche freie Felder (${cat.name}) mit Freilos aufgefüllt: ${count}`);
  await saveDB();
}

  await saveDB();
}

function fmtDate(iso){
  if(!iso) return null;
  const d = new Date(iso+'T00:00:00');
  const days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function timeAgo(iso){
  const diff = Date.now()-new Date(iso).getTime();
  const mnt = Math.floor(diff/60000);
  if(mnt<1) return 'gerade eben';
  if(mnt<60) return `vor ${mnt} Min.`;
  const h = Math.floor(mnt/60);
  if(h<24) return `vor ${h} Std.`;
  return `vor ${Math.floor(h/24)} Tg.`;
}

    const partnerInfo = p && p.partners && p.partners[catKey];
    if(partnerInfo && (partnerInfo.telefon || partnerInfo.email)){
      lines.push(`<div>${partnerInfo.vorname} ${partnerInfo.nachname} · ${partnerInfo.telefon?`<a href="tel:${partnerInfo.telefon}">${partnerInfo.telefon}</a>`:'keine Telefonnummer'} · ${partnerInfo.email?`<a href="mailto:${partnerInfo.email}">${partnerInfo.email}</a>`:'keine E-Mail'}</div>`);
    } else if(partnerInfo){
      lines.push(`<div>${partnerInfo.vorname} ${partnerInfo.nachname} · keine Kontaktdaten hinterlegt (Partner hat sich nicht selbst angemeldet)</div>`);
    }
  }
  if(lines.length===0) return '';
  return `<div class="contact-box"><div class="who">Kontakt Gegner:in — Termin vereinbaren:</div>${lines.join('')}</div>`;
}

function assignFormHtml(catKey, m){
  const cat = DB.categories[catKey];
  const already = assignedIdsInCategory(cat);
  const cur = [m.slots[0].ids.slice(), m.slots[1].ids.slice()];
  const pool = teamPoolForCategory(catKey).filter(t=>
    !t.ids.some(id=>already.has(id)) || t.ids.some(id=>cur[0].includes(id)) || t.ids.some(id=>cur[1].includes(id))
  );
  const optionsFor = (curIds) => `<option value="">–</option>` + pool.map(t=>
    `<option value="${t.ids.join(',')}" ${t.ids[0]===curIds[0]?'selected':''}>${t.label}</option>`
  ).join('');
  return `
    <div class="m-form" data-match="${m.id}" data-mode="assign">
      <div class="row2">
        <div>
          <label>Feld 1 — Team/Spieler</label>
          <select class="as-p1">${optionsFor(cur[0])}</select>
          <button class="btn secondary as-save" data-slot="0" style="margin-top:6px;">Feld 1 setzen</button>
          <button class="btn secondary as-bye" data-slot="0" style="margin-top:6px;">Freilos setzen</button>
        </div>
        <div>
          <label>Feld 2 — Team/Spieler</label>
          <select class="as-p2">${optionsFor(cur[1])}</select>
          <button class="btn secondary as-save" data-slot="1" style="margin-top:6px;">Feld 2 setzen</button>
          <button class="btn secondary as-bye" data-slot="1" style="margin-top:6px;">Freilos setzen</button>
        </div>
      </div>
      ${pool.length===0 ? `<p class="err">Niemand (mehr) aus der Meldeliste dieser Konkurrenz verfügbar.</p>`:''}
      ${(m.date || m.result) ? `<p class="err">Achtung: Termin${m.result?' und Ergebnis':''} dieser Partie sind bereits gesetzt. Ein Tausch löscht Termin/Ergebnis dieser und nachfolgender Partien.</p>` : ''}
    </div>`;
}

function matchFormHtml(catKey, m){
  const st = computeMatchStatus(m);
  if(st!=='pairing' && st!=='scheduled') return '';
  return `
    <div class="m-form" data-match="${m.id}" data-mode="play">
      <div>
        <label>Termin (Datum, Uhrzeit, Platz)</label>
        <div class="row2">
          <input type="date" class="f-date" value="${m.date||''}">
          <input type="time" class="f-time" value="${m.time||''}">

        <input type="text" class="f-court" placeholder="Platz / Ort" value="${m.court||''}" style="margin-top:6px;">
        <button class="btn secondary f-save-date" style="margin-top:8px;">Termin speichern</button>
      </div>
      <div>
        <label>Ergebnis eintragen</label>
        <div class="radios">
          <label><input type="radio" name="winner-${m.id}" value="0"> Sieger: ${displayName(m.slots[0],catKey)}</label>
          <label><input type="radio" name="winner-${m.id}" value="1"> Sieger: ${displayName(m.slots[1],catKey)}</label>

        <button class="btn f-save-result" style="margin-top:8px;">Ergebnis speichern</button>
      </div>
    </div>`;
}

function matchHtml(catKey, m){
  const mine = isMyMatch(m) ? 'mine' : '';
  const done = computeMatchStatus(m)==='done' ? 'done' : '';
  const showForm = ui.openForm===m.id+':play';
  const showAssign = ui.openForm===m.id+':assign';
  const canPlay = (ui.role==='admin' && ui.adminAuthed) || (ui.role==='player' && ui.playerAuthed && isMyMatch(m));
  const st = computeMatchStatus(m);
  const canAssign = ui.role==='admin' && ui.adminAuthed && m.round===0 && DB.phase!=='registration';
  const assignLabel = st==='unassigned' ? 'Teilnehmer zuweisen' : 'Teilnehmer tauschen';
  return `
    <div class="match ${mine} ${done}" data-match="${m.id}">
      ${slotHtml(m.slots[0], m, 0, catKey)}
      <div class="vs-divider"></div>
      ${slotHtml(m.slots[1], m, 1, catKey)}
      <div class="m-meta">
        ${statusBadge(m)}
        ${m.date ? `<span>${fmtDate(m.date)}, ${m.time||''} Uhr${m.court?(' · '+m.court):''}</span>` : ''}
        ${m.result ? `<span>Ergebnis: ${m.result}</span>` : ''}
        ${mine ? `<span class="badge" style="border-color:var(--ball); color:var(--ball);">deine Partie</span>` : ''}
      </div>
      ${contactBoxHtml(m, catKey)}
      <div class="m-actions">
        ${canAssign ? `<button class="link toggle-assign" data-match="${m.id}">${showAssign?'Zuweisung schließen':assignLabel}</button>` : ''}
        ${canPlay && (st==='pairing'||st==='scheduled') ? `<button class="link toggle-form" data-match="${m.id}">${showForm?'Formular schließen':'Termin / Ergebnis eintragen'}</button>` : ''}
      </div>
      ${showAssign ? assignFormHtml(catKey, m) : ''}
      ${showForm ? matchFormHtml(catKey, m) : ''}
    </div>`;
}

function renderBracket(catKey){
  const cat = DB.categories[catKey];
  const cols = cat.rounds.map((rnd, idx)=>`
    <div class="round-col">
      <div class="round-title">${roundLabel(idx)}</div>
      <div class="matches">${rnd.map(m=>matchHtml(catKey,m)).join('')}</div>
    </div>`).join('');
  const assigned = cat.rounds[0].filter(m=>m.slots[0].kind!=='empty' && m.slots[1].kind!=='empty').length;
  const regs = DB.participants.filter(p=>p.categories.includes(catKey)).length;
  return `
    <h2>${cat.name}</h2>
    <p class="meta">${typeLabel(cat)}${genderLabel(cat)?` · ${genderLabel(cat)}`:''} · 16er-Turnierbaum · ${assigned}/8 Erstrunden-Partien besetzt · ${regs} Anmeldungen</p>
    <div class="bracket">${cols}</div>`;
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  const cats = activeCategories();
  if(cats.length===0){ tabs.innerHTML=''; return; }
  if(!ui.activeCat || !DB.categories[ui.activeCat]) ui.activeCat = cats[0].key;
  tabs.innerHTML = cats.map(cat=>{
    const active = cat.key===ui.activeCat ? 'active' : '';
    return `<div class="tab ${active}" data-cat="${cat.key}">${cat.name}</div>`;
  }).join('');
  tabs.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{ ui.activeCat = t.dataset.cat; ui.openForm=null; renderAll(); });
  });
}

/* ============================= ERINNERUNGEN (ADMIN) ============================= */
function defaultReminderState(){
  return {
    open: false,
    cats: new Set(activeCategories().map(c=>c.key)),
    rounds: new Set([0,1,2]), // Achtelfinale, Viertelfinale, Halbfinale (Finale bewusst nicht vorausgewählt)
    excluded: new Set(),
    subject: 'Erinnerung: Termin für deine Partie bei den Stadtmeisterschaften',
    body: `Hallo,

wir möchten euch daran erinnern, für eure anstehende Partie bei den Gelderner Stadtmeisterschaften 2026 zeitnah einen Termin zu vereinbaren und diesen auf der Turnierseite einzutragen.

Bitte stimmt euch möglichst bald mit eurem/eurer Gegner:in ab.

Sportliche Grüße
Der Vorstand TC Geldern`
  };
}

function computeAffectedMatches(){
  if(!ui.reminder) return [];
  const out = [];
  activeCategories().forEach(cat=>{
    if(!ui.reminder.cats.has(cat.key)) return;
    const c = DB.categories[cat.key];
    c.rounds.forEach((rnd, rIdx)=>{
      if(!ui.reminder.rounds.has(rIdx)) return;
      rnd.forEach(m=>{
        if(computeMatchStatus(m)==='pairing' && !ui.reminder.excluded.has(m.id)){
          out.push({catKey:cat.key, catName:c.name, roundIdx:rIdx, m});
        }
      });
    });
  });
  return out;
}

function matchRecipients(catKey, m){
  const list = [];
  m.slots.forEach(s=>{
    if(s.kind!=='player') return;
    s.ids.forEach(id=>{
      const p = getParticipant(id);
      if(p && p.email) list.push({name:`${p.vorname} ${p.nachname}`, email:p.email});
    });
    if(s.ids.length===1){
      const p = getParticipant(s.ids[0]);
      const partnerInfo = p && p.partners && p.partners[catKey];
      if(partnerInfo && partnerInfo.email) list.push({name:`${partnerInfo.vorname} ${partnerInfo.nachname}`, email:partnerInfo.email});
    }
  });
  return list;
}

function renderReminderTool(){
  if(DB.phase!=='published') return '';
  if(!ui.reminder) ui.reminder = defaultReminderState();
  const r = ui.reminder;
  if(!r.open){
    return `<div style="margin:20px 0;"><button class="btn secondary" id="openReminderBtn">Spieler an offene Termine erinnern</button></div>`;
  }
  const affected = computeAffectedMatches();
  const recMap = new Map();
  affected.forEach(a=>matchRecipients(a.catKey, a.m).forEach(p=>recMap.set(p.email.toLowerCase(), p)));
  const recipients = Array.from(recMap.values());
  const bccString = recipients.map(p=>p.email).join(',');
  const mailtoLen = bccString.length + r.subject.length + r.body.length;
  const mailtoTooLong = mailtoLen > 1500;

  return `
    <div style="margin:20px 0; padding:18px; background:var(--bg-elev); border:1px solid var(--line); border-radius:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <h2 style="margin:0;">Spieler an offene Termine erinnern</h2>
        <button class="link" id="closeReminderBtn" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-family:var(--mono); font-size:12px; text-decoration:underline;">schließen</button>
      </div>
      <p class="meta">Erinnert alle Spieler:innen, deren Paarung feststeht, die aber noch keinen Termin eingetragen haben ("Termin offen"). Es wird keine E-Mail automatisch verschickt — du bekommst eine fertige Empfängerliste und einen Textvorschlag zum Versenden über dein eigenes E-Mail-Programm.</p>

      <div class="grid2">
        <div>
          <label style="font-family:var(--mono); font-size:11px; color:var(--text-dim);">Konkurrenzen</label>
          <div class="checklist" style="margin:6px 0 14px 0;">
            ${activeCategories().map(c=>`<label><input type="checkbox" class="remCatCb" value="${c.key}" ${r.cats.has(c.key)?'checked':''}> ${c.name}</label>`).join('')}
          </div>
        </div>
        <div>
          <label style="font-family:var(--mono); font-size:11px; color:var(--text-dim);">Runden</label>
          <div class="checklist" style="margin:6px 0 14px 0;">
            ${[0,1,2,3].map(i=>`<label><input type="checkbox" class="remRoundCb" value="${i}" ${r.rounds.has(i)?'checked':''}> ${roundLabel(i)}</label>`).join('')}
          </div>
        </div>
      </div>

      <label style="font-family:var(--mono); font-size:11px; color:var(--text-dim);">Betroffene Partien (${affected.length}) — einzelne Partien lassen sich hier ausschließen</label>
      <div class="checklist" style="margin:6px 0 14px 0; max-height:200px; overflow-y:auto;">
        ${affected.length===0 ? `<span class="hint">Keine Partien mit offenem Termin für diese Auswahl.</span>` :
          affected.map(a=>`<label><input type="checkbox" class="remMatchCb" value="${a.m.id}" checked> ${a.catName} · ${roundLabel(a.roundIdx)} · ${displayName(a.m.slots[0],a.catKey)} – ${displayName(a.m.slots[1],a.catKey)}</label>`).join('')}
      </div>

      <label style="font-family:var(--mono); font-size:11px; color:var(--text-dim);">Empfänger (${recipients.length})</label>
      <textarea id="remEmailList" readonly rows="2" style="width:100%; background:var(--bg); border:1px solid var(--line); border-radius:7px; color:var(--text); padding:8px 10px; font-size:12px; font-family:var(--mono); margin:6px 0 14px 0;">${recipients.map(p=>p.email).join('; ')}</textarea>

      <div class="form-grid" style="margin-bottom:6px;">
        <div class="full"><label>Betreff</label><input type="text" id="remSubject" value="${r.subject.replace(/"/g,'&quot;')}"></div>
        <div class="full"><label>Text</label><textarea id="remBody" rows="8" style="width:100%; background:var(--bg-elev); border:1px solid var(--line); border-radius:7px; color:var(--text); padding:9px 10px; font-size:13px; font-family:var(--sans);">${r.body}</textarea></div>
      </div>

      <div class="drawbar">
        <button class="btn" id="remMailtoBtn" ${recipients.length===0||mailtoTooLong?'disabled':''}>E-Mail-Programm öffnen (BCC an alle)</button>
        <button class="btn secondary" id="remCopyBtn" ${recipients.length===0?'disabled':''}>E-Mail-Adressen kopieren</button>
      </div>
      ${mailtoTooLong ? `<p class="err">Zu viele Empfänger/zu langer Text für einen direkten Mail-Link. Bitte "E-Mail-Adressen kopieren" nutzen und manuell ins BCC-Feld eines E-Mail-Programms einfügen.</p>` : ''}
      <p id="remCopyStatus" class="ok" style="display:none;">E-Mail-Adressen wurden in die Zwischenablage kopiert.</p>
    </div>`;
}

/* ============================= MAIN RENDER ============================= */
function renderAll(){
  renderTicker();
  renderPhaseBanner();
  renderTabs();
  const panel = document.getElementById('mainPanel');
  const isAdmin = ui.role==='admin' && ui.adminAuthed;
  let html = '';
  if(DB.phase==='setup'){
    if(isAdmin){
      html += renderCategoryManager();
      html += `<div style="height:20px;"></div>`;
      html += renderPhaseControls();
    } else {
      html += `<div class="empty">Die Anmeldung ist noch nicht eröffnet. Bitte etwas später wiederkommen.</div>`;
    }
  } else if(DB.phase==='registration' && !isAdmin){
    html += registrationFormHtml();
    html += `<div style="height:30px;"></div>`;
    html += meldelisteHtml(ui.activeCat);
  } else if(DB.phase==='registration' && isAdmin){
    html += `<p class="meta" style="margin-bottom:16px;">Die Anmeldung ist öffentlich sichtbar. Konkurrenzen/Turnierbäume erscheinen, sobald die Anmeldung geschlossen wird.</p>`;
    html += meldelisteHtml(ui.activeCat);
    html += renderAdminExtra(ui.activeCat);
  } else if(DB.phase==='draw' && !isAdmin){
    html += activeCategories().length ? meldelisteHtml(ui.activeCat) : `<div class="empty">Keine Konkurrenzen vorhanden.</div>`;
  } else if(DB.phase==='draw' && isAdmin){
    if(activeCategories().length===0){
      html += `<div class="empty">Keine Konkurrenzen vorhanden — bitte zunächst welche anlegen.</div>`;
    } else {
      html += `<h2>${DB.categories[ui.activeCat].name} — Auslosung</h2>`;
      html += drawControlsHtml(ui.activeCat);
      html += renderBracket(ui.activeCat);
    }
    html += renderAdminExtra(ui.activeCat);
  } else { // published
    html += activeCategories().length ? renderBracket(ui.activeCat) : `<div class="empty">Keine Konkurrenzen vorhanden.</div>`;
    if(isAdmin){ if(activeCategories().length) html += drawControlsHtml(ui.activeCat); html += renderAdminExtra(ui.activeCat); }
  }
  panel.innerHTML = html;
  wirePanelEvents();

  document.getElementById('meLabel').textContent = isAdmin ? 'Angemeldet als Admin' : (ui.playerAuthed ? `Angemeldet als ${participantName(ui.me)}` : '');
  document.getElementById('playerLoginWrap').style.display = (ui.role==='player' && !ui.playerAuthed) ? 'flex' : 'none';
  document.getElementById('logoutBtn').style.display = (isAdmin || ui.playerAuthed) ? 'inline-block' : 'none';

  if(DB.phase==='registration' && !isAdmin){
    document.getElementById('regJahr').addEventListener('input', updateRegCatList);
  }

  document.getElementById('footerNote').innerHTML =
    `Konkurrenzen anlegen → Anmeldung → Auslosung → Veröffentlichung wird vom Vorstand gesteuert. Termine/Ergebnisse tragen die Spieler:innen nach Login selbst ein. Kontaktdaten werden ausschließlich dem/der jeweils aktuellen Gegner:in angezeigt, sonst niemandem. Der Admin-Zugang ist ein einfacher Zugriffsschutz auf Vereinsebene, keine kryptografisch sichere Authentifizierung.`;
}

function wirePanelEvents(){
  // Anmeldeformular
  const regBtn = document.getElementById('regSubmitBtn');
  if(regBtn){
    updateRegCatList();
    regBtn.addEventListener('click', async ()=>{
      const vorname = document.getElementById('regVorname').value;
      const nachname = document.getElementById('regNachname').value;
      const verein = document.getElementById('regVerein').value;
      const geburtsjahr = parseInt(document.getElementById('regJahr').value,10);
      const telefon = document.getElementById('regTelefon').value;
      const email = document.getElementById('regEmail').value;
      const categories = Array.from(document.querySelectorAll('.regCatCb:checked')).map(cb=>cb.value);
      const box = document.getElementById('regMsgBox');
      if(!vorname.trim() || !nachname.trim() || !geburtsjahr || !telefon.trim() || !email.trim() || categories.length===0){
        box.innerHTML = `<p class="err">Bitte alle Pflichtfelder ausfüllen und mindestens eine Konkurrenz auswählen.</p>`; return;
      }
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.trim())){
        box.innerHTML = `<p class="err">Bitte eine gültige E-Mail-Adresse angeben.</p>`; return;
      }
      const partners = {};
      for(const catKey of categories){
        if(DB.categories[catKey].type!=='doppel') continue;
        const pv = document.querySelector(`.partnerVorname[data-cat="${catKey}"]`).value.trim();
        const pn = document.querySelector(`.partnerNachname[data-cat="${catKey}"]`).value.trim();
        if(!pv || !pn){
          box.innerHTML = `<p class="err">Bitte für "${DB.categories[catKey].name}" den Vor- und Nachnamen des Partners / der Partnerin angeben.</p>`; return;
        }
        partners[catKey] = {
          vorname: pv, nachname: pn,
          telefon: document.querySelector(`.partnerTelefon[data-cat="${catKey}"]`).value.trim(),
          email: document.querySelector(`.partnerEmail[data-cat="${catKey}"]`).value.trim(),
          linkedId: null
        };
      }
      regBtn.disabled = true;
      const res = await registerParticipant({vorname, nachname, verein, geburtsjahr, telefon, email, categories, partners});
      regBtn.disabled = false;
      if(!res.ok){ box.innerHTML = `<p class="err">${res.error}</p>`; return; }
      renderAll();
      const freshBox = document.getElementById('regMsgBox');
      if(freshBox) freshBox.innerHTML = `<p class="ok">Danke, ${res.participant.vorname}! Deine Anmeldung für ${res.participant.categories.map(k=>DB.categories[k].name).join(', ')} ist eingegangen.</p>`;
    });
  }

  // Turnierbaum-Formulare
  document.querySelectorAll('.toggle-form').forEach(btn=>{
    btn.addEventListener('click', ()=>{ const id=btn.dataset.match; ui.openForm = ui.openForm===id+':play' ? null : id+':play'; renderAll(); });
  });
  document.querySelectorAll('.toggle-assign').forEach(btn=>{
    btn.addEventListener('click', ()=>{ const id=btn.dataset.match; ui.openForm = ui.openForm===id+':assign' ? null : id+':assign'; renderAll(); });
  });
  document.querySelectorAll('.as-save').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const slotIdx = parseInt(btn.dataset.slot,10);
      const sel = wrap.querySelector(`.as-p${slotIdx+1}`);
      const val = sel.value;
      if(!val){ alert('Bitte ein Team/eine Person auswählen.'); return; }
      const ids = val.split(',');
      await assignSlot(ui.activeCat, matchId, slotIdx, 'player', ids);
      ui.openForm = null; renderAll();
    });
  });
  document.querySelectorAll('.as-bye').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      await assignSlot(ui.activeCat, wrap.dataset.match, parseInt(btn.dataset.slot,10), 'bye', []);
      ui.openForm = null; renderAll();
    });
  });
  document.querySelectorAll('.f-save-date').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const date = wrap.querySelector('.f-date').value;
      const time = wrap.querySelector('.f-time').value;
      const court = wrap.querySelector('.f-court').value;
      const actor = (ui.role==='admin' && ui.adminAuthed) ? 'Admin' : participantName(ui.me);
      btn.disabled = true;
      await setMatchDate(ui.activeCat, matchId, date, time, court, actor);
      renderAll();
    });
  });
  document.querySelectorAll('.f-save-result').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const wrap = btn.closest('.m-form');
      const matchId = wrap.dataset.match;
      const checked = wrap.querySelector(`input[name="winner-${matchId}"]:checked`);
      if(!checked){ alert('Bitte zuerst den Sieger auswählen.'); return; }
      const resultText = wrap.querySelector('.f-result').value;
      const actor = (ui.role==='admin' && ui.adminAuthed) ? 'Admin' : participantName(ui.me);
      btn.disabled = true;
      await setMatchResult(ui.activeCat, matchId, parseInt(checked.value,10), resultText, actor);
      ui.openForm = null; renderAll();
    });
  });

  // Auslosung
  const drawBtn = document.getElementById('randomDrawBtn');
  if(drawBtn){ drawBtn.addEventListener('click', async ()=>{ await randomDrawRemaining(drawBtn.dataset.cat); renderAll(); }); }
  const byeBtn = document.getElementById('fillByeBtn');
  if(byeBtn){ byeBtn.addEventListener('click', async ()=>{
    if(confirm('Alle verbleibenden freien Felder dieser Konkurrenz mit Freilos auffüllen?')){ await fillRemainingByes(byeBtn.dataset.cat); renderAll(); }
  }); }

  // Phasensteuerung
  const phaseNext = document.getElementById('phaseNextBtn');
  if(phaseNext){ phaseNext.addEventListener('click', async ()=>{
    if(DB.phase==='setup'){
      if(DB.categoryOrder.length===0){ alert('Bitte zuerst mindestens eine Konkurrenz anlegen.'); return; }
      if(confirm('Anmeldung jetzt öffnen? Die angelegten Konkurrenzen werden dann für Anmeldungen sichtbar.')){ await setPhase('registration'); renderAll(); }
    } else if(DB.phase==='registration'){
      if(confirm('Anmeldung wirklich schließen? Danach können sich keine neuen Teilnehmer mehr anmelden (der Admin kann aber weiterhin Teilnehmer manuell hinzufügen).')){ await setPhase('draw'); renderAll(); }
    } else if(DB.phase==='draw'){
      if(confirm('Auslosung jetzt veröffentlichen? Der Turnierbaum wird danach für alle sichtbar.')){ await setPhase('published'); renderAll(); }
    }
  }); }
  const phaseBack = document.getElementById('phaseBackBtn');
  if(phaseBack){ phaseBack.addEventListener('click', async ()=>{
    const target = DB.phase==='published' ? 'draw' : DB.phase==='draw' ? 'registration' : 'setup';
    if(confirm('Wirklich zurückgehen?')){ await setPhase(target); renderAll(); }
  }); }

  // Konkurrenzen-Verwaltung (Admin)
  const toggleCatMgrBtn = document.getElementById('toggleCatMgrBtn');
  if(toggleCatMgrBtn){ toggleCatMgrBtn.addEventListener('click', ()=>{ ui.showCatManager = !ui.showCatManager; renderAll(); }); }
  const newCatType = document.getElementById('newCatType');
  if(newCatType){
    const syncGenderVisibility = ()=>{
      document.getElementById('newCatGenderWrap').style.display = newCatType.value==='mixed' ? 'none' : 'block';
    };
    newCatType.addEventListener('change', syncGenderVisibility);
    syncGenderVisibility();
  }
  const addCatBtn = document.getElementById('addCatBtn');
  if(addCatBtn){ addCatBtn.addEventListener('click', async ()=>{
    const name = document.getElementById('newCatName').value.trim();
    const type = document.getElementById('newCatType').value;
    const gender = document.getElementById('newCatGender').value;
    const minAgeRaw = document.getElementById('newCatMinAge').value;
    const minAge = minAgeRaw ? parseInt(minAgeRaw,10) : null;
    if(!name){ alert('Bitte einen Namen für die Konkurrenz eingeben.'); return; }
    await createCategory({name, type, gender, minAge});
    renderAll();
  }); }
  document.querySelectorAll('.edit-cat').forEach(btn=>{
    btn.addEventListener('click', ()=>showEditCategoryModal(btn.dataset.key));
  });
  document.querySelectorAll('.del-cat').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const c = DB.categories[btn.dataset.key];
      const hasRegs = DB.participants.some(p=>p.categories.includes(btn.dataset.key));
      const msg = hasRegs
        ? `"${c.name}" hat bereits Anmeldungen — trotzdem löschen? Die Konkurrenz-Zuordnung wird bei den betroffenen Teilnehmer:innen entfernt.`
        : `Konkurrenz "${c.name}" wirklich löschen?`;
      if(confirm(msg)){ await deleteCategory(btn.dataset.key); renderAll(); }
    });
  });

  // Anmeldungen-Tabelle (Admin)
  document.querySelectorAll('.catchip').forEach(chip=>{
    chip.addEventListener('click', async ()=>{
      const id = chip.dataset.id, catKey = chip.dataset.cat;
      const p = getParticipant(id);
      const set = new Set(p.categories);
      if(set.has(catKey)) set.delete(catKey); else set.add(catKey);
      await updateParticipant(id, {categories: Array.from(set)});
      renderAll();
    });
  });
  document.querySelectorAll('.rm-reg').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(confirm('Diese Anmeldung wirklich entfernen?')){ await removeParticipant(btn.dataset.id); renderAll(); }
    });
  });
  const addRegBtn = document.getElementById('addRegBtn');
  if(addRegBtn){ addRegBtn.addEventListener('click', showAddParticipantModal); }

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn){ resetBtn.addEventListener('click', async ()=>{
    if(confirm('Wirklich ALLE Daten zurücksetzen (Anmeldungen, Turnierbäume, Termine, Ergebnisse)?')){ await resetTournament(); renderAll(); }
  }); }
  const changePassBtn = document.getElementById('changePassBtn');
  if(changePassBtn){ changePassBtn.addEventListener('click', showPasswordChangeModal); }

  // Erinnerungs-Tool
  const openReminderBtn = document.getElementById('openReminderBtn');
  if(openReminderBtn){ openReminderBtn.addEventListener('click', ()=>{
    if(!ui.reminder) ui.reminder = defaultReminderState();
    ui.reminder.open = true; renderAll();
  }); }
  const closeReminderBtn = document.getElementById('closeReminderBtn');
  if(closeReminderBtn){ closeReminderBtn.addEventListener('click', ()=>{ ui.reminder.open = false; renderAll(); }); }
  document.querySelectorAll('.remCatCb').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      if(cb.checked) ui.reminder.cats.add(cb.value); else ui.reminder.cats.delete(cb.value);
      renderAll();
    });
  });
  document.querySelectorAll('.remRoundCb').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const idx = parseInt(cb.value,10);
      if(cb.checked) ui.reminder.rounds.add(idx); else ui.reminder.rounds.delete(idx);
      renderAll();
    });
  });
  document.querySelectorAll('.remMatchCb').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      if(cb.checked) ui.reminder.excluded.delete(cb.value); else ui.reminder.excluded.add(cb.value);
      renderAll();
    });
  });
  const remSubject = document.getElementById('remSubject');
  if(remSubject){ remSubject.addEventListener('input', ()=>{ ui.reminder.subject = remSubject.value; }); }
  const remBody = document.getElementById('remBody');
  if(remBody){ remBody.addEventListener('input', ()=>{ ui.reminder.body = remBody.value; }); }
  const remMailtoBtn = document.getElementById('remMailtoBtn');
  if(remMailtoBtn){ remMailtoBtn.addEventListener('click', ()=>{
    const affected = computeAffectedMatches();
    const recMap = new Map();
    affected.forEach(a=>matchRecipients(a.catKey, a.m).forEach(p=>recMap.set(p.email.toLowerCase(), p)));
    const emails = Array.from(recMap.values()).map(p=>p.email);
    const url = `mailto:?bcc=${encodeURIComponent(emails.join(','))}&subject=${encodeURIComponent(ui.reminder.subject)}&body=${encodeURIComponent(ui.reminder.body)}`;
    log(`Erinnerungs-E-Mail vorbereitet (${emails.length} Empfänger, ${affected.length} Partien).`);
    saveDB();
    window.location.href = url;
  }); }
  const remCopyBtn = document.getElementById('remCopyBtn');
  if(remCopyBtn){ remCopyBtn.addEventListener('click', async ()=>{
    const list = document.getElementById('remEmailList');
    list.select();
    let copied = false;
    try{ await navigator.clipboard.writeText(list.value); copied = true; }
    catch(e){ try{ document.execCommand('copy'); copied = true; }catch(e2){ copied = false; } }
    const status = document.getElementById('remCopyStatus');
    if(status){ status.style.display = copied ? 'block' : 'none'; if(!copied) alert('Kopieren nicht möglich — bitte die Adressen manuell aus dem Textfeld markieren und kopieren.'); }
    const affected = computeAffectedMatches();
    log(`E-Mail-Adressen für Erinnerung kopiert (${affected.length} Partien).`);
    saveDB();
  }); }
}

/* ============================= MODALS ============================= */
function showModal(html){ document.getElementById('modalRoot').innerHTML = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function showAdminLoginModal(){
  showModal(`
    <h3>Admin-Bereich</h3>
    <input type="password" id="pwInput" placeholder="Passwort">
    <p class="err" id="pwErr" style="display:none;">Falsches Passwort.</p>
    <div class="row"><button class="btn secondary" id="pwCancel">Abbrechen</button><button class="btn" id="pwOk">Anmelden</button></div>`);
  const submit = ()=>{
    const val = document.getElementById('pwInput').value;
    if(val === DB.adminPassword){ ui.adminAuthed = true; closeModal(); renderAll(); }
    else{ document.getElementById('pwErr').style.display='block'; }
  };
  document.getElementById('pwOk').addEventListener('click', submit);
  document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  document.getElementById('pwCancel').addEventListener('click', ()=>{
    document.getElementById('roleSelect').value='player'; ui.role='player'; closeModal(); renderAll();
  });
}

function showEditCategoryModal(key){
  const c = DB.categories[key];
  if(!c) return;
  const hasParticipants = DB.participants.some(p=>p.categories.includes(key));
  showModal(`
    <h3>Konkurrenz bearbeiten</h3>
    <input type="text" id="ecName" value="${c.name.replace(/"/g,'&quot;')}" placeholder="Name">
    <select id="ecType" ${hasParticipants?'disabled':''}>
      <option value="einzel" ${c.type==='einzel'?'selected':''}>Einzel</option>
      <option value="doppel" ${c.type==='doppel'?'selected':''}>Doppel</option>
      <option value="mixed" ${c.type==='mixed'?'selected':''}>Mixed</option>
    </select>
    ${hasParticipants?`<p class="hint" style="margin:-4px 0 10px 0;">Art kann nicht mehr geändert werden — es gibt bereits Anmeldungen.</p>`:''}
    <div id="ecGenderWrap" style="display:${c.type==='mixed'?'none':'block'};">
      <select id="ecGender">
        <option value="herren" ${c.gender==='herren'?'selected':''}>Herren</option>
        <option value="damen" ${c.gender==='damen'?'selected':''}>Damen</option>
      </select>
    </div>
    <input type="number" id="ecMinAge" value="${c.minAge||''}" placeholder="Untere Altersgrenze (leer = keine)">
    <p class="err" id="ecErr" style="display:none;"></p>
    <div class="row"><button class="btn secondary" id="ecCancel">Abbrechen</button><button class="btn" id="ecSave">Speichern</button></div>`);
  document.getElementById('ecType').addEventListener('change', ()=>{
    document.getElementById('ecGenderWrap').style.display = document.getElementById('ecType').value==='mixed' ? 'none' : 'block';
  });
  document.getElementById('ecCancel').addEventListener('click', closeModal);
  document.getElementById('ecSave').addEventListener('click', async ()=>{
    const name = document.getElementById('ecName').value.trim();
    const type = document.getElementById('ecType').value;
    const gender = document.getElementById('ecGender').value;
    const minAgeRaw = document.getElementById('ecMinAge').value;
    if(!name){ document.getElementById('ecErr').textContent='Bitte einen Namen angeben.'; document.getElementById('ecErr').style.display='block'; return; }
    const res = await updateCategory(key, {name, type, gender, minAge: minAgeRaw?parseInt(minAgeRaw,10):null});
    if(res && res.error){ document.getElementById('ecErr').textContent=res.error; document.getElementById('ecErr').style.display='block'; return; }
    closeModal(); renderAll();
  });
}

function showPasswordChangeModal(){
  showModal(`
    <h3>Admin-Passwort ändern</h3>
    <input type="password" id="newPw1" placeholder="Neues Passwort">
    <input type="password" id="newPw2" placeholder="Neues Passwort wiederholen">
    <p class="err" id="pwErr2" style="display:none;">Passwörter stimmen nicht überein.</p>
    <div class="row"><button class="btn secondary" id="pwCancel2">Abbrechen</button><button class="btn" id="pwSave2">Speichern</button></div>`);
  document.getElementById('pwCancel2').addEventListener('click', closeModal);
  document.getElementById('pwSave2').addEventListener('click', async ()=>{
    const p1 = document.getElementById('newPw1').value, p2 = document.getElementById('newPw2').value;
    if(!p1 || p1!==p2){ document.getElementById('pwErr2').style.display='block'; return; }
    await changeAdminPassword(p1); closeModal(); renderAll();
  });
}

function showAddParticipantModal(){
  showModal(`
    <h3>Teilnehmer manuell hinzufügen</h3>
    <input type="text" id="mVorname" placeholder="Vorname">
    <input type="text" id="mNachname" placeholder="Nachname">
    <select id="mVerein">${VEREINE.map(v=>`<option value="${v}">${v}</option>`).join('')}</select>
    <input type="number" id="mJahr" placeholder="Geburtsjahr">
    <input type="tel" id="mTelefon" placeholder="Telefonnummer">
    <input type="email" id="mEmail" placeholder="E-Mail-Adresse">
    <div class="checklist" id="mCatList" style="margin-bottom:10px;"><span class="hint">Geburtsjahr eingeben, um Konkurrenzen zu sehen.</span></div>
    <p class="err" id="mErr" style="display:none;"></p>
    <div class="row"><button class="btn secondary" id="mCancel">Abbrechen</button><button class="btn" id="mSave">Hinzufügen</button></div>`);
  document.getElementById('mJahr').addEventListener('input', ()=>{
    const jahr = parseInt(document.getElementById('mJahr').value,10);
    const box = document.getElementById('mCatList');
    if(!jahr){ box.innerHTML = `<span class="hint">Geburtsjahr eingeben, um Konkurrenzen zu sehen.</span>`; return; }
    box.innerHTML = eligibleCatsForYear(jahr).map(c=>`
      <div>
        <label><input type="checkbox" class="mCatCb" value="${c.key}"> ${c.name}</label>
        ${needsPartner(c) ? partnerFieldsHtml(c.key) : ''}
      </div>`).join('');
    wireCatCheckboxes('.mCatCb');
  });
  document.getElementById('mCancel').addEventListener('click', closeModal);
  document.getElementById('mSave').addEventListener('click', async ()=>{
    const vorname=document.getElementById('mVorname').value, nachname=document.getElementById('mNachname').value;
    const verein=document.getElementById('mVerein').value, geburtsjahr=parseInt(document.getElementById('mJahr').value,10);
    const telefon=document.getElementById('mTelefon').value, email=document.getElementById('mEmail').value;
    const categories = Array.from(document.querySelectorAll('.mCatCb:checked')).map(cb=>cb.value);
    if(!vorname.trim()||!nachname.trim()||!geburtsjahr||!telefon.trim()||!email.trim()){
      document.getElementById('mErr').textContent='Bitte alle Felder ausfüllen.'; document.getElementById('mErr').style.display='block'; return;
    }
    const partners = {};
    for(const catKey of categories){
      if(DB.categories[catKey].type!=='doppel') continue;
      const pv = document.querySelector(`.partnerVorname[data-cat="${catKey}"]`).value.trim();
      const pn = document.querySelector(`.partnerNachname[data-cat="${catKey}"]`).value.trim();
      if(!pv || !pn){
        document.getElementById('mErr').textContent=`Bitte für "${DB.categories[catKey].name}" den Partner-Namen angeben.`; document.getElementById('mErr').style.display='block'; return;
      }
      partners[catKey] = {
        vorname: pv, nachname: pn,
        telefon: document.querySelector(`.partnerTelefon[data-cat="${catKey}"]`).value.trim(),
        email: document.querySelector(`.partnerEmail[data-cat="${catKey}"]`).value.trim(),
        linkedId: null
      };
    }
    await addParticipantManually({vorname,nachname,verein,geburtsjahr,telefon,email,categories,partners});
    closeModal(); renderAll();
  });
}

/* ============================= LOGIN / TOP CONTROLS ============================= */
function fillPlayerSelect(){
  const sel = document.getElementById('playerSelect');
  const names = DB.participants.slice().sort((a,b)=>`${a.nachname}${a.vorname}`.localeCompare(`${b.nachname}${b.vorname}`,'de'));
  sel.innerHTML = `<option value="">Ich bin –</option>` + names.map(p=>`<option value="${p.id}">${p.vorname} ${p.nachname}</option>`).join('');
}

document.getElementById('roleSelect').addEventListener('change', (e)=>{
  ui.role = e.target.value; ui.openForm = null;
  if(ui.role==='admin' && !ui.adminAuthed){ showAdminLoginModal(); } else { renderAll(); }
});
document.getElementById('playerLoginBtn').addEventListener('click', ()=>{
  const id = document.getElementById('playerSelect').value;
  const email = document.getElementById('playerEmailInput').value.trim().toLowerCase();
  if(!id){ alert('Bitte zuerst deinen Namen auswählen.'); return; }
  const p = getParticipant(id);
  if(!p || p.email.trim().toLowerCase() !== email){ alert('Name und E-Mail-Adresse passen nicht zu einer Anmeldung. Bitte die bei der Anmeldung verwendete E-Mail-Adresse eingeben.'); return; }
  ui.me = id; ui.playerAuthed = true; renderAll();
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  ui.adminAuthed=false; ui.playerAuthed=false; ui.me=null; ui.role='player';
  document.getElementById('roleSelect').value='player';
  renderAll();
});

/* ============================= INIT + REALTIME ============================= */
async function init(){
  await loadDB();
  fillPlayerSelect();
  renderAll();
  subscribeRealtime();
  setInterval(async ()=>{
    if(!supa) return;
    try{
      const { data, error } = await supa.from(SUPABASE_TABLE).select('data').eq('id', SUPABASE_ROW_ID).single();
      if(error) throw error;
      if(data && data.data && JSON.stringify(data.data) !== JSON.stringify(DB)){
        DB = migrateDB(data.data); fillPlayerSelect(); renderAll();
      }
    }catch(e){ /* transient */ }
  }, 20000);
}
init();
</script>
