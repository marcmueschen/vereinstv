<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vereins-TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--font-body:'Inter';--font-display:'Bebas Neue';--fscale:1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a2a;font-family:var(--font-body,'Inter'),sans-serif;color:#fff}
#fr{position:fixed;inset:0;display:flex;flex-direction:column}
#tb{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:62px;background:rgba(0,0,0,.4);border-bottom:3px solid #f5c842;flex-shrink:0;z-index:10;gap:18px}
#cn{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:2rem;letter-spacing:.12em;color:#f5c842;white-space:nowrap;flex-shrink:0}
#sl-title{flex:1;font-family:var(--font-slide-title,var(--font-display,'Bebas Neue')),sans-serif;font-size:clamp(1rem,2.2vw,1.6rem);letter-spacing:.06em;color:var(--slide-title-color,#f5c842);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.0;transition:opacity .4s;display:none}
#sl-title.vis{opacity:1}
#ck{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:1.9rem;letter-spacing:.08em;color:#e8d5a3;white-space:nowrap;flex-shrink:0}
#st{flex:1;position:relative;overflow:hidden}
/* ── LOGO BALL TRANSITION ── */
#wipe{position:absolute;inset:0;z-index:50;pointer-events:none;display:none;overflow:hidden;background:transparent}
#wipe.go{display:block}

/* Neue Folie kommt von links und folgt dem Ball */
#wipe-new-slide{
  position:absolute;inset:0;
  transform:translateX(-100%);
  z-index:1;
  background:#1a3a2a;
  overflow:hidden;
}
#wipe.go #wipe-new-slide{
  animation:newSlideReveal 2.4s cubic-bezier(.6,0,.4,1) forwards;
}
@keyframes newSlideReveal{
  0%  {transform:translateX(-100%)}
  100%{transform:translateX(0%)}
}

#wipe.go #trans-logo{
  animation:ballRollRight 2.5s cubic-bezier(.3,0,.7,1) forwards;
}
@keyframes ballRollRight{
  0%  {left:-100vh; transform:translateY(-50%) rotate(0deg);   opacity:1}
  10% {opacity:1}
  80% {opacity:1}
  100%{left:calc(100% + 100vh); transform:translateY(-50%) rotate(1080deg); opacity:0}
}
/* Alter Vorhang: nicht mehr nötig, aber lassen wir ihn leer */
#wipe-curtain{
  display:none;
}
.sl{position:absolute;inset:0;display:none;overflow:hidden}
.sl{opacity:0}.sl.on{display:flex;opacity:1;transition:opacity .15s}
.sl.rd.on{display:block}
/* ANNOUNCE */
.ann{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 80px;position:relative}
.ann .ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.45),rgba(0,0,0,.15));z-index:0}
.ann .bi{position:absolute;inset:0;background-size:cover;background-position:center;z-index:-1;opacity:.35}
.ann .ct{position:relative;z-index:1;max-width:900px}
.ann .ey{font-size:.8rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin-bottom:18px;opacity:.7;display:none}
.ann h1{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2.8rem,7vw,5.5rem);letter-spacing:.06em;line-height:1;margin-bottom:24px}
.ann .al{width:64px;height:4px;margin:0 auto 28px;border-radius:2px}
.ann p{font-size:clamp(1.3rem,2.8vw,1.9rem);line-height:1.65;font-weight:300;opacity:.92;max-width:720px}
/* TABLE */
.tbl{flex-direction:column;padding:36px 48px}
.th2{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.th2 h2{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.1em}
.th2 .ab{flex:1;height:3px;border-radius:2px;opacity:.5}
.tw{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.tw table{width:100%;border-collapse:collapse}
.tw th{font-size:clamp(.7rem,1.4vw,.95rem);font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:2px solid rgba(255,255,255,.15);opacity:.7}
.tw td{font-size:clamp(.85rem,1.7vw,1.15rem);padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.tw tr.hl td{background:rgba(255,255,255,.06)}
.tw td:first-child,.tw th:first-child{opacity:.5;font-weight:800;width:44px}
/* SCORE — "ERGEBNISSE"-Stil */
.sc{flex-direction:column;padding:20px 44px 14px}
.sc-sh{display:flex;flex-direction:column;align-items:center;margin-bottom:8px;flex-shrink:0}
.sc-headline{display:flex;align-items:center;justify-content:center;gap:18px}
.sc-hl-line{flex:0 0 auto;width:9%;max-width:110px;height:3px;background:var(--ac,#8fae2a);opacity:.85;position:relative}
.sc-hl-line::before{content:'';position:absolute;left:0;top:-6px;width:100%;height:2px;background:var(--ac,#8fae2a);opacity:.5}
.sc-hl-title{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2.1rem,5vw,3.6rem);letter-spacing:.04em;color:#fff;font-style:italic;transform:skewX(-6deg);text-shadow:0 2px 10px rgba(0,0,0,.35);white-space:nowrap}
.sc-hl-cat{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1rem,2vw,1.5rem);letter-spacing:.06em;color:var(--ac,#8fae2a);font-style:italic;margin-left:6px}
.sc-sub{margin-top:4px;font-size:clamp(.85rem,1.5vw,1.15rem);opacity:.75;display:flex;align-items:center;gap:10px}
.sc-sub .nm{max-width:32vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-sub .vs{font-weight:800;color:var(--ac,#8fae2a)}
.sc-dv{height:2px;opacity:.2;margin:8px 0 6px;border-radius:1px;flex-shrink:0}
.sc-bd{flex:1;position:relative;overflow:hidden}
/* Jede Seite liegt exakt übereinander -> weiches Ineinander-Überblenden statt Hart-Schnitt */
.sc-page{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:3%;opacity:0;pointer-events:none;transition:opacity 1.8s ease-in-out}
.sc-page.on{opacity:1;pointer-events:auto}
.sc-page-hd{font-size:.68rem;font-weight:800;letter-spacing:.22em;text-transform:uppercase;opacity:.38;text-align:center;flex-shrink:0}
/* Ergebniskarte im Anzeigetafel-Stil: PLATZ-Box links, helle Ergebnistabelle in
   der Mitte (Namen + 1./2./3. Satz je Zeile), Status-Feld rechts (läuft/wartet/beendet). */
.sc-card{flex:1;display:flex;align-items:stretch;min-height:0;border-radius:14px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,.28)}
.sc-platz{flex:0 0 12.5%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#c1662f,#9a4a1f);color:#fff;padding:1% 0}
.sc-platz-lbl{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(.7rem,1.3vw,1rem);letter-spacing:.12em;opacity:.92}
.sc-platz-num{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2.1rem,4.8vw,3.6rem);line-height:1;margin-top:3%}
.sc-content{flex:1;min-width:0;background:#f1efe8;padding:1.4% 2.2%;display:flex;flex-direction:column;justify-content:center}
.sc-set-hdrow{display:flex;align-items:center;gap:1.2%;margin-bottom:.4%}
.sc-name-spacer{flex:1;min-width:0}
.sc-set-hd{min-width:14%;text-align:center;font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(.68rem,1.25vw,.95rem);color:#6b6b60;letter-spacing:.04em}
.sc-mplayer{display:flex;align-items:center;gap:1.2%;padding:.8% 0}
.sc-mplayer+.sc-mplayer{border-top:1.5px solid rgba(0,0,0,.1)}
.sc-mname{flex:1;min-width:0;font-size:clamp(1.5rem,3.3vw,2.7rem);font-weight:800;color:#161611;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.sc-msets{display:flex;gap:1.2%;flex-shrink:0}
.sc-mset{min-width:14%;text-align:center;font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.6rem,3.6vw,3rem);color:#161611;font-weight:700}
.sc-status{flex:0 0 16%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8%;color:#fff;text-align:center;padding:2% 4%}
.sc-status-laeuft{background:linear-gradient(160deg,#a9ca3c,#7fa022)}
.sc-status-wartet{background:linear-gradient(160deg,#98a49e,#727d78)}
.sc-status-beendet{background:linear-gradient(160deg,#1f5233,#123420)}
.sc-status-icon{width:34%;aspect-ratio:1;border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(.9rem,2vw,1.5rem);flex-shrink:0}
.sc-status-txt{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(.7rem,1.35vw,1rem);letter-spacing:.05em;line-height:1.2}
.sc-card.flash{animation:scfl 2.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes scfl{
  0%  {box-shadow:0 0 0 4px var(--ac,#c9db4d),0 3px 16px rgba(0,0,0,.28)}
  100%{box-shadow:0 0 0 0 var(--ac,#c9db4d),0 3px 16px rgba(0,0,0,.28)}
}
.sc-empty{flex:1;display:flex;align-items:center;justify-content:center;opacity:.3;font-size:clamp(1rem,1.8vw,1.3rem)}
.sc-page-dots{position:absolute;left:0;right:0;bottom:6px;display:none;justify-content:center;gap:8px;z-index:2}
.sc-bd.multi-page .sc-page-dots{display:flex}
.sc-page-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .3s,transform .3s}
.sc-page-dot.on{background:var(--ac,#f5c842);transform:scale(1.25)}
/* TURNIERBAUM */
.br{flex-direction:column;padding:30px 46px 22px;color:#f2f5ea}
.br-hd{text-align:center;flex-shrink:0;margin-bottom:8px}
.br-title{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2rem,5vw,4rem);letter-spacing:.06em;text-transform:uppercase;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.br-stand{font-size:clamp(.75rem,1.3vw,1rem);letter-spacing:.1em;text-transform:uppercase;color:var(--ac,#c9db4d);font-weight:700;margin-top:2px}
.br-dv{height:2px;background:linear-gradient(90deg,transparent,var(--ac,#c9db4d),transparent);opacity:.6;margin-bottom:4%;flex-shrink:0}
.br-tree{flex:1;display:flex;min-height:0;gap:2.2%}
.br-round{display:flex;flex-direction:column;flex:1;min-width:0}
.br-round-hd{text-align:center;font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(.85rem,1.5vw,1.25rem);letter-spacing:.12em;text-transform:uppercase;color:var(--ac,#c9db4d);opacity:.85;margin-bottom:3%;flex-shrink:0}
.br-round-body{flex:1;display:flex;flex-direction:column;justify-content:space-around;min-height:0}
.br-pair{position:relative;flex:1;display:flex;flex-direction:column;justify-content:space-around;min-height:0}
.br-match-wrap{position:relative;flex:1;display:flex;align-items:center;min-height:0;padding:2% 0}
.br-match{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden}
.br-row{display:flex;align-items:center;gap:6px;padding:6% 8%;font-size:clamp(.72rem,1.35vw,1.05rem);white-space:nowrap;overflow:hidden}
.br-row:first-child{border-bottom:1px solid rgba(255,255,255,.1)}
.br-row.win{background:rgba(201,219,77,.22)}
.br-row.win .br-name{font-weight:800;color:var(--ac,#c9db4d)}
.br-row.empty{opacity:.4;font-style:italic}
.br-name{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.br-bye{opacity:.7}
.br-seed{opacity:.55;font-size:.85em;flex-shrink:0}
/* Verbindungslinien zwischen den Runden (nicht bei der letzten Runde/Finale) */
.br-match-wrap::after{content:'';position:absolute;right:-2.2%;top:50%;width:2.2%;height:2px;background:var(--ac,#c9db4d);opacity:.4}
.br-pair::before{content:'';position:absolute;right:-2.2%;top:25%;bottom:25%;width:2px;background:var(--ac,#c9db4d);opacity:.4}
.br-round-last .br-match-wrap::after,.br-round-last .br-pair::before{display:none}
/* SPIELPLAN */
.sp{flex-direction:column;padding:30px 46px 22px;color:#f2f5ea}
.sp-hd{text-align:center;flex-shrink:0}
.sp-title{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2rem,4.5vw,3.4rem);letter-spacing:.05em;text-transform:uppercase;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.sp-dv{height:2px;background:linear-gradient(90deg,transparent,var(--ac,#f5c842),transparent);opacity:.6;margin:10px 0 14px;flex-shrink:0}
.sp-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1.4%;min-height:0;overflow:hidden}
.sp-row{display:grid;grid-template-columns:1fr 2.4fr auto;align-items:center;gap:18px;background:rgba(255,255,255,.05);border-radius:12px;padding:1.6% 2.4%}
.sp-row.next{background:rgba(245,200,66,.16);box-shadow:inset 0 0 0 2px var(--ac,#f5c842)}
.sp-date{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.1rem,2.2vw,1.6rem);opacity:.8;letter-spacing:.03em}
.sp-teams{display:flex;align-items:center;gap:12px;font-size:clamp(1.2rem,2.6vw,1.9rem);font-weight:600;min-width:0}
.sp-teams span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-teams span.own{font-weight:800;color:var(--ac,#f5c842)}
.sp-vs{opacity:.4;font-size:.8em;flex-shrink:0}
.sp-badge{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(.8rem,1.5vw,1.05rem);letter-spacing:.08em;text-transform:uppercase;padding:.4% 3%;border-radius:20px;flex-shrink:0}
.sp-badge.h{background:var(--ac,#f5c842);color:#0f2a1c}
.sp-badge.a{background:rgba(255,255,255,.12);color:#fff}
.sp-empty,.sp-loading{opacity:.4;text-align:center;font-size:1.1rem;margin:auto}
/* KADER */
.kd{flex-direction:column;padding:30px 46px 22px;color:#f2f5ea}
.kd-hd{text-align:center;flex-shrink:0}
.kd-title{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(2rem,4.5vw,3.4rem);letter-spacing:.05em;text-transform:uppercase;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.kd-dv{height:2px;background:linear-gradient(90deg,transparent,var(--ac,#f5c842),transparent);opacity:.6;margin:10px 0 14px;flex-shrink:0}
.kd-body{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;overflow:hidden}
.kd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2%;align-content:center}
.kd-item{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border-radius:10px;padding:1.4% 2%}
.kd-num{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.3rem,2.4vw,1.9rem);color:var(--ac,#f5c842);opacity:.8;min-width:2ch;text-align:right}
.kd-name{font-size:clamp(1.2rem,2.4vw,1.8rem);font-weight:600}
.kd-empty,.kd-loading{opacity:.4;text-align:center;font-size:1.1rem;margin:auto}
/* IMAGE */
.img{position:absolute!important;inset:0}
.sl.img.on{display:block}
.img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img .ic{position:absolute;bottom:0;left:0;right:0;padding:18px 36px;background:linear-gradient(transparent,rgba(0,0,0,.75));font-size:clamp(.9rem,1.8vw,1.2rem);font-weight:500;z-index:2}
.img .it{position:absolute;top:24px;left:36px;font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.5rem,3vw,2.2rem);letter-spacing:.1em;text-shadow:0 2px 8px rgba(0,0,0,.6);z-index:2}
/* YOUTUBE */
.yt{position:relative}
.yt iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.yt .yl{position:absolute;top:18px;left:24px;font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:1.3rem;letter-spacing:.1em;color:#f5c842;text-shadow:0 2px 8px rgba(0,0,0,.8);z-index:2}
/* WEBPAGE */
.wp{position:absolute;inset:0}
.sl.wp.on{display:block}
.wp iframe{width:100%;height:100%;border:none;background:#fff}
.wp .wp-err{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:14px;background:#1a2e22}
.wp .wp-err h2{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:2rem;letter-spacing:.1em;color:#f5c842}
/* NEWS TICKER */
.news-sl,.rss-sl{flex-direction:column;align-items:stretch;justify-content:flex-end}
.news-bg{position:absolute;inset:0}
.news-ticker-bar{position:absolute;bottom:0;left:0;right:0;height:72px;display:flex;align-items:center;overflow:hidden;gap:0;z-index:5}
.news-logo{height:52px;width:auto;max-width:80px;object-fit:contain;flex-shrink:0;margin:0 16px 0 14px;border-radius:4px}
.news-label{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:1.4rem;letter-spacing:.15em;padding:0 18px;flex-shrink:0;border-right:2px solid rgba(255,255,255,.3)}
.news-scroll-wrap{flex:1;overflow:hidden;position:relative;height:100%}
.news-scroll-inner{display:flex;align-items:center;height:100%;white-space:nowrap;font-size:clamp(1rem,2vw,1.35rem);font-weight:600;letter-spacing:.03em;animation:newsscroll linear infinite}
@keyframes newsscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* SPEISEKARTE */
.mn-sl{flex-direction:column;padding:22px 44px 18px;overflow:hidden}
.mn-hdr{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-shrink:0}
.mn-hdr h2{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.1em}
.mn-hdr .mn-ab{flex:1;height:3px;border-radius:2px;opacity:.5}
.mn-body{flex:1;overflow:hidden;display:flex;gap:24px}
.mn-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.mn-cat{display:flex;flex-direction:column;gap:4px}
.mn-cat-name{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:clamp(1rem,2vw,1.4rem);letter-spacing:.1em;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.2)}
.mn-item{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:2px 0;border-bottom:1px dotted rgba(255,255,255,.1)}
.mn-item:last-child{border-bottom:none}
.mn-item-name{font-size:clamp(.78rem,1.4vw,.98rem);opacity:.9}
.mn-item-price{font-size:clamp(.78rem,1.4vw,.98rem);font-weight:700;white-space:nowrap;opacity:.85}
/* HTML */
.hm{position:absolute;inset:0}
.sl.hm.on{display:block}
.hm iframe{width:100%;height:100%;border:none}
/* BOTTOM */
#bb{display:flex;align-items:center;padding:8px 32px;height:46px;background:rgba(0,0,0,.5);border-top:1px solid rgba(245,200,66,.22);flex-shrink:0;gap:18px;z-index:10}
#dt{display:flex;gap:7px;align-items:center}
.dt{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s,transform .3s;cursor:pointer}
.dt.on{background:#f5c842;transform:scale(1.45)}
#pw{flex:1;height:3px;background:rgba(255,255,255,.11);border-radius:2px;overflow:hidden}
#pb{height:100%;background:#f5c842;width:0%}
#ct{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:.92rem;color:rgba(255,255,255,.4);letter-spacing:.1em}
#pb2{font-size:.9rem;cursor:pointer;opacity:0;transition:opacity .3s;background:none;border:none;color:#fff;padding:0}
#pb2.v{opacity:1}
/* SETUP */
#setup{display:flex;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;z-index:30;background:#1a3a2a}
#setup h2{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:2.2rem;letter-spacing:.1em;color:#f5c842}
#setup p{font-size:1rem;opacity:.7;max-width:500px;text-align:center;line-height:1.6}
#setup input{padding:10px 16px;border-radius:8px;border:none;font-size:1rem;width:100%;max-width:440px;outline:none}
#setup button{padding:11px 28px;background:#f5c842;color:#1a3a2a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
#ev{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px}
#ev.on{display:flex}
#sync-dot{position:absolute;top:8px;right:10px;width:7px;height:7px;border-radius:50%;background:#27ae60;opacity:0;transition:opacity .4s;z-index:20}
#sync-dot.flash{opacity:1}
.sl .sc-mname,.sl .sc-mset,.sl .mn-item-name,.sl .mn-item-price,.sl .ann p,.sl .tw td,.sl .tw th,.sl .news-scroll-inner{font-size:calc(var(--fscale,1) * 1em)}


/* ── WEATHER FORECAST SLIDE */
.sl.wt{flex-direction:column;overflow:hidden;background:#0d1a2e}
.wt-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;background:inherit}
.wt-loading p{font-size:1rem;opacity:.65;text-align:center;padding:0 20px}
.wt-spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#f5c842;border-radius:50%;animation:wtspin .8s linear infinite}
/* ── WETTER NEU: Screenshot-Style ── */
.wt-inner{width:100%;height:100%;display:none;flex-direction:column}
.wt-inner.show{display:flex}
/* ── WETTER: Hero-Zone (Asche-Tennisplatz-Hintergrund) */
.wt-hero{flex:1;position:relative;min-height:0;overflow:hidden}
/* Tennisplatz SVG als Hintergrund */
.wt-hero-bg{position:absolute;inset:0;z-index:0}
.wt-hero-overlay{position:absolute;inset:0;z-index:1;
  background:linear-gradient(160deg,rgba(0,0,0,.35) 0%,rgba(0,0,0,.1) 50%,rgba(0,0,0,.25) 100%)}
.wt-hero-loc{position:absolute;top:18px;left:28px;z-index:3}
.wt-hero-place{font-size:clamp(1.6rem,3.2vw,2.4rem);font-weight:900;letter-spacing:.01em;
  color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.6)}
.wt-hero-date{font-size:clamp(.7rem,1.2vw,.95rem);color:rgba(255,255,255,.85);margin-top:2px;
  text-shadow:0 1px 4px rgba(0,0,0,.5)}
.wt-hero-now{position:absolute;bottom:16px;left:28px;z-index:3;display:flex;flex-direction:column;gap:2px}
.wt-hero-temp{font-size:clamp(3.5rem,9vw,7rem);font-weight:900;line-height:1;
  color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.5)}
.wt-hero-desc{font-size:clamp(.9rem,1.7vw,1.2rem);color:rgba(255,255,255,.9);
  text-shadow:0 1px 4px rgba(0,0,0,.5)}
/* Animiertes Haupticon */
.wt-hero-icon{position:absolute;right:28px;top:50%;transform:translateY(-50%);z-index:3;
  width:clamp(120px,20vw,200px);height:clamp(120px,20vw,200px)}
/* Animationsstile für verschiedene Wettertypen */
@keyframes wtSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wtBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wtPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes wtShake{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes wtRain{from{transform:translateY(-10px);opacity:0}to{transform:translateY(60px);opacity:1}}
@keyframes wtSnow{from{transform:translateY(-10px) rotate(0deg);opacity:0}
  to{transform:translateY(60px) rotate(360deg);opacity:.8}}
@keyframes wtFlash{0%,90%,100%{opacity:1}91%,99%{opacity:.1}}
@keyframes wtWave{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.1)}}
.wt-anim-spin{animation:wtSpin 8s linear infinite}

function xhrJson(url,cb){
  var x=new XMLHttpRequest();
  dbg('XHR: '+url.slice(0,70));
  try{
    x.open('GET',url,true);
  }catch(e){dbg('XHR open ERR: '+e,'#ffaaaa');cb(e);return;}
  x.timeout=15000;
  x.onload=function(){
    if(x.status>=200&&x.status<300){
      try{var d=JSON.parse(x.responseText);dbg('XHR OK '+x.status+' ok='+d.ok);cb(null,d);}
      catch(e){dbg('XHR JSON ERR: '+e,'#ffaaaa');cb(e);}
    }else{dbg('XHR HTTP '+x.status,'#ffaaaa');cb(new Error('HTTP '+x.status));}
  };
  x.ontimeout=function(){dbg('XHR TIMEOUT (15s)','#ffaaaa');cb(new Error('timeout'));};
  x.onerror=function(){
    dbg('XHR NETZWERK-FEHLER – status='+x.status+' readyState='+x.readyState,'#ffaaaa');
    dbg('(DNS-Fehler, TLS/HTTPS-Problem, oder CORS-Block)','#ffdd44');
    cb(new Error('error'));
  };
  x.send();
}
function checkVer(){if(!WORKER_URL)return;xhrJson(WORKER_URL+'/version',function(e,d){if(!e&&d.ok){if(d.version!==knownVer){flashSync();fetchCfg();}}});}
function fetchCfg(){if(!WORKER_URL){dbg('fetchCfg: kein WORKER_URL','#ffaaaa');return;}dbg('fetchCfg: '+WORKER_URL.slice(0,50));xhrJson(WORKER_URL+'/config',function(e,d){if(!e&&d.ok&&d.config){dbg('Config OK, '+((d.config.slides||[]).length)+' Folien');applyCfg(d.config);xhrJson(WORKER_URL+'/version',function(e2,d2){if(!e2&&d2.ok)knownVer=d2.version;});}else{dbg('Config ERR: '+(e?e.message:'kein config'),'#ffaaaa');// Retry after 3s
setTimeout(fetchCfg,3000);}});}

function applyCfg(cfg){
  DD=cfg.defaultDuration||10;
  document.getElementById('cn').textContent=cfg.clubName||'Vereins-TV';
  var fonts=cfg.fontFamily||'Inter';
  var fsize=parseFloat(cfg.fontSize)||1;
  var root=document.documentElement;

  root.style.setProperty('--fscale',String(fsize));
  // Folien-Titelfarbe und -Schriftart
  var stColor=cfg.slideTitleColor||'#f5c842';
  var stFont=cfg.slideTitleFont||'';
  root.style.setProperty('--slide-title-color',stColor);
  root.style.setProperty('--font-slide-title',stFont?"'"+stFont+"'":('var(--font-display,\'Bebas Neue\')'));
  // Schriftart laden falls nötig
  if(stFont&&stFont!=='Bebas Neue'&&stFont!==fonts){
    var stfId='gf-st-'+stFont.replace(/\s+/g,'-');
    if(!document.getElementById(stfId)){
      var stfLink=document.createElement('link');
      stfLink.id=stfId;stfLink.rel='stylesheet';
      stfLink.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(stFont)+':wght@400;700&display=swap';
      document.head.appendChild(stfLink);
    }
  }
  var fontId='gf-'+fonts.replace(/\s+/g,'-');
  if(!document.getElementById(fontId)&&fonts!=='Inter'){
    var link=document.createElement('link');
    link.id=fontId;link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(fonts)+':wght@300;400;500;600;700;800&display=swap';
    document.head.appendChild(link);
  }
  var prevSlides=slides;
  var was=slides.length===0;
  slides=(cfg.slides||[]).filter(function(s){return s.enabled!==false;});

  // Smart update: if slide count/types unchanged, just update score content in-place
  var sameStructure=(prevSlides.length===slides.length)&&slides.every(function(s,i){
    return prevSlides[i]&&prevSlides[i].id===s.id&&prevSlides[i].type===s.type;
  });

  if(sameStructure&&!was){
    // Only update changed score/bracket slides in-place — animation will work!
    slides.forEach(function(s,i){
      if(s.type!=='score'&&s.type!=='bracket')return;
      var el=stage.querySelector('.sl[data-i="'+i+'"]');
      if(!el)return;
      if(s.type==='score'){
        // Clear existing flash timers for this slide before updating
        // (new change = restart counter)
        Object.keys(_flashTimers).forEach(function(k){
          if(k.indexOf(s.id+'_')===0){
            clearInterval(_flashTimers[k].iv);
            delete _flashTimers[k];
          }
        });
        _slideShowCounts[s.id]=0;
        bsc(s,el);
      } else if(s.type==='bracket'){
        buildBracket(s,el);
      }
    });
    bd();
  } else {
    rebuildSlides();
    if(was&&slides.length)show(0,false);
  }
}

function pc(t){return(t||'').trim().split('\n').map(function(l){return l.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});}).filter(function(r){return r.some(function(c){return c;});});}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function en(s){return es(s).replace(/\n/g,'<br>');}

// ── TURNIERBAUM
// Rundenbezeichnung: nur die letzten 3 Runden bekommen eigene Namen,
// alles davor heißt schlicht "Erste Runde" (Vereins-Konvention).
function brRoundLabel(idx,total){
  var remaining=total-idx;
  if(remaining===1)return 'Finale';
  if(remaining===2)return 'Halbfinale';
  if(remaining===3)return 'Viertelfinale';
  return 'Erste Runde';
}
// Berechnet aus den Runde-1-Namen und den gespeicherten Sieger-Klicks (picks)
// den kompletten Baum. Bei einem Freilos (eine Seite leer) rückt die andere
// Seite automatisch nach.
function brComputeRounds(d,size,totalRounds){
  var names=(d.names||[]).slice(0,size);
  while(names.length<size)names.push('');
  var seeds=d.seeds||{};
  var picks=d.picks||[];
  var rounds=[];
  var current=names.slice();
  for(var r=0;r<totalRounds;r++){
    var matches=[];
    var next=[];
    for(var i=0;i<current.length;i+=2){
      var a=current[i]||'',b=current[i+1]||'';
      var mi=i/2;
      var pick=(picks[r]&&picks[r][mi]!=null)?picks[r][mi]:null;
      if(pick===null){
        if(a&&!b)pick=0;
        else if(b&&!a)pick=1;
      }
      matches.push({a:a,b:b,pick:pick,seedA:r===0?seeds[i]:null,seedB:r===0?seeds[i+1]:null});
      next.push(pick===0?a:(pick===1?b:''));
    }
    rounds.push(matches);
    current=next;
  }
  return rounds;
}
function brMatchHtml(m){
  function rowHtml(name,seed,isWin){
    var seedHtml=seed?'<span class="br-seed">['+es(String(seed))+']</span>':'';
    var nameHtml=name?es(name):'<span class="br-bye">[Rast]</span>';
    return '<div class="br-row'+(isWin?' win':'')+(name?'':' empty')+'">'+seedHtml+'<span class="br-name">'+nameHtml+'</span></div>';
  }
  return '<div class="br-match-wrap"><div class="br-match">'
    +rowHtml(m.a,m.seedA,m.pick===0)
    +rowHtml(m.b,m.seedB,m.pick===1)
  +'</div></div>';
}
function buildBracket(s,div){
  var d=s.data||{};
  var ac=d.accent||'#c9db4d',bg=d.bg||'#0d2b1a';
  div.style.setProperty('--ac',ac);
  div.style.background='linear-gradient(155deg,'+bg+' 0%,#071510 100%)';
  var size=parseInt(d.size)||8;
  var totalRounds=Math.max(1,Math.round(Math.log2(size)));
  var rounds=brComputeRounds(d,size,totalRounds);
  var now=new Date();
  var stand='Stand '+pad2(now.getDate())+'.'+pad2(now.getMonth()+1)+'. '+pad2(now.getHours())+':'+pad2(now.getMinutes());

  var roundsHtml=rounds.map(function(matches,r){
    var isLast=r===rounds.length-1;
    var pairsHtml='';
    if(matches.length===1){
      pairsHtml='<div class="br-pair">'+brMatchHtml(matches[0])+'</div>';
    } else {
      for(var i=0;i<matches.length;i+=2){
        pairsHtml+='<div class="br-pair">'+brMatchHtml(matches[i])+brMatchHtml(matches[i+1])+'</div>';
      }
    }
    return '<div class="br-round'+(isLast?' br-round-last':'')+'">'
      +'<div class="br-round-hd">'+es(brRoundLabel(r,totalRounds))+'</div>'
      +'<div class="br-round-body">'+pairsHtml+'</div>'
    +'</div>';
  }).join('');

  div.innerHTML='<div class="br-hd">'
      +'<div class="br-title">'+es(d.title||'Turnier')+'</div>'
      +'<div class="br-stand">'+es(stand)+'</div>'
    +'</div>'
    +'<div class="br-dv"></div>'
    +'<div class="br-tree">'+roundsHtml+'</div>';
}

// ── GEMEINSAMER, GECACHTER ABRUF DER MANNSCHAFTSDATEN (Spielplan/Kader)
// Live von /teams geladen (Mannschaftsverwaltung), damit Änderungen dort
// automatisch auf den Folien erscheinen — ohne dass die Folie selbst editiert
// werden muss. Kurzzeitig gecacht, damit mehrere Folien sich einen Abruf teilen.
var _teamsCache=null,_teamsCacheAt=0,_teamsFetching=false,_teamsWaiters=[];
function fetchTeamsShared(cb){
  var now=Date.now();
  if(_teamsCache&&(now-_teamsCacheAt)<120000){cb(_teamsCache);return;}
  _teamsWaiters.push(cb);
  if(_teamsFetching)return;
  _teamsFetching=true;
  var wurl=getWurl();
  if(!wurl){_teamsFetching=false;var ws=_teamsWaiters;_teamsWaiters=[];ws.forEach(function(w){w(_teamsCache);});return;}
  wtXHR(wurl+'/teams',
    function(r){
      _teamsFetching=false;
      if(r.ok){_teamsCache=r.teams||[];_teamsCacheAt=Date.now();}
      var ws=_teamsWaiters;_teamsWaiters=[];
      ws.forEach(function(w){w(_teamsCache);});
    },
    function(){
      _teamsFetching=false;
      var ws=_teamsWaiters;_teamsWaiters=[];
      ws.forEach(function(w){w(_teamsCache);});
    }
  );
}

// ── SPIELPLAN
function buildSpielplan(s,div){
  var d=s.data||{},ac=d.accent||'#f5c842';
  div.style.setProperty('--ac',ac);
  div.style.background=d.bg||'#0f2a1c';
  div.dataset.teamId=d.teamId||'';
  div.innerHTML='<div class="sp-hd"><div class="sp-title">'+es(d.title||'Spielplan')+'</div></div>'
    +'<div class="sp-dv" style="background:'+es(ac)+'"></div>'
    +'<div class="sp-body"><div class="sp-loading">Lade Spielplan &hellip;</div></div>';
}
function renderSpielplanBody(el,team){
  var body=el.querySelector('.sp-body');if(!body)return;
  if(!team){body.innerHTML='<div class="sp-empty">Mannschaft nicht gefunden.</div>';return;}
  var matches=(team.matches||[]).slice();
  if(!matches.length){body.innerHTML='<div class="sp-empty">Noch keine Begegnungen eingetragen.</div>';return;}
  matches.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  var todayStr=new Date().toISOString().slice(0,10);
  var nextIdx=-1;
  matches.forEach(function(m,i){if(nextIdx===-1&&m.date&&m.date>=todayStr)nextIdx=i;});
  body.innerHTML=matches.map(function(m,i){
    var dt=m.date?new Date(m.date+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}):'Kein Datum';
    var isHome=m.homeAway==='home';
    var heim=isHome?team.name:m.opponent;
    var gast=isHome?m.opponent:team.name;
    return '<div class="sp-row'+(i===nextIdx?' next':'')+'">'
      +'<div class="sp-date">'+es(dt)+'</div>'
      +'<div class="sp-teams"><span class="'+(isHome?'own':'')+'">'+es(heim)+'</span><span class="sp-vs">vs</span><span class="'+(!isHome?'own':'')+'">'+es(gast)+'</span></div>'
      +'<div class="sp-badge '+(isHome?'h':'a')+'">'+(isHome?'Heim':'Auswärts')+'</div>'
    +'</div>';
  }).join('');
}
function initSpielplan(el){
  var teamId=el.dataset.teamId;
  fetchTeamsShared(function(teams){
    var team=(teams||[]).find(function(t){return t.id===teamId;});
    renderSpielplanBody(el,team);
  });
}

// ── KADER
function buildKader(s,div){
  var d=s.data||{},ac=d.accent||'#f5c842';
  div.style.setProperty('--ac',ac);
  div.style.background=d.bg||'#0f2a1c';
  div.dataset.teamId=d.teamId||'';
  div.innerHTML='<div class="kd-hd"><div class="kd-title">'+es(d.title||'Kader')+'</div></div>'
    +'<div class="kd-dv" style="background:'+es(ac)+'"></div>'

// ── SCORE
var _scPageTimers={};
function bsc(s,div){
  var d=s.data||{},ac=d.accent||'#f5c842';
  div.style.setProperty('--ac',ac);
  div.style.background=d.bg||'#0f2a1c';
  div.dataset.scoreId=String(s.id);
  var gh=parseInt(d.gesamtHeim)||0,gg=parseInt(d.gesamtGast)||0;

  // Neues Scoreboard-Design: Platz-Nummer links, Satzstände in der Mitte
  // (Kopfzeile "1./2./3. Satz"), Status-Feld rechts (läuft/wartet/beendet).
  function statusInfo(m,played){
    if(m.winner)return {cls:'beendet',icon:'&#10003;',txt:'SPIEL<br>BEENDET'};
    if(played.length>0)return {cls:'laeuft',icon:'&#9654;',txt:'SPIEL<br>L&Auml;UFT'};
    return {cls:'wartet',icon:'&#128337;',txt:'NOCH NICHT<br>GESTARTET'};
  }
  function setRowHtml(sets,side){
    return sets.map(function(st){
      var hv=parseInt(st.h)||0,gv=parseInt(st.g)||0;
      var played=hv>0||gv>0;
      var val=side==='h'?hv:gv;
      return '<span class="sc-mset">'+(played?es(String(val)):'&ndash;')+'</span>';
    }).join('');
  }
  function cardHtml(m){
    var sets=[0,1,2].map(function(si){return m.sets[si]||{h:0,g:0};});
    var played=sets.filter(function(st){return (parseInt(st.h)||0)>0||(parseInt(st.g)||0)>0;});
    var st=statusInfo(m,played);
    var setHdHtml=['1. SATZ','2. SATZ','3. SATZ'].map(function(l){return '<span class="sc-set-hd">'+l+'</span>';}).join('');
    return '<div class="sc-platz"><div class="sc-platz-lbl">PLATZ</div><div class="sc-platz-num">'+(m.platz?es(m.platz):'&ndash;')+'</div></div>'
      +'<div class="sc-content">'
        +'<div class="sc-set-hdrow"><span class="sc-name-spacer"></span>'+setHdHtml+'</div>'
        +'<div class="sc-mplayer"><span class="sc-mname">'+(m.heimPlayer?es(m.heimPlayer):'&ndash;')+'</span><div class="sc-msets">'+setRowHtml(sets,'h')+'</div></div>'
        +'<div class="sc-mplayer"><span class="sc-mname">'+(m.gastPlayer?es(m.gastPlayer):'&ndash;')+'</span><div class="sc-msets">'+setRowHtml(sets,'g')+'</div></div>'
      +'</div>'
      +'<div class="sc-status sc-status-'+st.cls+'"><div class="sc-status-icon">'+st.icon+'</div><div class="sc-status-txt">'+st.txt+'</div></div>';
  }

  function flashCard(card, rowKey){
    if(_flashTimers[rowKey]){
      clearInterval(_flashTimers[rowKey].iv);
      delete _flashTimers[rowKey];
    }
    _slideShowCounts[s.id] = 0;
    function doFlash(){
      card.classList.remove('flash');
      void card.offsetWidth;
      card.classList.add('flash');
    }
    doFlash();
    var iv = setInterval(function(){
      var shown = _slideShowCounts[s.id] || 0;
      if(shown >= 5){
        clearInterval(iv);
        delete _flashTimers[rowKey];
        card.classList.remove('flash');
        return;
      }
      doFlash();
    }, 1500);
    _flashTimers[rowKey] = {iv: iv, el: card};
  }

  // Kopf: "ERGEBNISSE" + Mannschaft (z.B. "Herren 30") — bleibt unabhängig von der
  // Bild-Umschaltung immer sichtbar. Gesamtstand als kleinere Unterzeile darunter.
  var headHtml='<div class="sc-sh">'
    +'<div class="sc-headline">'
      +'<div class="sc-hl-line"></div>'
      +'<div class="sc-hl-title">ERGEBNISSE'+(d.mannschaft?'<span class="sc-hl-cat"> '+es(d.mannschaft)+'</span>':'')+'</div>'
      +'<div class="sc-hl-line"></div>'
    +'</div>'
    +'<div class="sc-sub"><span class="nm">'+es(d.heimTeam||'Heim')+'</span><span class="vs">'+gh+' : '+gg+'</span><span class="nm">'+es(d.gastTeam||'Gast')+'</span></div>'
    +'</div>'
    +'<div class="sc-dv" style="background:'+ac+'"></div>';

  // First render: 3 Bilder anlegen (Einzel 1-3, Einzel 4-6, Doppel), je 3 Karten
  if(!div.querySelector('.sc-bd')){
    var pageDefs=[
      {n:'0',hd:'Einzel 1–3'},
      {n:'1',hd:'Einzel 4–6'},
      {n:'2',hd:'Doppel'}
    ];
    var pagesHtml=pageDefs.map(function(pd){
      var cards='';
      for(var c=0;c<3;c++)cards+='<div class="sc-card" data-slot="'+c+'"></div>';
      return '<div class="sc-page'+(pd.n==='0'?' on':'')+'" data-page="'+pd.n+'">'
        +'<div class="sc-page-hd">'+pd.hd+'</div>'+cards+'</div>';
    }).join('');
    div.innerHTML=headHtml
      +'<div class="sc-bd">'
        +pagesHtml
        +'<div class="sc-page-dots"><span class="sc-page-dot on" data-p="0"></span><span class="sc-page-dot" data-p="1"></span><span class="sc-page-dot" data-p="2"></span></div>'
      +'</div>';
  } else {
    var hEl=div.querySelector('.sc-sh');
    if(hEl){var t=document.createElement('div');t.innerHTML=headHtml;if(hEl.outerHTML!==t.querySelector('.sc-sh').outerHTML)hEl.outerHTML=t.querySelector('.sc-sh').outerHTML;}
  }

  // Karten je Bild befüllen (immer genau 3 Slots pro Bild, damit die Größe konstant bleibt)
  function updateSlots(pageNum, matches){
    var page=div.querySelector('.sc-page[data-page="'+pageNum+'"]');
    if(!page)return;
    for(var c=0;c<3;c++){
      var m=matches[c];
      var card=page.querySelector('.sc-card[data-slot="'+c+'"]');
      if(!card)continue;
      if(!m||!(m.heimPlayer||m.gastPlayer||m.sets.some(function(x){return (parseInt(x.h)||0)>0||(parseInt(x.g)||0)>0;}))){
        if(card.dataset.filled||!card.childNodes.length){
          card.innerHTML='<div class="sc-empty">–</div>';
          delete card.dataset.filled;
        }
        continue;
      }
      var k=s.id+'_'+m.type;
      var prev=PD[k]||null;
      var mStr=JSON.stringify(m);
      var changed=!prev||(JSON.stringify(prev)!==mStr);
      PD[k]=JSON.parse(mStr);
      if(changed||!card.dataset.filled){
        card.innerHTML=cardHtml(m);
        card.dataset.filled='1';
        if(prev!==null&&changed) flashCard(card,k);
      }
    }
  }

  var ma=d.matches||[];
  var singles=ma.slice(0,6),doubles=ma.slice(6,9);
  updateSlots('0',singles.slice(0,3));
  updateSlots('1',singles.slice(3,6));
  updateSlots('2',doubles);

  // Doppel erst freischalten, wenn alle gespielten Einzel entschieden sind
  var usedSingles=singles.filter(function(m){return m.heimPlayer||m.gastPlayer;});
  var einzelFertig=usedSingles.length>0&&usedSingles.every(function(m){return !!m.winner;});
  manageScorePaging(s,div,einzelFertig);
}

// Steuert das automatische, langsam überblendende Umschalten zwischen den 3 Bildern
// (Einzel 1-3 / Einzel 4-6 / Doppel). Die eingestellte Foliendauer wird gleichmäßig auf
// die aktuell aktiven Bilder verteilt. Der Gesamtstand-Kopf bleibt davon unberührt,
// da er außerhalb von .sc-bd liegt.
// Startet (bzw. ersetzt) den Umschalt-Zyklus für ein Bild-Set und beginnt immer bei Bild 0.
function startScoreRotation(div,key,pageCount,perPageMs){
  if(_scPageTimers[key])clearInterval(_scPageTimers[key].iv);
  var rec={pageCount:pageCount,perPageMs:perPageMs,pageIdx:0,iv:null};
  setScorePage(div,0,pageCount);
  rec.iv=setInterval(function(){
    rec.pageIdx=(rec.pageIdx+1)%pageCount;
    var freshDiv=document.querySelector('.sl[data-score-id="'+key+'"]');
    if(!freshDiv){clearInterval(rec.iv);delete _scPageTimers[key];return;}
    setScorePage(freshDiv,rec.pageIdx,pageCount);
  },perPageMs);
  _scPageTimers[key]=rec;
}
// Wird bei jeder Datenaktualisierung aufgerufen (bsc()). Startet nur dann neu, wenn
// sich Bildanzahl/Dauer geändert haben oder noch kein Zyklus läuft — der für den
// Zuschauer maßgebliche, synchronisierte Start erfolgt über restartScorePaging()
// beim tatsächlichen Sichtbarwerden der Folie (triggerSlideInit).
function manageScorePaging(s,div,doublesUnlocked){
  var key=String(s.id);
  var bdEl=div.querySelector('.sc-bd');
  var pageCount=doublesUnlocked?3:2;
  if(bdEl)bdEl.classList.toggle('multi-page',pageCount>1);
  div.dataset.doublesUnlocked=doublesUnlocked?'1':'0';

  var totalSec=s.duration||DD||10;
  var perPageMs=Math.max(3000,Math.round(totalSec*1000/pageCount));

  var existing=_scPageTimers[key];
  if(existing && existing.pageCount===pageCount && existing.perPageMs===perPageMs){
    setScorePage(div,existing.pageIdx,pageCount);
    return;
  }
  startScoreRotation(div,key,pageCount,perPageMs);
}
// Erzwingt einen frischen, bei Bild 0 beginnenden Zyklus — aufgerufen genau dann,
// wenn die Folie im Hauptkarussell aktiv wird, damit die eingestellte Zeit wirklich
// gleichmäßig auf die Bilder verteilt wird, die der Zuschauer auch zu sehen bekommt.
function restartScorePaging(div,s){
  var key=String(s.id);
  var doublesUnlocked=div.dataset.doublesUnlocked==='1';
  var pageCount=doublesUnlocked?3:2;
  var totalSec=s.duration||DD||10;
  var perPageMs=Math.max(3000,Math.round(totalSec*1000/pageCount));
  startScoreRotation(div,key,pageCount,perPageMs);
}
function setScorePage(div,pageIdx,pageCount){
  div.querySelectorAll('.sc-page').forEach(function(p){
    p.classList.toggle('on',parseInt(p.dataset.page)===pageIdx);
  });
  div.querySelectorAll('.sc-page-dot').forEach(function(dot){
    var i=parseInt(dot.dataset.p);
    dot.style.display=i<pageCount?'':'none';
    dot.classList.toggle('on',i===pageIdx);
  });
}

    div.innerHTML='<iframe src="'+burl+'" sandbox="allow-scripts allow-same-origin"></iframe>';
  } else if(s.type==='bracket'){
    div.className='sl br';
    buildBracket(s,div);
  } else if(s.type==='spielplan'){
    div.className='sl sp';
    buildSpielplan(s,div);
  } else if(s.type==='kader'){
    div.className='sl kd';
    buildKader(s,div);
  }
  return div;
}

function getWurl(){return(WORKER_URL||lsGet('vtv_worker_url')||'').replace(/\/$/,'');}

function wtXHR(url,onOk,onFail){
  if(!url){onFail('URL fehlt');return;}
  var xhr=new XMLHttpRequest();
  try{xhr.open('GET',url,true);}catch(e){onFail('XHR: '+e.message);return;}
  xhr.timeout=20000;
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<300){
      try{onOk(JSON.parse(xhr.responseText));}
      catch(e){onFail('JSON: '+xhr.responseText.slice(0,80));}
    }else{onFail('HTTP '+xhr.status);}
  };
  xhr.ontimeout=function(){onFail('Timeout (20s)');};
  xhr.onerror=function(){onFail('Netzwerkfehler');};
  xhr.send();
}
function wtErr(el,cls,msg){

}

function initWeather(el,key){
  if(_wInits[key+'-wt'])return;
  _wInits[key+'-wt']=true;
  var lat=parseFloat(el.dataset.wtLat)||0;
  var lon=parseFloat(el.dataset.wtLon)||0;
  var loc=el.dataset.wtLoc||'Wetter';
  var wurl=getWurl();
  if(!wurl){wtErr(el,'wt','Worker-URL fehlt');return;}
  fetchWeather(el,key,lat,lon,loc,wurl);
  setInterval(function(){fetchWeather(el,key,lat,lon,loc,getWurl());},600000);
}

function fetchWeather(el,key,lat,lon,loc,wurl){
  wtXHR(wurl+'/weather?lat='+lat+'&lon='+lon,
    function(resp){
      if(!resp.ok){wtErr(el,'wt','Worker: '+(resp.error||'Fehler'));return;}
      if(!resp.data){wtErr(el,'wt','Keine Wetterdaten im Response');return;}
      renderWeather(el,resp.data,loc);
    },
    function(msg){wtErr(el,'wt',msg);}
  );
}

    var si=0;
    for(var x=0;x<m15.time.length;x++){
      if(m15.time[x].replace(' ','T').slice(0,16)>=nowStr){si=x;break;}
    }
    for(var i=si;i<si+24&&i<m15.time.length;i++){
      var t=m15.time[i];
      slots.push({
        time:(t.split('T')[1]||t.split(' ')[1]||'').slice(0,5),
        temp:m15.temperature_2m[i]||0,
        rain:m15.precipitation?m15.precipitation[i]||0:0,
        rainProb:m15.precipitation_probability?m15.precipitation_probability[i]||0:0,
        code:m15.weathercode[i]||0,
        wind:Math.round(m15.windspeed_10m?m15.windspeed_10m[i]||0:0)
      });
    }
  } else {
    var h=d.hourly;
    var today=now.toISOString().slice(0,10);
    var hStr=pad2(now.getHours());
    var si2=0;
    for(var x2=0;x2<h.time.length;x2++){if(h.time[x2]>=today+'T'+hStr){si2=x2;break;}}
    for(var i2=si2;i2<si2+13&&i2<h.time.length-1;i2++){
      var t0=h.time[i2];
      var hh=parseInt((t0.split('T')[1]||'00:').split(':')[0]);

        temp:((h.temperature_2m[i2]||0)+(h.temperature_2m[i2+1]||0))/2,
        rain:0,rainProb:h.precipitation_probability?((h.precipitation_probability[i2]||0)+(h.precipitation_probability[i2+1]||0))/2:0,
        code:h.weathercode[i2]||0,wind:0});
    }
    slots=slots.slice(0,24);
  }
  if(!slots.length){wtErr(el,'wt','Keine Zeitdaten');return;}

  // ── Vorhersage-Zeile füllen
  var fc=el.querySelector('.wt-forecast');
  if(fc){
    fc.innerHTML='';
    // Nur alle vollen Stunden (jeder 2. Slot) + aktuellen Zeitpunkt
    var showSlots=[];

      var rainStr=s.rainProb>=10?s.rainProb+'%':'';
      var tc=s.temp>=28?'#ff8080':s.temp>=18?'#ffd166':'#a0d8ef';
      cell.innerHTML=
        '<span class="wt-fc-time'+(item.isNow?' now-mark':'')+'">'+timeStr+'</span>'+
        '<span class="wt-fc-icon">'+wtIcon(s.code)+'</span>'+
        '<span class="wt-fc-temp" style="color:'+tc+'">'+Math.round(s.temp)+'°</span>'+
        '<span class="wt-fc-rain">'+rainStr+'</span>';
      fc.appendChild(cell);
    });
  }

  el.querySelector('.wt-loading').style.display='none';
  el.querySelector('.wt-inner').classList.add('show');
  // Cache
  if(slides){for(var _i=0;_i<slides.length;_i++){var _s=slides[_i];if(_s.type==='weather'&&String(_s.data.lat||0)===el.dataset.wtLat){_slideCache[_s.id]=el.innerHTML;break;}}}
}

function initRadar(el,key){
  if(_wInits[key+'-rd'])return;
  if(!window.L){setTimeout(function(){initRadar(el,key);},300);return;}
  _wInits[key+'-rd']=true;

  var lat=parseFloat(el.dataset.rdLat)||0;
  var lon=parseFloat(el.dataset.rdLon)||0;
  var loc=el.dataset.rdLoc||'Radar';
  var zoom=parseInt(el.dataset.rdZoom)||5;
  var radius=parseInt(el.dataset.rdRadius)||0;
  var wurl=getWurl();

  var mapEl=el.querySelector('.rd-map');
  if(!mapEl||mapEl._leaflet_id){return;}

  try{
    var map=L.map(mapEl,{
      zoomControl:false,attributionControl:false,
      dragging:false,scrollWheelZoom:false,doubleClickZoom:false,keyboard:false,
      zoom:zoom,minZoom:zoom,maxZoom:zoom,zoomSnap:1
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {maxZoom:zoom,maxNativeZoom:Math.min(zoom,19),subdomains:'abcd'}).addTo(map);
    map.setView([lat,lon],zoom,{animate:false});
    setTimeout(function(){
      map.invalidateSize({animate:false});
      map.setView([lat,lon],zoom,{animate:false});
    },300);
    L.circleMarker([lat,lon],{radius:6,color:'#f5c842',fillColor:'#f5c842',fillOpacity:1,weight:2}).addTo(map);
    if(radius>0){
      L.circle([lat,lon],{radius:radius*1000,color:'#f5c842',fillColor:'#f5c842',
        fillOpacity:0.05,weight:1.5,dashArray:'6,4'}).addTo(map);
    }
    _wMaps[key]=map;

    var overlay=el.querySelector('.rd-overlay');
    if(overlay){overlay.style.display='flex';}
    var locEl=el.querySelector('.rd-loc');
    if(locEl)locEl.textContent=loc;

    setTimeout(function(){
      try{
        map.invalidateSize(false);
        loadRadarFrames(el,key,map,getWurl(),zoom,0);
      }catch(ex){wtErr(el,'rd','Kartenfehler nach Resize: '+ex.message);}
    },200);

  }catch(e){wtErr(el,'rd','Kartenfehler: '+e.message);}
}

function loadRadarFrames(el,key,map,wurl,zoom,nativeMax){
  // DWD Regenradar-Animation: aktuell bis +30 Min in 5-Min-Schritten
  var ldg=el.querySelector('.rd-loading');if(ldg)ldg.style.display='none';
  var rtEl=el.querySelector('.rd-time');

  // Zeitschritte: jetzt bis +30 Min in 5-Min-Schritten = 7 Frames
  function makeFrames(){
    var frames=[];
    var now=new Date();
    // Auf 5-Min-Raster abrunden (UTC)
    var ms=now.getTime();
    var base=new Date(Math.floor(ms/(5*60000))*(5*60000));
    for(var i=0;i<=6;i++){
      var t=new Date(base.getTime()+i*5*60000);
      // ISO 8601 UTC
      var iso=t.getUTCFullYear()+'-'+
        pad2(t.getUTCMonth()+1)+'-'+
        pad2(t.getUTCDate())+'T'+
        pad2(t.getUTCHours())+':'+
        pad2(t.getUTCMinutes())+':00.000Z';
      // Lokale Uhrzeit für Anzeige
      var lh=t.getHours(),lm=t.getMinutes();
      frames.push({
        ts:t,
        iso:iso,
        label:(i===0?'Jetzt':'+'+( i*5)+' Min'),
        localTime:pad2(lh)+':'+pad2(lm)
      });
    }
    return frames;
  }

  function addFrame(frame){
    if(_wRadarLayers[key]){try{map.removeLayer(_wRadarLayers[key]);}catch(ex){}}
    // dwd:WN-Produkt = Radarkomposit WN mit 5-Min-Nowcast
    _wRadarLayers[key]=L.tileLayer.wms('https://maps.dwd.de/geoserver/dwd/wms',{
      layers:'dwd:WN-Produkt',
      format:'image/png',
      transparent:true,
      version:'1.3.0',
      opacity:0.85,
      attribution:'© DWD',
      TIME:frame.iso
    });
    _wRadarLayers[key].addTo(map);
    if(rtEl){
      rtEl.textContent=frame.localTime+' Uhr ('+frame.label+')';
    }
  }

  var frames=makeFrames();
  var fi=0;
  addFrame(frames[fi]);

  clearInterval(_wRadarAnims[key]);
  _wRadarAnims[key]=setInterval(function(){
    fi=(fi+1)%frames.length;
    addFrame(frames[fi]);
    // Frames jede Stunde neu berechnen
    if(fi===0) frames=makeFrames();
  },1500); // 1.5s pro Frame → ~10s für eine Runde
}

function initBooking(el, key) {
  if(_bkInits[key]) return;
  _bkInits[key] = true;
  fetchBooking(el, key);
  _bkRefresh[key] = setInterval(function(){ fetchBooking(el, key); }, 300000);
}

function fetchBooking(el, key) {
  // Try worker proxy first (in case CORS allows it), fall back to direct fetch
  var wurl = getWurl();
  var now = new Date();
  var dateStr = now.getFullYear()+'-'
    +pad2(now.getMonth()+1)+'-'
    +pad2(now.getDate());

  // First try via worker
  if(wurl){
    wtXHR(wurl + '/booking?date=' + dateStr,
      function(resp) {
        if(!resp.ok || (!resp.times || !resp.times.length)) {
          // Worker returned empty or error — try direct browser fetch
          fetchBookingDirect(el, dateStr);
          return;
        }
        renderBooking(el, resp);
      },
      function(msg) {
        // Worker failed — try direct browser fetch
        fetchBookingDirect(el, dateStr);
      }
    );
  } else {
    fetchBookingDirect(el, dateStr);
  }
}

function fetchBookingDirect(el, dateStr){
  // Direct browser fetch - works if booking page allows browser requests
  var url = (el.dataset.bkUrl||'https://booking.tennisclub-geldern.de') + '/?date=' + dateStr;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function(){
    if(xhr.status >= 200 && xhr.status < 300){
      var html = xhr.responseText;
      var result = parseBookingHTML(html, dateStr);
      if(result.times.length > 0){
        renderBooking(el, result);
      } else {
        bkError(el, 'Keine Belegungsdaten verfügbar');
      }
    } else {
      bkError(el, 'Buchungsseite nicht erreichbar (HTTP '+xhr.status+')');
    }
  };
  xhr.ontimeout = function(){ bkError(el, 'Timeout beim Laden'); };
  xhr.onerror = function(){ bkError(el, 'Verbindungsfehler zur Buchungsseite'); };
  xhr.send();
}

function parseBookingHTML(html, date){
  var slots = {}, times = [];
  // Parse <tr> rows - time slot rows have "HH:MM" in first cell
  var trRe = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
  var trMatch;
  while((trMatch = trRe.exec(html)) !== null){
    var rowHtml = trMatch[1];
    var cellRe = /<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi;
    var cells = [];
    var cellMatch;
    while((cellMatch = cellRe.exec(rowHtml)) !== null){
      var text = cellMatch[1]
        .replace(/<[^>]+>/g,' ')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,' ')
        .replace(/\s+/g,' ').trim();
      cells.push(text);
    }
    if(cells.length < 2) continue;
    var timeMatch = cells[0].match(/(\d{1,2}:\d{2})/);
    if(!timeMatch) continue;
    var timeStr = ('00000'+timeMatch[1]).slice(-5);
    var statusValues = ['Frei','Belegt','Training','Vorbei','Reserviert','gesperrt'];
    var courtNum = 1;
    for(var ci = 1; ci < cells.length && courtNum <= 10; ci++){
      var cell = cells[ci];
      var status = statusValues.find(function(s){ return cell.toLowerCase().indexOf(s.toLowerCase()) !== -1; });
      if(status !== undefined || cell === ''){
        if(!slots[timeStr]){ slots[timeStr] = {}; times.push(timeStr); }
        slots[timeStr][courtNum] = status || '';
        courtNum++;
      }
    }
  }
  // Build courts list
  var allCourts = {};
  times.forEach(function(t){ Object.keys(slots[t]).forEach(function(c){ allCourts[parseInt(c)] = true; }); });
  var courts = Object.keys(allCourts).map(Number).sort(function(a,b){return a-b;});
  return { ok: true, date: date, slots: slots, times: times.sort(), courts: courts };
}

function bkError(el, msg) {
  var loading = el.querySelector('.bk-loading');
  if(loading){
    var p = loading.querySelector('p');
    if(p){ p.textContent = '⚠ '+msg; p.style.color='#ff8080'; p.style.fontSize='.9rem'; p.style.padding='0 20px'; p.style.textAlign='center'; }
    var sp = loading.querySelector('.wt-spin');
    if(sp) sp.style.display='none';
    loading.style.display='flex'; // ensure visible
  }
}

function renderBooking(el, resp) {
  var slots = resp.slots || {};
  var times = resp.times || [];
  var courts = resp.courts || [];
  var numCourts = parseInt(el.dataset.bkCourts) || 10;
  var ac = el.dataset.bkAc || '#f5c842';

  courts = courts.filter(function(c){ return c <= numCourts; });
  if(!courts.length){courts=[];for(var _ci=1;_ci<=numCourts;_ci++)courts.push(_ci);}

  var nowMins = new Date().getHours()*60 + new Date().getMinutes();
  var activeTimes = times.filter(function(t){
    var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]||0) >= nowMins-60;
  });
  if(!activeTimes.length) activeTimes = times;
  if(activeTimes.length > 16) activeTimes = activeTimes.slice(0,16);

  var grid = el.querySelector('.bk-grid');
  grid.style.gridTemplateColumns = '52px ' + courts.map(function(){return '1fr';}).join(' ');
  grid.style.gridTemplateRows = '26px ' + activeTimes.map(function(){return '1fr';}).join(' ');
  grid.style.gap = '2px';
  grid.innerHTML = '';

  // Header: corner + court numbers
  var corner = document.createElement('div'); corner.className='bk-hdr'; grid.appendChild(corner);
  courts.forEach(function(c){
    var h=document.createElement('div'); h.className='bk-hdr'; h.style.color=ac;
    h.textContent='P'+c; grid.appendChild(h);
  });

  // Rows: time + cells
  activeTimes.forEach(function(t){
    var tl=document.createElement('div'); tl.className='bk-time'; tl.textContent=t; grid.appendChild(tl);
    courts.forEach(function(c){
      var cell=document.createElement('div');
      var status=(slots[t]&&slots[t][c])||'';
      var cls='leer', txt='';
      if(status==='Frei')    {cls='frei';    txt='Frei';}
      if(status==='Belegt')  {cls='belegt';  txt='Bel.';}
      if(status==='Training'){cls='training';txt='Trai.';}
      if(status==='Vorbei')  {cls='vorbei';}
      cell.className='bk-cell '+cls; cell.textContent=txt; grid.appendChild(cell);
    });
  });

  // Date + update time in header
  var dEl=el.querySelector('.bk-date');
  if(dEl){var d=new Date(resp.date+'T12:00:00');dEl.textContent=d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
  var uEl=el.querySelector('.bk-updated');
  if(uEl){var n=new Date();uEl.textContent='Stand: '+pad2(n.getHours())+':'+pad2(n.getMinutes())+' Uhr';}

  el.querySelector('.bk-loading').style.display='none';
  var head=el.querySelector('.bk-head'); if(head){head.style.display='flex';}
  var body=el.querySelector('.bk-body'); if(body){body.style.display='flex';body.style.flexDirection='column';}
}

var _rssInits={}, _rssRefresh={};
function initRss(el,key){
  if(_rssInits[key])return;
  _rssInits[key]=true;
  fetchRss(el,key);
  _rssRefresh[key]=setInterval(function(){fetchRss(el,key);},600000); // alle 10 Min.
}
function fetchRss(el,key){
  var feedUrl=el.dataset.rssUrl||'';
  var wurl=getWurl();
  var scrollWrap=el.querySelector('.news-scroll-wrap');
  function setMsg(msg){
    if(scrollWrap)scrollWrap.innerHTML='<div class="news-scroll-inner" style="color:'+es(el.dataset.rssFg||'#f5c842')+'">'+es(msg)+'</div>';
  }
  if(!feedUrl){setMsg('Keine Feed-URL konfiguriert.');return;}
  if(!wurl){setMsg('Worker-URL fehlt.');return;}
  wtXHR(wurl+'/rss?url='+encodeURIComponent(feedUrl),
    function(resp){
      if(!resp.ok||!resp.items||!resp.items.length){setMsg('Keine Meldungen verf\u00fcgbar.');return;}
      renderRss(el,resp.items);
    },
    function(msg){setMsg('RSS-Feed nicht erreichbar.');}
  );
}
function renderRss(el,items){
  var scrollWrap=el.querySelector('.news-scroll-wrap');
  if(!scrollWrap)return;
  var count=parseInt(el.dataset.rssCount)||10;
  var spd=parseInt(el.dataset.rssSpeed)||120;
  var ac=el.dataset.rssFg||'#f5c842';
  var picked=items.slice(0,count).map(function(it){return it.title;}).filter(Boolean);
  if(!picked.length){scrollWrap.innerHTML='<div class="news-scroll-inner" style="color:'+es(ac)+'">Keine Meldungen verf\u00fcgbar.</div>';return;}
  var txt=picked.join('\u00a0\u00a0\u00a0\u25cf\u00a0\u00a0\u00a0');
  var doubled=txt+'\u00a0\u00a0\u00a0\u00a0\u00a0\u25c6\u00a0\u00a0\u00a0\u00a0\u00a0'+txt+'\u00a0\u00a0\u00a0\u00a0\u00a0\u25c6\u00a0\u00a0\u00a0\u00a0\u00a0';
  var animDur=Math.max(12,Math.round(txt.length*14/spd))+'s';
  scrollWrap.innerHTML='<div class="news-scroll-inner" style="color:'+es(ac)+';animation-duration:'+animDur+'">'+es(doubled)+'</div>';
}
// ─── END RSS-FEED ────────────────────────────────────────────

function triggerSlideInit(){
  if(!slides[cur])return;
  var activeEl=stage.querySelector('.sl.on');
  if(!activeEl)return;
  var k=slides[cur].data&&(slides[cur].data.lat+'_'+slides[cur].data.lon)||cur;
  if(slides[cur].type==='weather') initWeather(activeEl,k);
  if(slides[cur].type==='radar'){
    initRadar(activeEl,k);
    // invalidateSize nach Sichtbarwerden – nach initRadar mit Verzögerung
    var rdKey=k;
    setTimeout(function(){
      if(_wMaps[rdKey]){
        var zoom=parseInt(activeEl.dataset.rdZoom)||5;
        var lat=parseFloat(activeEl.dataset.rdLat)||0;
        var lon=parseFloat(activeEl.dataset.rdLon)||0;
        _wMaps[rdKey].invalidateSize({animate:false});
        _wMaps[rdKey].setView([lat,lon],zoom,{animate:false});
      }
    },600);
  }
  if(slides[cur].type==='booking') initBooking(activeEl,slides[cur].id);
  if(slides[cur].type==='rss') initRss(activeEl,String(slides[cur].id));
  if(slides[cur].type==='spielplan') initSpielplan(activeEl);
  if(slides[cur].type==='kader') initKader(activeEl);
  if(slides[cur].type==='score'){
    // Zyklus exakt an den Moment koppeln, in dem die Folie sichtbar wird —
    // sonst könnte der interne Bild-Wechsel längst vorher (unsichtbar) gelaufen
    // sein und der Zuschauer sieht bei jeder Anzeige zufällig immer dasselbe Bild.
    restartScorePaging(activeEl,slides[cur]);
  }
  // Webpage: alle inaktiven iframes leeren, aktiven laden
  stage.querySelectorAll('.sl.wp iframe').forEach(function(fr){
    var parentOn=fr.closest('.sl').classList.contains('on');
    if(parentOn){
      if(!fr.src||fr.src==='about:blank'){
        var src=fr.dataset.src||'';
        if(src){
          fr.onload=function(){
            var errDiv=fr.parentElement.querySelector('.wp-err');
            if(errDiv)errDiv.style.display='none';
            fr.style.display='block';
          };
          fr.onerror=function(){
            var p=fr.parentElement.querySelector('.wp-err p');
            if(p)p.textContent='Seite konnte nicht geladen werden.';
          };
          fr.src=src;
        }
      } else {
        fr.style.display='block';
      }
    } else {
      fr.style.display='none';
    }
  });
}

function rebuildSlides(){
  cancelAnimationFrame(pA);
  // Wipe-Animation abbrechen falls aktiv
  var w=document.getElementById('wipe');
  if(w)w.classList.remove('go');
  var wns=document.getElementById('wipe-new-slide');
  if(wns){wns.innerHTML='';wns.className='';wns.style.background='';wns.style.backgroundImage='';wns.style.backgroundSize='';wns.style.backgroundPosition='';wns.style.display='';wns.style.overflow='';}
  stage.querySelectorAll('.sl').forEach(function(e){e.remove();});
  // Reset ALL init guards + cache so fresh render happens
  _wInits={};
  _bkInits={};
  _rssInits={};
  _slideCache={};
  // Score-Seitenwechsel-Timer stoppen (Elemente werden gleich entfernt)
  Object.keys(_scPageTimers).forEach(function(k){clearInterval(_scPageTimers[k].iv);});
  _scPageTimers={};
  // Stop radar animations (map instances are gone)
  Object.keys(_wRadarAnims).forEach(function(k){clearInterval(_wRadarAnims[k]);});
  _wRadarAnims={};
  _wMaps={};
  if(!slides.length){document.getElementById('ev').classList.add('on');bd();return;}
  document.getElementById('ev').classList.remove('on');
  if(cur>=slides.length)cur=0;
  dbg('rebuildSlides: '+slides.length+' Folien, cur='+cur+' Typen: '+slides.slice(0,5).map(function(s){return s.type;}).join(','));
  slides.forEach(function(s,i){
    try{
      var el=bs(s);el.dataset.i=i;el.classList.toggle('on',i===cur);stage.appendChild(el);
    }catch(e){
      dbg('bs() FEHLER Folie '+i+' type='+s.type+': '+e.message,'#ffaaaa');
      var fb=document.createElement('div');fb.className='sl';fb.dataset.i=i;
      fb.style.background='#111';fb.innerHTML='<div style="color:#f00;padding:20px">Fehler: '+e.message+'</div>';
      fb.classList.toggle('on',i===cur);stage.appendChild(fb);
    }
  });
  var domCount=stage.querySelectorAll('.sl').length;
  dbg('rebuildSlides fertig: '+domCount+' DOM-Elemente, slides.length='+slides.length);
  var domCount=stage.querySelectorAll('.sl').length;
  dbg('rebuildSlides fertig: '+domCount+' DOM-Elemente, slides.length='+slides.length);
  startProg();
  setTimeout(triggerSlideInit, 200);
}

function show(idx,an){
  if(!slides.length)return;
  cur=((idx%slides.length)+slides.length)%slides.length;
  var all=stage.querySelectorAll('.sl'),doA=an&&all.length>1;
  if(doA){
    var w=document.getElementById('wipe');
    var wns=document.getElementById('wipe-new-slide');
    // Neue Folie in wipe-new-slide spiegeln (Inhalt des aktuellen Slides)
    var newSlideEl=all[cur];
    if(wns && newSlideEl){
      wns.style.background=newSlideEl.style.background||'#1a3a2a';
      wns.style.backgroundImage=newSlideEl.style.backgroundImage||'';
      wns.style.backgroundSize=newSlideEl.style.backgroundSize||'';
      wns.style.backgroundPosition=newSlideEl.style.backgroundPosition||'';
      // Nur die Typ-Klasse (z.B. "ann", "mn-sl") übernehmen — NICHT "sl" selbst,
      // sonst zählt wipe-new-slide bei stage.querySelectorAll('.sl') als
      // zusätzliche Folie mit und bringt Timing/Indizes durcheinander.
      // Das Flex-Layout (das sonst über ".sl.on" kommt) erzwingen wir per Inline-Style.
      var typeCls=newSlideEl.className.split(/\s+/).filter(function(c){return c&&c!=='sl';});
      wns.className=typeCls.join(' ');
      wns.style.display='flex';
      wns.style.overflow='hidden';
      wns.innerHTML=newSlideEl.innerHTML;
    }
    // Animation starten
    w.classList.remove('go');void w.offsetWidth;w.classList.add('go');
    // Echter Slide-Wechsel nach Ende der Animation
    var targetIdx=cur;
    setTimeout(function(){
      // Frische DOM-Referenz holen – rebuildSlides() könnte inzwischen gelaufen sein
      var freshAll=stage.querySelectorAll('.sl');
      freshAll.forEach(function(el,i){el.classList.toggle('on',i===targetIdx);});
      w.classList.remove('go');
      if(wns){wns.innerHTML='';wns.className='';wns.style.background='';wns.style.backgroundImage='';wns.style.backgroundSize='';wns.style.backgroundPosition='';wns.style.display='';wns.style.overflow='';}
    },2600);
  }
  else{all.forEach(function(el,i){el.classList.toggle('on',i===cur);});}
  document.querySelectorAll('.dt').forEach(function(d,i){d.classList.toggle('on',i===cur);});
  document.getElementById('ct').textContent=(cur+1)+' / '+slides.length;
  // Folien-Titel in Toolbar aktualisieren
  var stEl=document.getElementById('sl-title');
  if(stEl){
    var sName=slides[cur]?(slides[cur].data&&slides[cur].data.title)||'':'';
    stEl.classList.remove('vis');
    if(sName){
      stEl.textContent=sName;
      setTimeout(function(){stEl.classList.add('vis');},doA?2650:50);
    }
  }
  startProg();
  setTimeout(triggerSlideInit, doA ? 2700 : 200);
  // Increment show counter for current score slide (for flash repeat logic)
  if(slides[cur]&&slides[cur].type==='score'){
    var sid=slides[cur].id;
    _slideShowCounts[sid]=(_slideShowCounts[sid]||0)+1;
  }
}
function startProg(){cancelAnimationFrame(pA);if(paused||!slides.length)return;pT=((slides[cur]&&slides[cur].duration)?slides[cur].duration:DD)*1000;pR=pT;pS=Date.now();ap();}
function ap(){var e=Date.now()-pS,p=Math.min(100,e/pT*100);document.getElementById('pb').style.width=p+'%';if(e>=pT){show(cur+1,true);return;}pA=requestAnimationFrame(ap);}
function jmp(i){cancelAnimationFrame(pA);show(i,true);}
function tp(){paused=!paused;var b=document.getElementById('pb2');if(paused){cancelAnimationFrame(pA);pR=Math.max(0,pT-(Date.now()-pS));b.textContent='\u25b6';b.classList.add('v');}else{b.textContent='\u23f8';pT=pR;pS=Date.now();ap();setTimeout(function(){if(!paused)b.classList.remove('v');},1500);}}
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();tp();}else if(e.code==='ArrowRight'){cancelAnimationFrame(pA);show(cur+1,true);}else if(e.code==='ArrowLeft'){cancelAnimationFrame(pA);show(cur-1,true);}});
document.getElementById('pb2').onclick=tp;
var ht2;document.addEventListener('mousemove',function(){var b=document.getElementById('pb2');b.classList.add('v');clearTimeout(ht2);if(!paused)ht2=setTimeout(function(){b.classList.remove('v');},3000);});
</script>
