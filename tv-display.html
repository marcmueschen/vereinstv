<!DOCTYPE html>
<html lang="de">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vereins-TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--font-body:'Inter';--font-display:'Bebas Neue';--fscale:1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a2a;font-family:var(--font-body,'Inter'),sans-serif;color:#fff}
#fr{position:fixed;inset:0;display:flex;flex-direction:column}
#tb{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:62px;background:rgba(0,0,0,.4);border-bottom:3px solid #f5c842;flex-shrink:0;z-index:10;gap:18px}
#cn{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:2rem;letter-spacing:.12em;color:#f5c842;white-space:nowrap;flex-shrink:0}
#sl-title{flex:1;font-family:var(--font-slide-title,var(--font-display,'Bebas Neue')),sans-serif;font-size:clamp(1rem,2.2vw,1.6rem);letter-spacing:.06em;color:var(--slide-title-color,#f5c842);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.0;transition:opacity .4s}
#sl-title.vis{opacity:1}
#ck{font-family:var(--font-display,'Bebas Neue'),sans-serif;font-size:1.9rem;letter-spacing:.08em;color:#e8d5a3;white-space:nowrap;flex-shrink:0}
#st{flex:1;position:relative;overflow:hidden}
/* ── LOGO BALL TRANSITION ── */
#wipe{position:absolute;inset:0;z-index:50;pointer-events:none;display:none;overflow:hidden;background:transparent}
#wipe.go{display:block}

/* Neue Folie kommt von links und folgt dem Ball */
#wipe-new-slide{
  position:absolute;inset:0;
  transform:translateX(-100%);
  z-index:1;
  background:#1a3a2a;
  overflow:hidden;
}
#wipe.go #wipe-new-slide{
  animation:newSlideReveal 2.4s cubic-bezier(.6,0,.4,1) forwards;
}
@keyframes newSlideReveal{
  0%  {transform:translateX(-100%)}
  100%{transform:translateX(0%)}
}

#wipe.go #trans-logo{
  animation:ballRollRight 2.5s cubic-bezier(.3,0,.7,1) forwards;
}
@keyframes ballRollRight{
  0%  {left:-100vh; transform:translateY(-50%) rotate(0deg);   opacity:1}
  10% {opacity:1}
  80% {opacity:1}
  100%{left:calc(100% + 100vh); transform:translateY(-50%) rotate(1080deg); opacity:0}
}

  display:none;
}

.sl.rd.on{display:block}

<script>

function applyCfg(cfg){
  DD=cfg.defaultDuration||10;
  document.getElementById('cn').textContent=cfg.clubName||'Vereins-TV';
  var fonts=cfg.fontFamily||'Inter';
  var fsize=parseFloat(cfg.fontSize)||1;
  var root=document.documentElement;
  root.style.setProperty('--font-body',"'"+fonts+"'");
  root.style.setProperty('--fscale',String(fsize));
  // Folien-Titelfarbe und -Schriftart
  var stColor=cfg.slideTitleColor||'#f5c842';
  var stFont=cfg.slideTitleFont||'';
  root.style.setProperty('--slide-title-color',stColor);
  root.style.setProperty('--font-slide-title',stFont?"'"+stFont+"'":('var(--font-display,\'Bebas Neue\')'));
  // Schriftart laden falls nötig
  if(stFont&&stFont!=='Bebas Neue'&&stFont!==fonts){
    var stfId='gf-st-'+stFont.replace(/\s+/g,'-');
    if(!document.getElementById(stfId)){
      var stfLink=document.createElement('link');
      stfLink.id=stfId;stfLink.rel='stylesheet';
      stfLink.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(stFont)+':wght@400;700&display=swap';
      document.head.appendChild(stfLink);
    }
  }
  var fontId='gf-'+fonts.replace(/\s+/g,'-');
  if(!document.getElementById(fontId)&&fonts!=='Inter'){
    var link=document.createElement('link');
    link.id=fontId;link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(fonts)+':wght@300;400;500;600;700;800&display=swap';
    document.head.appendChild(link);
  }
  var prevSlides=slides;
  var was=slides.length===0;
  slides=(cfg.slides||[]).filter(function(s){return s.enabled!==false;});

  // Smart update: if slide count/types unchanged, just update score content in-place
  var sameStructure=(prevSlides.length===slides.length)&&slides.every(function(s,i){
    return prevSlides[i]&&prevSlides[i].id===s.id&&prevSlides[i].type===s.type;
  });

  if(sameStructure&&!was){
    // Only update changed score slides in-place — animation will work!
    slides.forEach(function(s,i){
      if(s.type!=='score')return;
      var el=stage.querySelector('.sl[data-i="'+i+'"]');
      if(el){
        // Clear existing flash timers for this slide before updating
        // (new change = restart counter)
        Object.keys(_flashTimers).forEach(function(k){
          if(k.indexOf(s.id+'_')===0){
            clearInterval(_flashTimers[k].iv);
            delete _flashTimers[k];
          }
        });
        _slideShowCounts[s.id]=0;
        bsc(s,el);
      }
    });
    bd();
  } else {
    dbg('applyCfg: rufe rebuildSlides auf (was='+was+' same='+sameStructure+')');
    rebuildSlides();
    if(was&&slides.length)show(0,false);
  }
}

function pc(t){return(t||'').trim().split('\n').map(function(l){return l.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});}).filter(function(r){return r.some(function(c){return c;});});}

// ── SCORE
function bsc(s,div){
  var d=s.data||{},ac=d.accent||'#f5c842';
  div.style.setProperty('--ac',ac);
  div.style.background=d.bg||'#0f2a1c';
  var gh=parseInt(d.gesamtHeim)||0,gg=parseInt(d.gesamtGast)||0;
  var hl=gh>gg,gl=gg>gh;

  function setHtml(m){
    var parts=m.sets.map(function(st){
      if(!st.h&&!st.g)return '';
      var hw=parseInt(st.h||0)>parseInt(st.g||0),gw=parseInt(st.g||0)>parseInt(st.h||0);
      return '<div class="sc-sp">'
        +'<span class="sc-sv'+(hw?' w':'')+'">'+es(st.h||'0')+'</span>'
        +'<span class="sc-se">:</span>'
        +'<span class="sc-sv'+(gw?' w':'')+'">'+es(st.g||'0')+'</span>'
        +'</div>';
    }).filter(Boolean);
    return parts.join('<div class="sc-sdv"></div>');
  }

  function flashRow(row, rowKey){
    // Clear any existing repeating flash for this row
    if(_flashTimers[rowKey]){
      clearInterval(_flashTimers[rowKey].iv);
      delete _flashTimers[rowKey];
    }
    // Reset show counter for this slide
    _slideShowCounts[s.id] = 0;

    // Single flash trigger
    function doFlash(){
      row.classList.remove('flash');
      void row.offsetWidth;
      row.classList.add('flash');
    }

    doFlash();

    // Repeat every 1.5s (slightly longer than animation duration 1.4s)
    var iv = setInterval(function(){
      // Stop if slide has been shown 5 times
      var shown = _slideShowCounts[s.id] || 0;
      if(shown >= 5){
        clearInterval(iv);
        delete _flashTimers[rowKey];
        row.classList.remove('flash');
        return;
      }
      doFlash();
    }, 1500);

    _flashTimers[rowKey] = {iv: iv, el: row};
  }

  // Build score header
  var headHtml='<div class="sc-sh">'
    +'<div class="sc-te h">'+es(d.heimTeam||'Heim')+'</div>'
    +'<div class="sc-sb">'
      +'<span class="sc-sn'+(hl?' ld':'')+'">'+gh+'</span>'
      +'<span class="sc-cl">:</span>'
      +'<span class="sc-sn'+(gl?' ld':'')+'">'+gg+'</span>'
    +'</div>'
    +'<div class="sc-te g">'+es(d.gastTeam||'Gast')+'</div>'
    +'</div>'
    +'<div class="sc-dv" style="background:'+ac+'"></div>';

  // First render
  if(!div.querySelector('.sc-bd')){
    div.innerHTML=headHtml
      +'<div class="sc-bd">'
        +'<div class="sc-hd">Einzel</div>'
        +'<div class="sc-singles"></div>'
        +'<div class="sc-hd" style="margin-top:6px">Doppel</div>'
        +'<div class="sc-doubles"></div>'
      +'</div>';
  } else {
    // Update header
    var hEl=div.querySelector('.sc-sh');
    if(hEl){var t=document.createElement('div');t.innerHTML=headHtml;if(hEl.outerHTML!==t.querySelector('.sc-sh').outerHTML)hEl.outerHTML=t.querySelector('.sc-sh').outerHTML;}
  }

  function updateRows(containerSel, matches){
    var container=div.querySelector(containerSel);
    if(!container)return;
    var visible=matches.filter(function(m){
      return m.heimPlayer||m.gastPlayer||m.sets.some(function(x){return x.h||x.g;});
    });
    visible.forEach(function(m,i){
      var k=s.id+'_'+m.type;
      var prev=PD[k]||null;
      var mStr=JSON.stringify(m);
      var changed=!prev||(JSON.stringify(prev)!==mStr);
      PD[k]=JSON.parse(mStr);
      var hw=m.winner==='heim',gw=m.winner==='gast';
      var rowHtml='<span class="sc-lb">'+es(m.type)+'</span>'
        +'<span class="sc-pl'+(hw?' winner':'')+'">'+es(m.heimPlayer||'–')+'</span>'
        +'<span class="sc-pl'+(gw?' winner':'')+'">'+es(m.gastPlayer||'–')+'</span>'
        +'<div class="sc-ss">'+setHtml(m)+'</div>';
      var existing=container.children[i];
      if(!existing){
        var row=document.createElement('div');
        row.className='sc-rw';
        row.innerHTML=rowHtml;
        container.appendChild(row);
        // Flash new rows that appear after initial load (prev was null but PD had no entry)
        if(prev!==null&&changed) flashRow(row,k);
      } else if(changed){
        existing.innerHTML=rowHtml;
        if(prev!==null) flashRow(existing,k);
      }
    });
    while(container.children.length>visible.length){
      container.removeChild(container.lastChild);
    }
  }

  var ma=d.matches||[];
  updateRows('.sc-singles',ma.slice(0,6));
  updateRows('.sc-doubles',ma.slice(6,9));
}

function wtXHR(url,onOk,onFail){
  if(!url){onFail('URL fehlt');return;}
  var xhr=new XMLHttpRequest();
  try{xhr.open('GET',url,true);}catch(e){onFail('XHR: '+e.message);return;}
  xhr.timeout=20000;
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<300){
      try{onOk(JSON.parse(xhr.responseText));}
      catch(e){onFail('JSON: '+xhr.responseText.slice(0,80));}
    }else{onFail('HTTP '+xhr.status);}
  };
  xhr.ontimeout=function(){onFail('Timeout (20s)');};
  xhr.onerror=function(){onFail('Netzwerkfehler');};
  xhr.send();
}

  if(lp){lp.textContent=msg;lp.style.color='#ff8080';}
  var sp=el.querySelector('.'+cls+'-loading .wt-spin');
  if(sp)sp.style.display='none';
}

// ─── WEATHER FORECAST ────────────────────────────────────────────
function initWeather(el,key){
  if(_wInits[key+'-wt'])return;
  _wInits[key+'-wt']=true;
  var lat=parseFloat(el.dataset.wtLat)||0;
  var lon=parseFloat(el.dataset.wtLon)||0;
  var loc=el.dataset.wtLoc||'Wetter';
  var wurl=getWurl();
  dbg('initWeather: loc='+loc+' lat='+lat+' lon='+lon+' wurl='+(wurl?wurl.slice(0,30):'(leer)'));
  if(!wurl){wtErr(el,'wt','Worker-URL fehlt');return;}
  fetchWeather(el,key,lat,lon,loc,wurl);
  setInterval(function(){fetchWeather(el,key,lat,lon,loc,getWurl());},600000);
}

function fetchWeather(el,key,lat,lon,loc,wurl){
  dbg('fetchWeather: lat='+lat+' lon='+lon);
  wtXHR(wurl+'/weather?lat='+lat+'&lon='+lon,
    function(resp){
      dbg('weather resp ok='+resp.ok+' has_cw='+(resp.data&&resp.data.current_weather?'ja':'nein'));
      if(!resp.ok){wtErr(el,'wt','Worker: '+(resp.error||'Fehler'));return;}
      if(!resp.data){wtErr(el,'wt','Keine Wetterdaten im Response');return;}
      renderWeather(el,resp.data,loc);
    },
    function(msg){dbg('weather XHR fail: '+msg,'#ffaaaa');wtErr(el,'wt',msg);}
  );
}

function renderWeather(el,d,loc){
  var cw=d.current_weather;
  if(!cw){wtErr(el,'wt','Keine Daten');return;}
  var now=new Date();
  var ac=el.dataset.wtAc||'#f5c842';

  // ── Hero-Bereich füllen
  var placeEl=el.querySelector('.wt-hero-place');
  var dateEl=el.querySelector('.wt-hero-date');
  var tempEl=el.querySelector('.wt-hero-temp');
  var descEl=el.querySelector('.wt-hero-desc');
  var iconEl=el.querySelector('.wt-hero-icon');
  if(placeEl) placeEl.textContent=loc;
  if(dateEl) dateEl.textContent=
    now.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})+
    ' · '+pad2(now.getHours())+':'+pad2(now.getMinutes())+' Uhr';
  if(tempEl) tempEl.textContent=Math.round(cw.temperature)+'°';
  if(descEl) descEl.textContent=wtDesc(cw.weathercode);
  if(iconEl) iconEl.textContent=wtIcon(cw.weathercode);

  // ── Slots aufbauen (30-Min-Intervall, 12h = 24 Slots)
  var slots=[];
  var m15=d.minutely_15;
  if(m15&&m15.time&&m15.time.length){
    var nowRound=new Date(Math.floor(now.getTime()/(30*60000))*(30*60000));
    var nowStr=nowRound.toISOString().slice(0,16);
    var si=0;
    for(var x=0;x<m15.time.length;x++){
      if(m15.time[x].replace(' ','T').slice(0,16)>=nowStr){si=x;break;}
    }
    for(var i=si;i<si+24&&i<m15.time.length;i++){
      var t=m15.time[i];
      slots.push({
        time:(t.split('T')[1]||t.split(' ')[1]||'').slice(0,5),
        temp:m15.temperature_2m[i]||0,
        rain:m15.precipitation?m15.precipitation[i]||0:0,
        rainProb:m15.precipitation_probability?m15.precipitation_probability[i]||0:0,
        code:m15.weathercode[i]||0,
        wind:Math.round(m15.windspeed_10m?m15.windspeed_10m[i]||0:0)
      });
    }
  } else {
    var h=d.hourly;
    var today=now.toISOString().slice(0,10);
    var hStr=pad2(now.getHours());
    var si2=0;
    for(var x2=0;x2<h.time.length;x2++){if(h.time[x2]>=today+'T'+hStr){si2=x2;break;}}
    for(var i2=si2;i2<si2+13&&i2<h.time.length-1;i2++){
      var t0=h.time[i2];
      var hh=parseInt((t0.split('T')[1]||'00:').split(':')[0]);
      slots.push({time:(t0.split('T')[1]||'').slice(0,5),
        temp:h.temperature_2m[i2]||0,rain:0,
        rainProb:h.precipitation_probability?h.precipitation_probability[i2]||0:0,
        code:h.weathercode[i2]||0,wind:Math.round(h.windspeed_10m?h.windspeed_10m[i2]||0:0)});
      slots.push({time:pad2(hh)+':30',
        temp:((h.temperature_2m[i2]||0)+(h.temperature_2m[i2+1]||0))/2,
        rain:0,rainProb:h.precipitation_probability?((h.precipitation_probability[i2]||0)+(h.precipitation_probability[i2+1]||0))/2:0,
        code:h.weathercode[i2]||0,wind:0});
    }
    slots=slots.slice(0,24);
  }
  if(!slots.length){wtErr(el,'wt','Keine Zeitdaten');return;}

  // ── Vorhersage-Zeile füllen
  var fc=el.querySelector('.wt-forecast');
  if(fc){
    fc.innerHTML='';
    // Nur alle vollen Stunden (jeder 2. Slot) + aktuellen Zeitpunkt
    var showSlots=[];
    for(var j=0;j<slots.length;j++){
      if(j===0||j%2===0) showSlots.push({slot:slots[j],isNow:(j===0)});
    }
    showSlots.forEach(function(item){
      var s=item.slot;
      var cell=document.createElement('div');
      cell.className='wt-fc-cell'+(item.isNow?' now-cell':'');
      var timeStr=item.isNow?'Jetzt':s.time.slice(0,5);
      var rainStr=s.rainProb>=10?s.rainProb+'%':'';
      var tc=s.temp>=28?'#ff8080':s.temp>=18?'#ffd166':'#a0d8ef';
      cell.innerHTML=
        '<span class="wt-fc-time'+(item.isNow?' now-mark':'')+'">'+timeStr+'</span>'+
        '<span class="wt-fc-icon">'+wtIcon(s.code)+'</span>'+
        '<span class="wt-fc-temp" style="color:'+tc+'">'+Math.round(s.temp)+'°</span>'+
        '<span class="wt-fc-rain">'+rainStr+'</span>';
      fc.appendChild(cell);
    });
  }

  el.querySelector('.wt-loading').style.display='none';
  el.querySelector('.wt-inner').classList.add('show');
  // Cache
  if(slides){for(var _i=0;_i<slides.length;_i++){var _s=slides[_i];if(_s.type==='weather'&&String(_s.data.lat||0)===el.dataset.wtLat){_slideCache[_s.id]=el.innerHTML;break;}}}
}

function initRadar(el,key){
  if(_wInits[key+'-rd'])return;
  if(!window.L){setTimeout(function(){initRadar(el,key);},300);return;}
  _wInits[key+'-rd']=true;

  var lat=parseFloat(el.dataset.rdLat)||0;
  var lon=parseFloat(el.dataset.rdLon)||0;
  var loc=el.dataset.rdLoc||'Radar';
  var zoom=parseInt(el.dataset.rdZoom)||5;
  var radius=parseInt(el.dataset.rdRadius)||0;
  var wurl=getWurl();

  var mapEl=el.querySelector('.rd-map');
  if(!mapEl||mapEl._leaflet_id){return;}

  var RADAR_NATIVE_MAX=6;

  try{
    var map=L.map(mapEl,{
      zoomControl:false,attributionControl:false,
      dragging:false,scrollWheelZoom:false,doubleClickZoom:false,keyboard:false,
      minZoom:zoom,maxZoom:zoom
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {maxZoom:zoom,maxNativeZoom:Math.min(zoom,19),subdomains:'abcd'}).addTo(map);
    map.setView([lat,lon],zoom);
    L.circleMarker([lat,lon],{radius:6,color:'#f5c842',fillColor:'#f5c842',fillOpacity:1,weight:2}).addTo(map);
    if(radius>0){
      L.circle([lat,lon],{radius:radius*1000,color:'#f5c842',fillColor:'#f5c842',
        fillOpacity:0.05,weight:1.5,dashArray:'6,4'}).addTo(map);
    }
    // Store map BEFORE setTimeout so it's available
    _wMaps[key]=map;

    // Show overlay
    var overlay=el.querySelector('.rd-overlay');
    if(overlay){overlay.style.display='flex';}
    var locEl=el.querySelector('.rd-loc');
    if(locEl)locEl.textContent=loc;

    // Wait 200ms for element to be fully visible, THEN invalidate and load
    setTimeout(function(){
      try{
        map.invalidateSize(false);
        loadRadarFrames(el,key,map,getWurl(),zoom,RADAR_NATIVE_MAX);
        setInterval(function(){loadRadarFrames(el,key,map,getWurl(),zoom,RADAR_NATIVE_MAX);},600000);
      }catch(ex){wtErr(el,'rd','Kartenfehler nach Resize: '+ex.message);}
    },200);

  }catch(e){wtErr(el,'rd','Kartenfehler: '+e.message);}
}

function loadRadarFrames(el,key,map,wurl,zoom,nativeMax){
  if(!wurl)return;
  wtXHR(wurl+'/radar',
    function(resp){
      var d=resp.ok?resp.data:null;if(!d)return;
      var frames=(d.radar&&d.radar.past?d.radar.past:[])
        .concat(d.radar&&d.radar.nowcast?d.radar.nowcast:[]);
      if(!frames.length)return;
      clearInterval(_wRadarAnims[key]);
      var start=Math.max(0,frames.length-4),fi=start;
      // Hide loading
      var ldg=el.querySelector('.rd-loading');if(ldg)ldg.style.display='none';
      _wRadarAnims[key]=setInterval(function(){
        if(_wRadarLayers[key]){try{map.removeLayer(_wRadarLayers[key]);}catch(ex){}}
        var fr=frames[fi];
        // Use maxNativeZoom to prevent "Zoom level not supported"
        _wRadarLayers[key]=L.tileLayer(
          'https://tilecache.rainviewer.com'+fr.path+'/256/{z}/{x}/{y}/2/1_1.png',
          {opacity:0.7,maxZoom:zoom,maxNativeZoom:nativeMax,tileSize:256}
        );
        _wRadarLayers[key].addTo(map);
        var dt=new Date(fr.time*1000);
        var rtEl=el.querySelector('.rd-time');
        if(rtEl)rtEl.textContent=pad2(dt.getHours())+':'+
          pad2(dt.getMinutes())+' Uhr';
        fi=fi<frames.length-1?fi+1:start;
      },900);
    },
    function(msg){
      var ldg=el.querySelector('.rd-loading');if(ldg){var p=ldg.querySelector('p');if(p){p.textContent='Radar: '+msg;p.style.color='#ff8080';}var sp=ldg.querySelector('.wt-spin');if(sp)sp.style.display='none';}
    }
  );
}

var _bkInits={}, _bkRefresh={};

function initBooking(el, key) {
  if(_bkInits[key]) return;
  _bkInits[key] = true;
  fetchBooking(el, key);
  _bkRefresh[key] = setInterval(function(){ fetchBooking(el, key); }, 300000);
}

function fetchBooking(el, key) {
  // Try worker proxy first (in case CORS allows it), fall back to direct fetch
  var wurl = getWurl();
  var now = new Date();
  var dateStr = now.getFullYear()+'-'
    +pad2(now.getMonth()+1)+'-'
    +pad2(now.getDate());

  // First try via worker
  if(wurl){
    wtXHR(wurl + '/booking?date=' + dateStr,
      function(resp) {
        if(!resp.ok || (!resp.times || !resp.times.length)) {
          // Worker returned empty or error — try direct browser fetch
          fetchBookingDirect(el, dateStr);
          return;
        }
        renderBooking(el, resp);
      },
      function(msg) {
        // Worker failed — try direct browser fetch
        fetchBookingDirect(el, dateStr);
      }
    );
  } else {
    fetchBookingDirect(el, dateStr);
  }
}

function fetchBookingDirect(el, dateStr){
  // Direct browser fetch - works if booking page allows browser requests
  var url = (el.dataset.bkUrl||'https://booking.tennisclub-geldern.de') + '/?date=' + dateStr;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function(){
    if(xhr.status >= 200 && xhr.status < 300){
      var html = xhr.responseText;
      var result = parseBookingHTML(html, dateStr);
      if(result.times.length > 0){
        renderBooking(el, result);
      } else {
        bkError(el, 'Keine Belegungsdaten verfügbar');
      }
    } else {
      bkError(el, 'Buchungsseite nicht erreichbar (HTTP '+xhr.status+')');
    }
  };
  xhr.ontimeout = function(){ bkError(el, 'Timeout beim Laden'); };
  xhr.onerror = function(){ bkError(el, 'Verbindungsfehler zur Buchungsseite'); };
  xhr.send();
}

function parseBookingHTML(html, date){
  var slots = {}, times = [];
  // Parse <tr> rows - time slot rows have "HH:MM" in first cell
  var trRe = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
  var trMatch;
  while((trMatch = trRe.exec(html)) !== null){
    var rowHtml = trMatch[1];
    var cellRe = /<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi;
    var cells = [];
    var cellMatch;
    while((cellMatch = cellRe.exec(rowHtml)) !== null){
      var text = cellMatch[1]
        .replace(/<[^>]+>/g,' ')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&nbsp;/g,' ').replace(/&#[0-9]+;/g,' ')
        .replace(/\s+/g,' ').trim();
      cells.push(text);
    }
    if(cells.length < 2) continue;
    var timeMatch = cells[0].match(/(\d{1,2}:\d{2})/);
    if(!timeMatch) continue;
    var timeStr = ('00000'+timeMatch[1]).slice(-5);
    var statusValues = ['Frei','Belegt','Training','Vorbei','Reserviert','gesperrt'];
    var courtNum = 1;
    for(var ci = 1; ci < cells.length && courtNum <= 10; ci++){
      var cell = cells[ci];
      var status = statusValues.find(function(s){ return cell.toLowerCase().indexOf(s.toLowerCase()) !== -1; });
      if(status !== undefined || cell === ''){
        if(!slots[timeStr]){ slots[timeStr] = {}; times.push(timeStr); }
        slots[timeStr][courtNum] = status || '';
        courtNum++;
      }
    }
  }
  // Build courts list
  var allCourts = {};
  times.forEach(function(t){ Object.keys(slots[t]).forEach(function(c){ allCourts[parseInt(c)] = true; }); });
  var courts = Object.keys(allCourts).map(Number).sort(function(a,b){return a-b;});
  return { ok: true, date: date, slots: slots, times: times.sort(), courts: courts };
}

function bkError(el, msg) {
  var loading = el.querySelector('.bk-loading');
  if(loading){
    var p = loading.querySelector('p');
    if(p){ p.textContent = '⚠ '+msg; p.style.color='#ff8080'; p.style.fontSize='.9rem'; p.style.padding='0 20px'; p.style.textAlign='center'; }
    var sp = loading.querySelector('.wt-spin');
    if(sp) sp.style.display='none';
    loading.style.display='flex'; // ensure visible
  }
}

function renderBooking(el, resp) {
  var slots = resp.slots || {};
  var times = resp.times || [];
  var courts = resp.courts || [];
  var numCourts = parseInt(el.dataset.bkCourts) || 10;
  var ac = el.dataset.bkAc || '#f5c842';

  courts = courts.filter(function(c){ return c <= numCourts; });
  if(!courts.length){courts=[];for(var _ci=1;_ci<=numCourts;_ci++)courts.push(_ci);}

  var nowMins = new Date().getHours()*60 + new Date().getMinutes();
  var activeTimes = times.filter(function(t){
    var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]||0) >= nowMins-60;
  });
  if(!activeTimes.length) activeTimes = times;
  if(activeTimes.length > 16) activeTimes = activeTimes.slice(0,16);

  var grid = el.querySelector('.bk-grid');
  grid.style.gridTemplateColumns = '52px ' + courts.map(function(){return '1fr';}).join(' ');
  grid.style.gridTemplateRows = '26px ' + activeTimes.map(function(){return '1fr';}).join(' ');
  grid.style.gap = '2px';
  grid.innerHTML = '';

  // Header: corner + court numbers
  var corner = document.createElement('div'); corner.className='bk-hdr'; grid.appendChild(corner);
  courts.forEach(function(c){
    var h=document.createElement('div'); h.className='bk-hdr'; h.style.color=ac;
    h.textContent='P'+c; grid.appendChild(h);
  });

  // Rows: time + cells
  activeTimes.forEach(function(t){
    var tl=document.createElement('div'); tl.className='bk-time'; tl.textContent=t; grid.appendChild(tl);
    courts.forEach(function(c){
      var cell=document.createElement('div');
      var status=(slots[t]&&slots[t][c])||'';
      var cls='leer', txt='';
      if(status==='Frei')    {cls='frei';    txt='Frei';}
      if(status==='Belegt')  {cls='belegt';  txt='Bel.';}
      if(status==='Training'){cls='training';txt='Trai.';}
      if(status==='Vorbei')  {cls='vorbei';}
      cell.className='bk-cell '+cls; cell.textContent=txt; grid.appendChild(cell);
    });
  });

  // Date + update time in header
  var dEl=el.querySelector('.bk-date');
  if(dEl){var d=new Date(resp.date+'T12:00:00');dEl.textContent=d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
  var uEl=el.querySelector('.bk-updated');
  if(uEl){var n=new Date();uEl.textContent='Stand: '+pad2(n.getHours())+':'+pad2(n.getMinutes())+' Uhr';}

  el.querySelector('.bk-loading').style.display='none';
  var head=el.querySelector('.bk-head'); if(head){head.style.display='flex';}
  var body=el.querySelector('.bk-body'); if(body){body.style.display='flex';body.style.flexDirection='column';}
}

function triggerSlideInit(){
  if(!slides[cur])return;
  var activeEl=stage.querySelector('.sl.on');
  if(!activeEl)return;
  dbg('triggerSlideInit: cur='+cur+' type='+slides[cur].type);
  var k=slides[cur].data&&(slides[cur].data.lat+'_'+slides[cur].data.lon)||cur;
  if(slides[cur].type==='weather') initWeather(activeEl,k);
  if(slides[cur].type==='radar')   initRadar(activeEl,k);
  if(slides[cur].type==='booking') initBooking(activeEl,slides[cur].id);
  // Webpage: alle inaktiven iframes leeren, aktiven laden
  stage.querySelectorAll('.sl.wp iframe').forEach(function(fr){
    var parentOn=fr.closest('.sl').classList.contains('on');
    if(parentOn){
      if(!fr.src||fr.src==='about:blank'){
        var src=fr.dataset.src||'';
        if(src){
          fr.onload=function(){
            var errDiv=fr.parentElement.querySelector('.wp-err');
            if(errDiv)errDiv.style.display='none';
            fr.style.display='block';
          };
          fr.onerror=function(){
            var p=fr.parentElement.querySelector('.wp-err p');
            if(p)p.textContent='Seite konnte nicht geladen werden.';
          };
          fr.src=src;
        }
      } else {
        fr.style.display='block';
      }
    } else {
      fr.style.display='none';
    }
  });
}

function rebuildSlides(){
  cancelAnimationFrame(pA);
  // Wipe-Animation abbrechen falls aktiv
  var w=document.getElementById('wipe');
  if(w)w.classList.remove('go');
  var wns=document.getElementById('wipe-new-slide');
  if(wns){wns.innerHTML='';wns.style.backgroundImage='';wns.style.backgroundSize='';wns.style.backgroundPosition='';}
  stage.querySelectorAll('.sl').forEach(function(e){e.remove();});
  // Reset ALL init guards + cache so fresh render happens
  _wInits={};
  _bkInits={};
  _slideCache={};
  // Stop radar animations (map instances are gone)
  Object.keys(_wRadarAnims).forEach(function(k){clearInterval(_wRadarAnims[k]);});
  _wRadarAnims={};
  _wMaps={};
  if(!slides.length){document.getElementById('ev').classList.add('on');bd();return;}
  document.getElementById('ev').classList.remove('on');
  if(cur>=slides.length)cur=0;
  dbg('rebuildSlides: '+slides.length+' Folien, cur='+cur+' Typen: '+slides.slice(0,5).map(function(s){return s.type;}).join(','));
  slides.forEach(function(s,i){
    try{
      var el=bs(s);el.dataset.i=i;el.classList.toggle('on',i===cur);stage.appendChild(el);
    }catch(e){
      dbg('bs() FEHLER Folie '+i+' type='+s.type+': '+e.message,'#ffaaaa');
      // Fallback: leere Folie einfügen damit Index stimmt
      var fb=document.createElement('div');fb.className='sl';fb.dataset.i=i;
      fb.style.background='#111';fb.innerHTML='<div style="color:#f00;padding:20px">Fehler: '+e.message+'</div>';
      fb.classList.toggle('on',i===cur);stage.appendChild(fb);
    }
  });
  var domCount=stage.querySelectorAll('.sl').length;
  dbg('rebuildSlides fertig: '+domCount+' DOM-Elemente, slides.length='+slides.length);
  startProg();
  setTimeout(triggerSlideInit, 200);
}

function show(idx,an){
  if(!slides.length)return;
  cur=((idx%slides.length)+slides.length)%slides.length;
  var all=stage.querySelectorAll('.sl'),doA=an&&all.length>1;
  dbg('show: idx='+idx+' cur='+cur+' slides='+slides.length+' DOM='+all.length);
  if(doA){
    var w=document.getElementById('wipe');
    var wns=document.getElementById('wipe-new-slide');
    // Neue Folie in wipe-new-slide spiegeln (Inhalt des aktuellen Slides)
    var newSlideEl=all[cur];
    if(wns && newSlideEl){
      wns.style.background=newSlideEl.style.background||'#1a3a2a';
      wns.style.backgroundImage=newSlideEl.style.backgroundImage||'';
      wns.style.backgroundSize=newSlideEl.style.backgroundSize||'';
      wns.style.backgroundPosition=newSlideEl.style.backgroundPosition||'';
      wns.innerHTML=newSlideEl.innerHTML;
    }
    // Animation starten
    w.classList.remove('go');void w.offsetWidth;w.classList.add('go');
    // Echter Slide-Wechsel nach Ende der Animation
    var targetIdx=cur;
    setTimeout(function(){
      // Frische DOM-Referenz holen – rebuildSlides() könnte inzwischen gelaufen sein
      var freshAll=stage.querySelectorAll('.sl');
      freshAll.forEach(function(el,i){el.classList.toggle('on',i===targetIdx);});
      w.classList.remove('go');
      if(wns){wns.innerHTML='';wns.style.backgroundImage='';wns.style.backgroundSize='';wns.style.backgroundPosition='';}
    },2600);
  }
  else{all.forEach(function(el,i){el.classList.toggle('on',i===cur);});}
  document.querySelectorAll('.dt').forEach(function(d,i){d.classList.toggle('on',i===cur);});
  document.getElementById('ct').textContent=(cur+1)+' / '+slides.length;
  // Folien-Titel in Toolbar aktualisieren
  var stEl=document.getElementById('sl-title');
  if(stEl){
    var sName=slides[cur]?(slides[cur].data&&slides[cur].data.title)||'':'';
    stEl.classList.remove('vis');
    if(sName){
      stEl.textContent=sName;
      setTimeout(function(){stEl.classList.add('vis');},doA?2650:50);
    }
  }
  startProg();
  setTimeout(triggerSlideInit, doA ? 2700 : 200);
  // Increment show counter for current score slide (for flash repeat logic)
  if(slides[cur]&&slides[cur].type==='score'){
    var sid=slides[cur].id;
    _slideShowCounts[sid]=(_slideShowCounts[sid]||0)+1;
  }
}
function startProg(){cancelAnimationFrame(pA);if(paused||!slides.length)return;pT=((slides[cur]&&slides[cur].duration)?slides[cur].duration:DD)*1000;pR=pT;pS=Date.now();ap();}
function ap(){var e=Date.now()-pS,p=Math.min(100,e/pT*100);document.getElementById('pb').style.width=p+'%';if(e>=pT){show(cur+1,true);return;}pA=requestAnimationFrame(ap);}
function jmp(i){cancelAnimationFrame(pA);show(i,true);}
function tp(){paused=!paused;var b=document.getElementById('pb2');if(paused){cancelAnimationFrame(pA);pR=Math.max(0,pT-(Date.now()-pS));b.textContent='\u25b6';b.classList.add('v');}else{b.textContent='\u23f8';pT=pR;pS=Date.now();ap();setTimeout(function(){if(!paused)b.classList.remove('v');},1500);}}
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();tp();}else if(e.code==='ArrowRight'){cancelAnimationFrame(pA);show(cur+1,true);}else if(e.code==='ArrowLeft'){cancelAnimationFrame(pA);show(cur-1,true);}});
document.getElementById('pb2').onclick=tp;
var ht2;document.addEventListener('mousemove',function(){var b=document.getElementById('pb2');b.classList.add('v');clearTimeout(ht2);if(!paused)ht2=setTimeout(function(){b.classList.remove('v');},3000);});
</script>
